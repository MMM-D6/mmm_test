<head>
<script>
(function(){
  var PASS = localStorage.getItem('adhd-rpg-pw') || 'x5uvwa9uyimiaodai1999';
  var KEY = 'rpg-auth';
  if(sessionStorage.getItem(KEY) === PASS) return;
  // SW + manifest still load (needed for PWA install prompt)
  // Only block the UI after DOM ready
  document.addEventListener('DOMContentLoaded', function(){
    // hide entire app
    document.getElementById('app').style.display = 'none';
    // show password screen
    var overlay = document.createElement('div');
    overlay.id = 'pw-overlay';
    overlay.style.cssText = 'position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#c0c0c0;flex-direction:column;gap:12px;z-index:9999;';
    overlay.innerHTML = '<div style="background:#000080;color:#fff;font-family:&quot;Press Start 2P&quot;,monospace;font-size:9px;padding:5px 16px;letter-spacing:2px;width:280px;display:flex;align-items:center;gap:8px;">📁 MMM 日志</div>'
      + '<div style="background:#d4d0c8;border:3px solid;border-color:#fff #808080 #808080 #fff;padding:16px;width:280px;"><div style="font-family:Courier New,monospace;font-size:13px;color:#000;margin-bottom:8px;">Password:</div><input id="pw-input" type="password" autofocus style="width:100%;background:#fff;border:2px solid;border-color:#808080 #fff #fff #808080;color:#000;padding:5px 8px;font-size:15px;outline:none;font-family:Courier New,monospace;"/></div>'
      + '<div id="pw-err" style="color:#c0392b;font-size:12px;min-height:16px;font-family:Courier New,monospace;"></div>';
    document.body.appendChild(overlay);
    setTimeout(function(){ document.getElementById('pw-input').focus(); }, 100);
    document.getElementById('pw-input').addEventListener('keydown', function(e){
      if(e.key === 'Enter'){
        if(this.value === PASS){
          sessionStorage.setItem(KEY, PASS);
          overlay.remove();
          document.getElementById('app').style.display = 'flex';
        } else {
          document.getElementById('pw-err').textContent = '密码错误，请重试';
          this.value = '';
        }
      }
    });
  });
})();
</script>

<style>
/*
  WIN95/98 原汁原味复古主题
  颜色: #c0c0c0 银灰 / #000080 深蓝 / 白底宋体
*/

:root {
  --win-gray:   #c0c0c0;
  --win-light:  #dfdfdf;
  --win-dark:   #808080;
  --win-darker: #404040;
  --win-white:  #ffffff;
  --win-black:  #000000;
  --win-blue:   #000080;
  --win-blue2:  #1084d0;
  --win-red:    #ff0000;
  --win-green:  #008000;
  --win-teal:   #008080;

  /* aliases */
  --bg:       var(--win-gray);
  --surface:  var(--win-gray);
  --surface2: var(--win-light);
  --border:   var(--win-dark);
  --border-lt: var(--win-white);
  --border-dk: var(--win-darker);
  --accent:   var(--win-red);
  --gold:     var(--win-blue);
  --green:    var(--win-green);
  --blue:     var(--win-blue);
  --purple:   #800080;
  --gray:     var(--win-dark);
  --light:    var(--win-black);

  /* 系统字体栈：宋体/黑体系 */
  --font-ui:    "Unifont","MS Sans Serif","SimSun","宋体",Tahoma,Arial,sans-serif;
  --font-pixel: 'Press Start 2P', monospace;
  --font-mono:  "Unifont","Courier New","SimSun",monospace;
  --font-vt:    "Unifont","MS Sans Serif","SimSun","宋体",Tahoma,Arial,sans-serif;
}

/* ── Google Fonts (Press Start 2P only) ── */

/* GNU Unifont — 古早点阵字体 */
@font-face {
  font-family: 'Unifont';
  src: url('unifont.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}


/* ── reset ── */
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--win-gray);
  color:var(--win-black);
  font-family:"Unifont","MS Sans Serif","SimSun","宋体",Tahoma,Arial,sans-serif;
  font-size:14px;
}
.app{display:flex;flex-direction:column;height:100vh;}

/* ══════════════════════════════════════
   WIN95 立体边框 mixin classes
   ══════════════════════════════════════ */
.w-raised{border:2px solid;border-color:var(--win-white) var(--win-darker) var(--win-darker) var(--win-white);}
.w-inset {border:2px solid;border-color:var(--win-darker) var(--win-white) var(--win-white) var(--win-darker);}

/* ══════════════════════════════════════
   TOP BAR — 蓝色标题栏风格
   ══════════════════════════════════════ */
.topbar{
  display:grid;grid-template-columns:1fr auto;gap:8px;
  padding:3px 6px;
  background:linear-gradient(90deg,#000080 0%,#1084d0 100%);
  border-bottom:1px solid #000040;
  flex-shrink:0;
  min-height:54px;
  align-items:center;
}
.char-panel{display:flex;align-items:center;gap:8px;}
.avatar-frame{
  width:44px;height:44px;flex-shrink:0;cursor:pointer;
  border:2px solid;border-color:var(--win-darker) var(--win-white) var(--win-white) var(--win-darker);
  background:var(--win-gray);image-rendering:pixelated;overflow:hidden;
}
.avatar-frame img{width:100%;height:100%;object-fit:cover;image-rendering:pixelated;}
.avatar-default{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.char-info{flex:1;min-width:0;}
.char-name{
  font-family:var(--font-ui);font-size:13px;font-weight:bold;color:#fff;
  background:transparent;border:none;outline:none;
  width:160px;cursor:pointer;text-shadow:1px 1px 0 #000040;
}
.char-name:focus{background:rgba(255,255,255,.15);outline:1px dotted #fff;}
.level-row{display:flex;align-items:center;gap:5px;margin-top:3px;}
.lv-badge{
  font-family:var(--font-ui);font-size:11px;font-weight:bold;
  background:var(--win-gray);color:#000080;
  padding:1px 5px;
  border:2px solid;border-color:var(--win-white) var(--win-darker) var(--win-darker) var(--win-white);
  flex-shrink:0;
}
.xp-bar-wrap{
  flex:1;height:10px;background:#001;
  border:2px solid;border-color:var(--win-darker) var(--win-white) var(--win-white) var(--win-darker);
  overflow:hidden;min-width:60px;
}
.xp-bar{height:100%;background:#00cc00;transition:width .4s;}
.xp-text{font-size:10px;color:#fff;white-space:nowrap;flex-shrink:0;font-family:var(--font-ui);}
.levelup-btn{
  font-family:var(--font-ui);font-size:10px;font-weight:bold;
  background:#ffff00;color:#000;border:2px solid;border-color:var(--win-white) var(--win-darker) var(--win-darker) var(--win-white);
  padding:1px 5px;cursor:pointer;display:none;animation:blink 1s infinite;flex-shrink:0;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

/* ── POMODORO ── */
.pomo-panel{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:3px 8px;
  background:var(--win-gray);
  border:2px solid;border-color:var(--win-darker) var(--win-white) var(--win-white) var(--win-darker);
  min-width:180px;flex-shrink:0;
}
.pomo-display{font-family:"Courier New",monospace;font-size:18px;color:#cc0000;letter-spacing:2px;font-weight:bold;}
.pomo-display.running{color:#008000;}
.pomo-task-name{font-size:10px;color:#444;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--font-ui);}
.pomo-btns{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;max-width:190px;}
.pomo-btn{
  font-family:var(--font-ui);font-size:11px;
  padding:2px 6px;
  background:var(--win-gray);color:#000;
  border:2px solid;border-color:var(--win-white) var(--win-darker) var(--win-darker) var(--win-white);
  cursor:pointer;
}
.pomo-btn:hover{background:var(--win-light);}
.pomo-btn:active{border-color:var(--win-darker) var(--win-white) var(--win-white) var(--win-darker);}
.pomo-btn.active{background:#000080;color:#fff;border-color:var(--win-darker) var(--win-white) var(--win-white) var(--win-darker);}
.pomo-notify{font-size:10px;color:#444;font-family:var(--font-ui);}

/* ══════════════════════════════════════
   TABS — Win95 탭 스타일
   ══════════════════════════════════════ */
.tabs{
  display:flex;flex-wrap:nowrap;overflow-x:auto;
  background:var(--win-gray);
  border-bottom:2px solid var(--win-darker);
  padding:2px 4px 0;gap:1px;flex-shrink:0;
}
.tabs::-webkit-scrollbar{height:0;}
.tab{
  font-family:var(--font-ui);font-size:12px;
  padding:3px 10px 4px;cursor:pointer;
  background:var(--win-gray);color:#000;
  border:2px solid;
  border-color:var(--win-white) var(--win-darker) transparent var(--win-white);
  white-space:nowrap;flex-shrink:0;
  margin-bottom:-2px;user-select:none;
}
.tab:hover:not(.active){background:var(--win-light);}
.tab.active{
  background:var(--win-gray);font-weight:bold;
  border-color:var(--win-white) var(--win-darker) var(--win-gray) var(--win-white);
  z-index:1;position:relative;
}

/* ══════════════════════════════════════
   CONTENT AREA
   ══════════════════════════════════════ */
.content{flex:1;overflow:hidden;background:var(--win-gray);}
.section{display:none;height:100%;overflow-y:auto;padding:8px;}
.section.active{display:block;}

/* ══════════════════════════════════════
   BUTTONS
   ══════════════════════════════════════ */
.pxl-btn{
  font-family:var(--font-ui);font-size:12px;
  padding:3px 10px;
  background:var(--win-gray);color:#000;
  border:2px solid;border-color:var(--win-white) var(--win-darker) var(--win-darker) var(--win-white);
  cursor:pointer;white-space:nowrap;
}
.pxl-btn:hover{background:var(--win-light);}
.pxl-btn:active{border-color:var(--win-darker) var(--win-white) var(--win-white) var(--win-darker);transform:translate(1px,1px);}
.pxl-btn.primary{background:#000080;color:#fff;}
.pxl-btn.primary:hover{background:#0000a8;}
.pxl-btn.danger{color:#cc0000;}

/* ── inputs ── */
.search-bar,.form-input,.form-textarea{
  background:#fff;color:#000;
  border:2px solid;border-color:var(--win-darker) var(--win-white) var(--win-white) var(--win-darker);
  padding:4px 8px;font-family:var(--font-ui);font-size:13px;outline:none;
  width:440px;max-width:100%;display:block;
}
.search-bar::placeholder,.form-input::placeholder{color:#808080;}
.search-bar:focus,.form-input:focus,.form-textarea:focus{outline:1px dotted #000;outline-offset:-3px;}
.form-textarea{resize:vertical;}
.form-select{
  background:#fff;color:#000;
  border:2px solid;border-color:var(--win-darker) var(--win-white) var(--win-white) var(--win-darker);
  padding:2px 4px;font-family:var(--font-ui);font-size:13px;outline:none;
}

/* ── toolbar ── */
.toolbar{
  display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap;align-items:center;
}

/* ══════════════════════════════════════
   MODAL — Win95 대화창
   ══════════════════════════════════════ */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.4);
  z-index:100;align-items:center;justify-content:center;padding:16px;
}
.overlay.open{display:flex;}
.modal{
  background:var(--win-gray);
  border:3px solid;border-color:var(--win-white) var(--win-darker) var(--win-darker) var(--win-white);
  width:100%;max-width:480px;max-height:90vh;overflow-y:auto;position:relative;
  box-shadow:2px 2px 0 #000;
}
.modal-title{
  background:linear-gradient(90deg,#000080,#1084d0);
  color:#fff;font-family:var(--font-ui);font-size:12px;font-weight:bold;
  padding:3px 6px;
  display:flex;align-items:center;gap:6px;
}
.modal > .close-btn{
  position:absolute;top:3px;right:4px;
  background:var(--win-gray);
  border:2px solid;border-color:var(--win-white) var(--win-darker) var(--win-darker) var(--win-white);
  color:#000;font-size:10px;cursor:pointer;font-weight:bold;
  width:16px;height:14px;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-ui);
}
.modal > .close-btn:hover{background:#c0c0c0;}
.modal > .close-btn:active{border-color:var(--win-darker) var(--win-white) var(--win-white) var(--win-darker);}
.form-row{margin:8px auto 0;width:460px;max-width:100%;}
.form-label{font-size:12px;color:#000;display:block;margin-bottom:3px;font-family:var(--font-ui);width:440px;max-width:100%;}
.modal .form-select{width:440px;max-width:100%;display:block;}
.modal-btns{display:flex;gap:6px;margin:10px auto;width:460px;max-width:100%;justify-content:flex-end;}
.upload-btn{
  display:block;width:100%;padding:6px;
  background:#fff;
  border:2px solid;border-color:var(--win-darker) var(--win-white) var(--win-white) var(--win-darker);
  color:#000;cursor:pointer;text-align:center;font-size:12px;margin-top:4px;
  font-family:var(--font-ui);
}
.upload-btn:hover{background:var(--win-light);}

/* ══════════════════════════════════════
   TASKS
   ══════════════════════════════════════ */
.task-list{display:flex;flex-direction:column;gap:4px;}
.task-card{
  background:#fff;
  border:2px solid;border-color:var(--win-white) var(--win-darker) var(--win-darker) var(--win-white);
  border-left:4px solid #000080;
  padding:5px 8px;
}
.task-card.done{opacity:.6;}
.task-top{display:flex;align-items:flex-start;gap:6px;}
.task-check{
  width:13px;height:13px;
  border:2px solid;border-color:var(--win-darker) var(--win-white) var(--win-white) var(--win-darker);
  flex-shrink:0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  margin-top:1px;font-size:9px;background:#fff;
}
.task-check.checked{background:#000080;color:#fff;border-color:#000080;}
.task-title-wrap{flex:1;min-width:0;}
.task-title{font-size:13px;color:#000;word-break:break-word;font-family:var(--font-ui);}
.task-title.done-text{text-decoration:line-through;color:#808080;}
.task-meta{font-size:11px;color:#808080;margin-top:1px;font-family:var(--font-ui);}
.task-actions{display:flex;gap:1px;flex-shrink:0;}
.icon-btn{
  background:var(--win-gray);border:2px solid;border-color:var(--win-white) var(--win-darker) var(--win-darker) var(--win-white);
  color:#000;cursor:pointer;font-size:11px;padding:1px 4px;font-family:var(--font-ui);
}
.icon-btn:hover{background:var(--win-light);}
.icon-btn:active{border-color:var(--win-darker) var(--win-white) var(--win-white) var(--win-darker);}
.prog-row{display:flex;align-items:center;gap:6px;margin-top:4px;}
.prog-wrap{
  flex:1;height:10px;background:#fff;
  border:2px solid;border-color:var(--win-darker) var(--win-white) var(--win-white) var(--win-darker);
  overflow:hidden;
}
.prog-bar{height:100%;background:#000080;transition:width .3s;}
.pomo-record{margin-top:4px;font-size:11px;color:#800080;font-family:var(--font-ui);}
.dream-group-card{
  border:2px solid;border-color:var(--win-white) var(--win-darker) var(--win-darker) var(--win-white);
  margin-bottom:8px;background:#fff;
}
.dream-group-hdr{
  display:flex;align-items:center;gap:5px;padding:3px 6px;
  background:linear-gradient(90deg,#000080,#1084d0);cursor:default;
}
.dream-group-tog{cursor:pointer;font-size:11px;color:#fff;font-family:var(--font-ui);}
.dream-group-body{padding:6px;background:#fff;display:flex;flex-direction:column;gap:5px;}

/* ══════════════════════════════════════
   ENTRIES (journal / dreams / notes)
   ══════════════════════════════════════ */
.entry-card{
  background:#fff;
  border:2px solid;border-color:var(--win-darker) var(--win-white) var(--win-white) var(--win-darker);
  border-left:4px solid #000080;
  padding:6px 10px;margin-bottom:6px;
}
.entry-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.entry-ts{font-size:10px;color:#808080;font-family:var(--font-ui);}
.entry-body{font-size:13px;color:#000;line-height:1.6;white-space:pre-wrap;word-break:break-word;font-family:var(--font-ui);}
.entry-img{margin-top:6px;max-width:100%;max-height:200px;border:2px solid;border-color:var(--win-darker) var(--win-white) var(--win-white) var(--win-darker);}
.tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}
.tag{
  font-size:11px;background:#000080;color:#fff;
  padding:1px 6px;font-family:var(--font-ui);
  border:1px solid #000060;
}
.tag.dream-tag{background:#808080;color:#fff;border-color:#606060;}
.archive-row{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px;}
.arch-btn{
  font-size:11px;padding:2px 7px;font-family:var(--font-ui);
  background:var(--win-gray);color:#000;
  border:2px solid;border-color:var(--win-white) var(--win-darker) var(--win-darker) var(--win-white);
  cursor:pointer;
}
.arch-btn:hover{background:var(--win-light);}
.arch-btn.selected{background:#000080;color:#fff;}

/* ══════════════════════════════════════
   SETTINGS
   ══════════════════════════════════════ */
#sec-settings{overflow-y:auto;}
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@media(max-width:480px){.settings-grid{grid-template-columns:1fr;}}
.setting-card{
  background:var(--win-gray);
  border:2px solid;border-color:var(--win-darker) var(--win-white) var(--win-white) var(--win-darker);
  padding:8px;
}
.setting-title{font-size:11px;font-weight:bold;color:#000080;margin-bottom:8px;font-family:var(--font-ui);}
.color-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.color-label{font-size:12px;color:#000;flex:1;font-family:var(--font-ui);}

/* ══════════════════════════════════════
   TOAST
   ══════════════════════════════════════ */
.toast{
  position:fixed;top:60px;right:12px;
  background:#000080;color:#fff;
  border:2px solid;border-color:var(--win-white) var(--win-darker) var(--win-darker) var(--win-white);
  padding:5px 12px;font-family:var(--font-ui);font-size:12px;
  z-index:200;pointer-events:none;box-shadow:2px 2px 0 #000;
  animation:toastIn .2s,toastOut .3s 2.2s forwards;
}
@keyframes toastIn{from{opacity:0;transform:translateX(10px);}to{opacity:1;transform:none;}}
@keyframes toastOut{to{opacity:0;}}

/* ══════════════════════════════════════
   UNDO BAR
   ══════════════════════════════════════ */
.undo-bar{
  display:none;position:fixed;bottom:10px;left:50%;transform:translateX(-50%);
  background:var(--win-gray);
  border:2px solid;border-color:var(--win-white) var(--win-darker) var(--win-darker) var(--win-white);
  box-shadow:2px 2px 0 #000;
  padding:5px 14px;font-family:var(--font-ui);font-size:12px;
  z-index:200;gap:10px;align-items:center;white-space:nowrap;
}
.undo-bar.show{display:flex;}

/* ══════════════════════════════════════
   EMPTY STATE
   ══════════════════════════════════════ */
.empty-state{text-align:center;padding:40px 20px;color:#808080;font-size:13px;font-family:var(--font-ui);}
.empty-icon{font-size:32px;margin-bottom:10px;}

/* ══════════════════════════════════════
   PWA BANNER
   ══════════════════════════════════════ */
.install-banner{
  display:none;background:#000080;border-bottom:1px solid #000040;
  padding:4px 10px;font-family:var(--font-ui);font-size:12px;color:#fff;
  align-items:center;gap:8px;flex-shrink:0;
}
.install-banner.show{display:flex;}
.install-banner button{
  font-family:var(--font-ui);font-size:11px;padding:2px 8px;
  background:var(--win-gray);color:#000;
  border:2px solid;border-color:var(--win-white) var(--win-darker) var(--win-darker) var(--win-white);
  cursor:pointer;
}

/* ══════════════════════════════════════
   CARD NOTES (Zettelkasten)
   ══════════════════════════════════════ */
#sec-notes{background:#fff;}
#sec-notes .toolbar{background:var(--win-gray);}
.card-note{
  background:#fff;
  border:2px solid;border-color:var(--win-darker) var(--win-white) var(--win-white) var(--win-darker);
  border-left:4px solid #000080;
  padding:10px 12px;margin-bottom:8px;
  font-family:var(--font-ui);color:#000;font-size:13px;line-height:1.7;
}
.card-note.idea-card{border-left-color:#800080;}
.card-note-type{font-family:var(--font-ui);font-size:10px;font-weight:bold;color:#000080;margin-bottom:6px;letter-spacing:1px;}
.idea-card .card-note-type{color:#800080;}
.card-quote{font-style:italic;color:#000;border-left:3px solid #000080;padding-left:8px;margin-bottom:8px;line-height:1.7;white-space:pre-wrap;word-break:break-word;}
.card-body{color:#000;margin-bottom:6px;white-space:pre-wrap;word-break:break-word;}
.card-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px;}
.card-tag{font-size:11px;background:#000080;color:#fff;padding:1px 6px;border:1px solid #000060;}
.idea-card .card-tag{background:#800080;border-color:#600060;}
.card-actions{display:flex;gap:4px;align-items:center;margin-top:6px;border-top:1px solid #c0c0c0;padding-top:6px;flex-wrap:wrap;}
.card-action-btn{
  font-size:11px;padding:2px 7px;font-family:var(--font-ui);
  background:var(--win-gray);color:#000;
  border:2px solid;border-color:var(--win-white) var(--win-darker) var(--win-darker) var(--win-white);
  cursor:pointer;
}
.card-action-btn:hover{background:var(--win-light);}
.card-link-btn{color:#800080;}
.card-ts{font-size:10px;color:#808080;margin-left:auto;font-family:var(--font-ui);}
.card-link-panel{margin-top:6px;background:#f0f0f0;border:2px solid;border-color:var(--win-darker) var(--win-white) var(--win-white) var(--win-darker);padding:6px 8px;}

/* ── HIGHLIGHTS ── */
.hl-yellow{background:#ffff80;padding:0 1px;}
.hl-green{background:#80ff80;padding:0 1px;}
.hl-pink{background:#ffb0c8;padding:0 1px;}
.hl-blue{background:#80c0ff;padding:0 1px;}
.hl-toolbar{
  display:none;position:fixed;
  background:var(--win-gray);
  border:2px solid;border-color:var(--win-white) var(--win-darker) var(--win-darker) var(--win-white);
  box-shadow:2px 2px 0 #000;
  padding:3px 4px;gap:3px;z-index:500;align-items:center;
}
.hl-toolbar.show{display:flex;}
.hl-swatch{width:16px;height:16px;cursor:pointer;border:2px solid;border-color:var(--win-white) var(--win-darker) var(--win-darker) var(--win-white);}
.hl-swatch:hover{border-color:#000;}
.hl-clear{font-size:11px;color:#cc0000;cursor:pointer;padding:0 3px;border-left:1px solid #a0a0a0;margin-left:2px;font-family:var(--font-ui);}

/* ── TOOLTIP ── */
.gc-tooltip{
  position:fixed;z-index:9999;
  background:#ffffe0;color:#000;
  font-family:var(--font-ui);font-size:12px;
  padding:6px 10px;
  border:1px solid #000;max-width:260px;line-height:1.5;
  pointer-events:none;box-shadow:2px 2px 0 rgba(0,0,0,.3);
  white-space:pre-wrap;word-break:break-word;
}
.gc-tooltip-title{font-size:10px;font-weight:bold;color:#000080;display:block;margin-bottom:3px;font-family:var(--font-ui);}
.gc-tooltip-tag{display:inline-block;font-size:10px;background:#000080;color:#fff;padding:0 4px;margin-right:2px;margin-top:2px;}
.gc-tooltip-proj{font-size:11px;color:#800080;margin-top:2px;display:block;}

/* ══════════════════════════════════════
   GANTT
   ══════════════════════════════════════ */
#sec-gantt{padding:0;overflow:hidden;height:100%;}
#gantt-app{display:flex;height:100%;overflow:hidden;background:var(--win-gray);font-family:var(--font-ui);}
#g-sidebar{display:flex;flex-direction:column;width:200px;flex-shrink:0;background:var(--win-gray);border-right:2px solid var(--win-darker);transition:width .15s;}
#g-sidebar.g-sb-col{width:28px;}
#g-sb-hdr{
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(90deg,#000080,#1084d0);
  border-bottom:1px solid #000040;padding:3px 5px;flex-shrink:0;gap:3px;
}
#g-sb-title{font-size:11px;font-weight:bold;color:#fff;white-space:nowrap;overflow:hidden;flex:1;font-family:var(--font-ui);}
#g-sb-tog{
  font-size:10px;font-weight:bold;
  background:var(--win-gray);color:#000;
  border:2px solid;border-color:var(--win-white) var(--win-darker) var(--win-darker) var(--win-white);
  cursor:pointer;padding:0 3px;line-height:1.4;flex-shrink:0;font-family:var(--font-ui);
}
#g-sb-body{display:flex;flex-direction:column;flex:1;overflow:hidden;}
#g-sidebar.g-sb-col #g-sb-body{display:none;}
#g-sidebar.g-sb-col #g-sb-title{display:none;}
#g-sb-filter{display:flex;gap:2px;padding:3px 4px;background:var(--win-gray);border-bottom:1px solid #a0a0a0;flex-shrink:0;flex-wrap:wrap;}
.g-filt-btn{font-family:var(--font-ui);font-size:10px;padding:1px 5px;background:var(--win-gray);color:#000;border:2px solid;border-color:var(--win-white) var(--win-darker) var(--win-darker) var(--win-white);cursor:pointer;}
.g-filt-btn:active,.g-filt-btn.g-filt-on{background:#000080;color:#fff;border-color:var(--win-darker) var(--win-white) var(--win-white) var(--win-darker);}
#g-idea-list{flex:1;overflow-y:auto;padding:4px;display:flex;flex-direction:column;gap:2px;}
#g-idea-list::-webkit-scrollbar{width:14px;}
#g-idea-list::-webkit-scrollbar-track{background:var(--win-gray);}
#g-idea-list::-webkit-scrollbar-thumb{background:var(--win-gray);border:2px solid;border-color:var(--win-white) var(--win-darker) var(--win-darker) var(--win-white);}
.g-proj-group{display:flex;flex-direction:column;gap:1px;}
.g-proj-hdr{display:flex;align-items:center;gap:3px;padding:2px 4px;background:var(--win-gray);border:2px solid;border-color:var(--win-white) var(--win-darker) var(--win-darker) var(--win-white);cursor:grab;user-select:none;}
.g-proj-tog{font-size:9px;background:none;border:none;cursor:pointer;padding:0;color:#000;font-family:var(--font-ui);}
.g-proj-name{font-family:var(--font-ui);font-size:12px;color:#000;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-weight:bold;}
.g-children{display:flex;flex-direction:column;gap:1px;padding-left:6px;border-left:2px solid #a0a0a0;}
.g-card{border:2px solid;border-color:var(--win-white) var(--win-darker) var(--win-darker) var(--win-white);padding:2px 4px;cursor:grab;background:#fff;user-select:none;}
.g-card-name{font-family:var(--font-ui);font-size:12px;color:#000;display:block;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.g-done-item{opacity:.5;}
#g-rz{width:4px;flex-shrink:0;background:var(--win-dark);cursor:ew-resize;}
#g-rz:hover{background:#000080;}
#g-gantt{display:flex;flex-direction:column;flex:1;overflow:hidden;min-width:0;}
#g-tabs{display:flex;background:var(--win-gray);border-bottom:2px solid var(--win-darker);flex-shrink:0;}
.g-stab{font-family:var(--font-ui);font-size:12px;padding:3px 10px;border:none;border-right:1px solid #a0a0a0;cursor:pointer;background:var(--win-gray);color:#000;}
.g-stab.g-stab-on{background:#fff;font-weight:bold;}
#g-day-ctrl,#g-cal-ctrl{background:var(--win-gray);border-bottom:1px solid #a0a0a0;padding:3px 6px;display:flex;align-items:center;gap:4px;flex-shrink:0;flex-wrap:wrap;}
.g-navbtn{font-family:var(--font-ui);font-size:11px;border:2px solid;border-color:var(--win-white) var(--win-darker) var(--win-darker) var(--win-white);padding:1px 6px;cursor:pointer;background:var(--win-gray);color:#000;}
.g-navbtn:active{border-color:var(--win-darker) var(--win-white) var(--win-white) var(--win-darker);}
.g-gbtn{font-family:var(--font-ui);font-size:12px;border:2px solid;border-color:var(--win-white) var(--win-darker) var(--win-darker) var(--win-white);padding:0 5px;cursor:pointer;background:var(--win-gray);color:#000;line-height:1.4;}
#g-day-view{display:flex;flex-direction:column;flex:1;overflow:hidden;}
#g-day-scroll{flex:1;overflow:auto;}
#g-day-scroll::-webkit-scrollbar{width:14px;height:14px;}
#g-day-scroll::-webkit-scrollbar-thumb{background:var(--win-gray);border:2px solid;border-color:var(--win-white) var(--win-darker) var(--win-darker) var(--win-white);}
#g-day-grid{position:relative;display:inline-block;min-width:100%;}
.gd-hdr{display:flex;position:sticky;top:0;z-index:10;background:var(--win-gray);border-bottom:1px solid #a0a0a0;}
.gd-hcell{flex-shrink:0;font-family:var(--font-ui);font-size:10px;border-right:1px solid #a0a0a0;display:flex;align-items:center;padding-left:2px;color:#000;overflow:hidden;white-space:nowrap;height:18px;}
.gd-hcell.gd-now{background:#ffff80;color:#000;}
.gd-hcell.gd-hour{border-right:1px solid #606060;}
.gd-row{display:flex;position:relative;height:28px;border-bottom:1px solid #d0d0d0;}
.gd-row:nth-child(even){background:#f8f8f8;}
.gd-cells{display:flex;height:100%;position:relative;flex:1;}
.gd-cell{flex-shrink:0;height:100%;border-right:1px solid #e8e8e8;}
.gd-cell.gd-now{background:rgba(255,255,0,.15);}
.gd-cell.gd-hour{border-right:1px solid #b0b0b0;}
.gd-bar{position:absolute;top:3px;height:20px;border:2px solid;display:flex;align-items:center;cursor:grab;z-index:3;overflow:visible;will-change:left,width;box-shadow:1px 1px 0 rgba(0,0,0,.3);}
.gd-bar:active{cursor:grabbing;z-index:10;}
.gd-bar.gd-done{opacity:.4;}
.gd-bar-h{width:4px;flex-shrink:0;height:100%;cursor:ew-resize;display:flex;flex-direction:column;justify-content:center;gap:2px;padding:0 1px;}
.gd-bar-h span{display:block;width:2px;height:2px;background:rgba(0,0,0,.4);margin:0 auto;}
.gd-bar-lbl{flex:1;font-family:var(--font-ui);font-size:11px;text-align:center;pointer-events:none;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;padding:0 2px;color:#fff;text-shadow:1px 1px 0 rgba(0,0,0,.5);}
.gd-bar-x{position:absolute;right:1px;top:0;font-size:10px;color:rgba(0,0,0,.5);cursor:pointer;padding:0 2px;line-height:1.4;display:none;font-family:var(--font-ui);}
.gd-bar:hover .gd-bar-x{display:block;}
#g-cal-view{display:none;flex-direction:column;flex:1;overflow:hidden;}
#g-cal-view.active{display:flex;}
#g-cal-scroll{flex:1;overflow:auto;}
#g-cal-grid{position:relative;display:inline-block;min-width:100%;}
.gc-hdr{display:flex;position:sticky;top:0;z-index:10;background:var(--win-gray);border-bottom:1px solid #a0a0a0;}
.gc-hcell{flex-shrink:0;border-right:1px solid #a0a0a0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#000;overflow:hidden;height:26px;}
.gc-hcell.gc-today{background:#ffff80;color:#000;}
.gc-hcell.gc-weekend{background:#e8e8f8;}
.gc-hdate{font-family:var(--font-ui);font-size:10px;font-weight:bold;}
.gc-hday{font-size:9px;color:#808080;}
.gc-row{display:flex;position:relative;height:26px;border-bottom:1px solid #d0d0d0;}
.gc-sort-btns{position:absolute;left:0;top:0;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;gap:1px;z-index:8;padding:0 2px;background:rgba(192,192,192,.95);border-right:1px solid #a0a0a0;}
.gc-row:hover .gc-sort-btns{display:flex;}
.gc-row-btn{font-family:var(--font-ui);font-size:9px;background:none;border:none;cursor:pointer;color:#000080;padding:0;line-height:1;width:12px;height:11px;display:flex;align-items:center;justify-content:center;}
.gc-row-btn:hover{color:#cc0000;}
.gc-row:nth-child(even){background:#f8f8f8;}
.gc-cells{display:flex;height:100%;position:relative;flex:1;}
.gc-cell{flex-shrink:0;height:100%;border-right:1px solid #e8e8e8;}
.gc-cell.gc-today{background:rgba(255,255,0,.1);}
.gc-cell.gc-weekend{background:rgba(0,0,128,.02);}
.gc-bar{position:absolute;top:3px;height:18px;border:2px solid;display:flex;align-items:center;cursor:grab;z-index:3;overflow:visible;will-change:left,width;box-shadow:1px 1px 0 rgba(0,0,0,.3);}
.gc-bar:active{cursor:grabbing;z-index:10;}
.gc-bar.gc-done{opacity:.4;}
.gc-bar-h{width:4px;flex-shrink:0;height:100%;cursor:ew-resize;display:flex;flex-direction:column;justify-content:center;gap:2px;padding:0 1px;}
.gc-bar-h span{display:block;width:2px;height:2px;background:rgba(0,0,0,.4);margin:0 auto;}
.gc-bar-lbl{flex:1;font-family:var(--font-ui);font-size:10px;text-align:center;pointer-events:none;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;padding:0 2px;color:#fff;text-shadow:1px 1px 0 rgba(0,0,0,.5);}
.gc-bar-x{position:absolute;right:1px;top:0;font-size:10px;color:rgba(0,0,0,.5);cursor:pointer;padding:0 2px;line-height:1.4;display:none;font-family:var(--font-ui);}
.gc-bar:hover .gc-bar-x{display:block;}

/* ══════════════════════════════════════
   ENG CARDS
   ══════════════════════════════════════ */
#sec-eng{background:#f8f8f8;overflow-y:auto;}
.eng-card{
  background:#fff;
  border:2px solid;border-color:var(--win-darker) var(--win-white) var(--win-white) var(--win-darker);
  padding:10px 12px;margin-bottom:10px;
  font-family:"Times New Roman","SimSun","宋体",serif;
}
.eng-card-body{
  font-size:15px;line-height:1.9;color:#000;cursor:text;
  white-space:pre-wrap;word-break:break-word;user-select:text;
  font-family:"Times New Roman","SimSun","宋体",serif;
}
.eng-mask{background:#a0a0a0;color:transparent;padding:0 1px;cursor:pointer;user-select:none;}
.eng-mask-revealed{background:#d0d0ff;color:#000;}

/* ══════════════════════════════════════
   CHECKIN
   ══════════════════════════════════════ */
#sec-checkin{overflow-y:auto;background:var(--win-gray);}
#ci-calendar{padding-bottom:16px;}

/* ══════════════════════════════════════
   SCROLLBARS — Win95 style
   ══════════════════════════════════════ */
::-webkit-scrollbar{width:16px;height:16px;}
::-webkit-scrollbar-track{background:var(--win-gray);}
::-webkit-scrollbar-thumb{
  background:var(--win-gray);
  border:2px solid;border-color:var(--win-white) var(--win-darker) var(--win-darker) var(--win-white);
}
::-webkit-scrollbar-button{
  background:var(--win-gray);
  border:2px solid;border-color:var(--win-white) var(--win-darker) var(--win-darker) var(--win-white);
  display:block;width:16px;height:16px;
}

/* ── misc leftovers ── */
.ev-color-opt{width:20px;height:20px;cursor:pointer;border:2px solid;border-color:var(--win-white) var(--win-darker) var(--win-darker) var(--win-white);}
.ev-color-opt.selected{border-color:#000;}
.gn-chip{display:inline-flex;align-items:center;gap:2px;background:#fff;border:1px solid #808080;padding:1px 4px;font-family:var(--font-ui);font-size:11px;color:#000;margin:1px;cursor:default;max-width:90px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;vertical-align:middle;}
.gn-chip-x{font-size:9px;color:#808080;cursor:pointer;padding:0 1px;flex-shrink:0;line-height:1;}
.gn-chip-x:hover{color:#cc0000;}
.gn-add-btn{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;background:none;border:1px solid #808080;cursor:pointer;font-size:11px;color:#808080;vertical-align:middle;margin:1px;}
.gn-add-btn:hover{border-color:#000080;color:#000080;}
.ci-panel{font-family:var(--font-ui);}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- PWA install prompt -->
  <div class="install-banner" id="installBanner">
    <span>📲 安装到桌面，番茄钟后台照常运行！</span>
    <button onclick="installPWA()">立即安装</button>
    <button onclick="document.getElementById('installBanner').classList.remove('show')" style="background:transparent;border:1px solid var(--blue);color:#000080;">稍后</button>
  </div>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="char-panel">
      <div class="avatar-frame" onclick="document.getElementById('avatarInput').click()" title="点击更换头像">
        <div class="avatar-default" id="avatarDefault">
          <svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
            <!-- Win95 style user icon -->
            <rect width="48" height="48" fill="#c0c0c0"/>
            <!-- head -->
            <rect x="16" y="6" width="16" height="16" fill="#ffcc99"/>
            <rect x="14" y="8" width="2" height="12" fill="#ffcc99"/>
            <rect x="32" y="8" width="2" height="12" fill="#ffcc99"/>
            <!-- eyes -->
            <rect x="18" y="11" width="3" height="3" fill="#000"/>
            <rect x="27" y="11" width="3" height="3" fill="#000"/>
            <!-- mouth -->
            <rect x="20" y="17" width="8" height="2" fill="#cc7755"/>
            <!-- hair -->
            <rect x="14" y="4" width="20" height="6" fill="#442200"/>
            <rect x="14" y="6" width="2" height="4" fill="#442200"/>
            <rect x="32" y="6" width="2" height="4" fill="#442200"/>
            <!-- body -->
            <rect x="12" y="24" width="24" height="18" fill="#0000aa"/>
            <!-- arms -->
            <rect x="6" y="24" width="6" height="14" fill="#0000aa"/>
            <rect x="36" y="24" width="6" height="14" fill="#0000aa"/>
            <!-- hands -->
            <rect x="6" y="38" width="6" height="4" fill="#ffcc99"/>
            <rect x="36" y="38" width="6" height="4" fill="#ffcc99"/>
            <!-- legs -->
            <rect x="14" y="42" width="8" height="6" fill="#222"/>
            <rect x="26" y="42" width="8" height="6" fill="#222"/>
          </svg>
        </div>
        <img id="avatarImg" style="display:none;" alt="avatar"/>
      </div>
      <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="loadAvatar(this)"/>
      <div class="char-info">
        <input class="char-name" id="charName" value="MMM" spellcheck="false"/>
        <div class="level-row">
          <div class="lv-badge">LV <span id="charLevel">1</span></div>
          <div class="xp-bar-wrap"><div class="xp-bar" id="xpBar" style="width:0%"></div></div>
          <div class="xp-text" id="xpText">0/100</div>
          <button class="levelup-btn" id="levelupBtn" onclick="doLevelUp()">LEVEL UP!</button>
        </div>
      </div>
    </div>
    <!-- POMODORO -->
    <div class="pomo-panel">
      <div class="pomo-display" id="pomoDisplay" style="font-family:'Courier New',monospace;font-size:18px;font-weight:bold;color:#cc0000;letter-spacing:2px;">--:--</div>
      <div class="pomo-task-name" id="pomoTaskName">无绑定任务</div>
      <div class="pomo-btns">
        <button class="pomo-btn" onclick="startPomo(5)" data-min="5">5m</button>
        <button class="pomo-btn" onclick="startPomo(10)" data-min="10">10m</button>
        <button class="pomo-btn" onclick="startPomo(15)" data-min="15">15m</button>
        <button class="pomo-btn" onclick="startPomo(30)" data-min="30">30m</button>
        <button class="pomo-btn" onclick="startPomo(60)" data-min="60">60m</button>
        <button class="pomo-btn" onclick="startPomo(90)" data-min="90">90m</button>
        <button class="pomo-btn" onclick="stopPomo()" style="color:#cc0000;">■</button>
      </div>
      <div class="pomo-notify" id="pomoNotify">🔔 开启通知后台可用</div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" onclick="showTab('tasks',this)">任务</div>
    <div class="tab" onclick="showTab('gantt',this)">甘特图</div>
    <div class="tab" onclick="showTab('journal',this)">自我对话</div>
    <div class="tab" onclick="showTab('checkin',this)">日历打卡</div>
    <div class="tab" onclick="showTab('eng',this)">英语卡片</div>
    <div class="tab" onclick="showTab('dreams',this)">梦想收集</div>
    <div class="tab" onclick="showTab('notes',this)">卡片笔记</div>
    <div class="tab" onclick="showTab('settings',this)">设置</div>
  </div>

  <!-- MAIN -->
  <div class="content">

    <!-- TASKS -->
    <div class="section active" id="sec-tasks">
      <div class="toolbar">
        <button class="pxl-btn primary" onclick="openNewTask('todo')">✅ + 小任务</button>
        <button class="pxl-btn" onclick="openNewTask('project')" style="">+ 项目</button>
        <button class="pxl-btn" onclick="openNewTask('nontask')" style="">+ 非任务</button>
        <input class="search-bar" id="taskSearch" placeholder="搜索..." oninput="renderTasks()"/>
        <select class="form-select" id="taskFilter" onchange="renderTasks()">
          <option value="all">全部</option>
          <option value="projects">项目</option>
          <option value="standalone">零散小任务</option>
          <option value="nontask">非任务</option>
          <option value="todo">待办</option>
          <option value="done">已完成</option>
        </select>
        <button class="pxl-btn" onclick="exportTasks()">📄 导出</button>
      </div>
      <div id="archiveT" class="archive-row"></div>
      <div class="task-list" id="taskList"></div>
    </div>


    <!-- CHECKIN -->
    <div class="section" id="sec-checkin">
      <div class="toolbar" style="justify-content:space-between;flex-wrap:wrap;gap:6px;">
        <div style="display:flex;gap:6px;align-items:center;">
          <button class="pxl-btn" onclick="ciNavMonth(-1)">◀</button>
          <div id="ci-month-lbl" style="font-family:var(--font-ui);font-size:12px;font-weight:bold;min-width:100px;text-align:center;"></div>
          <button class="pxl-btn" onclick="ciNavMonth(1)">▶</button>
          <button class="pxl-btn" onclick="ciGoToday()">TODAY</button>
        </div>
        <button class="pxl-btn primary" onclick="openHabitModal()">🌱 + 新建习惯</button>
      </div>
      <div id="ci-habits-strip"></div>
      <div id="ci-calendar"></div>
    </div>

    <!-- JOURNAL -->
    <div class="section" id="sec-journal">
      <div class="toolbar">
        <button class="pxl-btn primary" onclick="openModal('journalModal')">+ 新建日记</button>
        <input class="search-bar" id="journalSearch" placeholder="关键词搜索..." oninput="renderJournal()"/>
        <button class="pxl-btn" onclick="exportJournal()">📄 导出</button>
        <button class="pxl-btn" onclick="showRandomEntry()" style="border-color:#800080;color:var(--purple);">>> 随机回溯</button>
        <button class="pxl-btn" onclick="openLinkPanel()" style="border-color:#000080;color:var(--blue);">🔗 条目关联</button>
      </div>
      <div id="randomCard" style="display:none;"></div>
      <div id="linkPanel" style="display:none;"></div>
      <div id="archiveJ" class="archive-row"></div>
      <div id="journalList"></div>
    </div>

    <!-- DREAMS -->
    <div class="section" id="sec-dreams">
      <div class="toolbar">
        <button class="pxl-btn primary" onclick="openDreamModal()">✨ + 添加梦想</button>
        <button class="pxl-btn" onclick="openDreamGroupModal()" style="border-color:#000080;color:var(--gold);">+ 新建集合</button>
        <input class="search-bar" id="dreamSearch" placeholder="关键词搜索..." oninput="renderDreams()"/>
        <button class="pxl-btn" onclick="exportDreams()">📄 导出</button>
      </div>
      <div id="archiveD" class="archive-row"></div>
      <div id="dreamList"></div>
    </div>



    <!-- ENG CARDS -->
    <div class="section" id="sec-eng" style="overflow-y:auto;">
      <div id="eng-app" style="max-width:820px;margin:0 auto;padding:16px;font-family:Arial,Helvetica,sans-serif;">
        <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;">
          <button class="pxl-btn primary" onclick="openEngCardModal()">📝 + 新建卡片</button>
          <span style="font-size:12px;color:#808080;">划选文字可高亮、遮蔽或添加生词</span>
        </div>
        <div id="eng-card-list"></div>
        <!-- vocab section -->
        <div id="eng-vocab-wrap" style="margin-top:20px;border-top:2px solid var(--border);padding-top:12px;">
          <div style="display:flex;align-items:center;gap:8px;cursor:pointer;" onclick="toggleEngVocab()">
            <span id="eng-vocab-tog" style="font-size:12px;color:#cc0000;">▾</span>
            <span style="font-size:12px;font-weight:bold;color:#000;">生词本</span>
            <span id="eng-vocab-count" style="font-size:12px;color:#808080;"></span>
          </div>
          <div id="eng-vocab-list" style="margin-top:10px;"></div>
        </div>
      </div>
    </div>

    <!-- NOTES (Zettelkasten) -->
    <div class="section" id="sec-notes">
      <div class="toolbar">
        <button class="pxl-btn primary" onclick="newCard()">🃏 + 新建卡片</button>
        <input class="search-bar" id="cardSearch" placeholder="搜索内容/标签..." oninput="renderCards()"/>
        <button class="pxl-btn" onclick="exportCards()">📄 导出</button>
      </div>
      <div style="background:var(--surface2);border-left:3px solid var(--blue);padding:8px 12px;margin-bottom:12px;font-size:13px;color:#808080;line-height:1.6;">
        一卡一想法 · 用自己的话写 · 与其他卡片建立链接
      </div>
      <div id="cardList"></div>
    </div>


    <!-- GANTT -->
    <div class="section" id="sec-gantt">
      <div id="gantt-app">
        <!-- SIDEBAR -->
        <div id="g-sidebar">
          <div id="g-sb-hdr">
            <span id="g-sb-title">TASKS</span>
            <button id="g-sb-tog" onclick="ganttToggleSB()">&#9664;</button>
          </div>
          <div id="g-sb-filter" style="display:flex;gap:2px;padding:4px 6px;background:#c8b0e8;border-bottom:2px solid #1a1a2e;flex-shrink:0;flex-wrap:wrap;">
            <button class="g-filt-btn g-filt-on" id="g-filt-todo" onclick="ganttSetFilter('todo')">未完成</button>
            <button class="g-filt-btn" id="g-filt-all" onclick="ganttSetFilter('all')">全部</button>
            <button class="g-filt-btn" id="g-filt-proj" onclick="ganttSetFilter('projects')">项目</button>
            <button class="g-filt-btn" id="g-filt-solo" onclick="ganttSetFilter('standalone')">零散</button>
            <button class="g-filt-btn" id="g-filt-nt" onclick="ganttSetFilter('nontask')">非任务</button>
          </div>
          <div id="g-sb-body">
            <div id="g-idea-list"></div>
          </div>
        </div>
        <div id="g-rz"></div>
        <!-- MAIN PANEL -->
        <div id="g-gantt">
          <!-- sub-tabs -->
          <div id="g-tabs">
            <button class="g-stab g-stab-on" id="g-tab-day" onclick="ganttSwitchTab('day')">日程</button>
            <button class="g-stab" id="g-tab-cal" onclick="ganttSwitchTab('cal')">日历</button>
          </div>
          <!-- DAY VIEW -->
          <div id="g-day-view">
            <div id="g-day-ctrl">
              <button class="g-navbtn" onclick="gDayNav(-1)">&#9664;</button>
              <div id="g-day-lbl" style="font-size:12px;font-weight:bold;min-width:100px;text-align:center;"></div>
              <button class="g-navbtn" onclick="gDayNav(1)">&#9654;</button>
              <button class="g-navbtn" onclick="gDayToday()" style="background:#f0e8b0;">TODAY</button>
              <button class="g-navbtn" onclick="gDayScrollNow()" style="background:#e8d030;">NOW</button>
              <div id="g-grain-wrap" style="display:flex;align-items:center;gap:3px;margin-left:4px;">
                <button class="g-gbtn" onclick="gChgGrain(-1)">-</button>
                <span id="g-grain-lbl" style="font-size:11px;min-width:28px;text-align:center;background:#fff;border:2px inset #808080;padding:1px 3px;">30m</span>
                <button class="g-gbtn" onclick="gChgGrain(1)">+</button>
              </div>
            </div>
            <div id="g-day-scroll">
              <div id="g-day-grid"></div>
            </div>
          </div>
          <!-- CAL VIEW -->
          <div id="g-cal-view" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
            <div id="g-cal-ctrl">
              <button class="g-navbtn" onclick="gCalNav(-1)">&#9664;</button>
              <div id="g-cal-lbl" style="font-size:12px;font-weight:bold;min-width:120px;text-align:center;"></div>
              <button class="g-navbtn" onclick="gCalNav(1)">&#9654;</button>
              <button class="g-navbtn" onclick="gCalToday()" style="background:#f0e8b0;">TODAY</button>
            </div>
            <div id="g-cal-scroll">
              <div id="g-cal-grid"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- SETTINGS -->
    <div class="section" id="sec-settings">

<script>
// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let S = {
  charName:'MMM', level:1, xp:0,
  tasks:[], journal:[], dreams:[], cards:[], events:[], ganttPos:{}, ganttNotes:{},
  habits:[], checkins:{}, energyTags:[], dreamGroups:[],
  theme:{}, nextId:1,
  avatar:null, bgImg:null
};

let undoStack=[], undoTimer=null;
let _taskMonthFilter = null;
let _projCollapsed = {};
let jMonthFilter=null, dMonthFilter=null;

// ── Pomodoro ──
let pomoTimer=null, pomoSec=0, pomoTaskId=null, pomoMin=0;
let pomoStartWall=0; // wall-clock start time for drift correction
let pomoEndWall=0;

// ═══════════════════════════════════════
// STORAGE — localStorage + Supabase sync
// ═══════════════════════════════════════
const SB_URL = 'https://mtrxasnouojkgsedudhs.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10cnhhc25vdW9qa2dzZWR1ZGhzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNzI4NzYsImV4cCI6MjA5MTk0ODg3Nn0.qV783OBRfd8X03s_UnciFGJRW5WG9LpJzEcNcgG-Kgg';
const SB_TABLE = 'rpg_data';
const SB_ROW_KEY = 'state';
const SB_HEADERS = {
  'Content-Type': 'application/json',
  'apikey': SB_KEY,
  'Authorization': 'Bearer ' + SB_KEY,
  'Prefer': 'resolution=merge-duplicates'
};

let _saveTimer = null;
let _syncIndicator = null;

function setSyncStatus(status) {
  // status: 'saving' | 'saved' | 'offline' | 'error'
  let el = document.getElementById('sync-status');
  if (!el) {
    el = document.createElement('div');
    el.id = 'sync-status';
    el.style.cssText = 'position:fixed;bottom:10px;right:10px;font-family:monospace;font-size:11px;padding:4px 10px;border-radius:4px;z-index:999;transition:opacity 0.5s;pointer-events:none;';
    document.body.appendChild(el);
  }
  const styles = {
    saving:  'background:#1a1a35;color:#4a90d9;border:1px solid #4a90d9;opacity:1;',
    saved:   'background:#1a1a35;color:#4ecb71;border:1px solid #4ecb71;opacity:1;',
    offline: 'background:#1a1a35;color:#f5a623;border:1px solid #f5a623;opacity:1;',
    error:   'background:#1a1a35;color:#e94560;border:1px solid #e94560;opacity:1;',
  };
  const labels = { saving:'↑ 同步中...', saved:'✓ 已同步', offline:'⚡ 离线模式', error:'✕ 同步失败' };
  el.style.cssText += styles[status] || styles.offline;
  el.textContent = labels[status] || '';
  if (status === 'saved') {
    setTimeout(() => { el.style.opacity = '0'; }, 2000);
  }
}

// Save to localStorage immediately, debounce cloud sync by 1.5s
function saveState() {
  try { localStorage.setItem('adhd-rpg-v2', JSON.stringify(S)); } catch(e) {}
  if (_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(syncToCloud, 1500);
}

async function syncToCloud() {
  try {
    setSyncStatus('saving');
    const payload = JSON.stringify(S);
    const res = await fetch(SB_URL + '/rest/v1/' + SB_TABLE, {
      method: 'POST',
      headers: SB_HEADERS,
      body: JSON.stringify({ key: SB_ROW_KEY, value: payload })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    setSyncStatus('saved');
  } catch(e) {
    setSyncStatus(navigator.onLine ? 'error' : 'offline');
  }
}

// Safely merge loaded data into S — never discard existing arrays
function migrateState(loaded) {
  // Copy every field from loaded into S
  Object.keys(loaded).forEach(k => { S[k] = loaded[k]; });
  // Guarantee all required arrays exist (add missing ones, never overwrite)
  // migrate old task format: keep existing tasks, add type field if missing
  (S.tasks||[]).forEach(t=>{ if(!t.type) t.type='todo'; });
  if(!S.ganttPos || typeof S.ganttPos!=='object') S.ganttPos={};
  if(!Array.isArray(S.habits)) S.habits=[];
  if(!Array.isArray(S.dreamGroups)) S.dreamGroups=[];
  if(!Array.isArray(S.engCards)) S.engCards=[];
  if(!Array.isArray(S.vocab)) S.vocab=[];
  if(!S.checkins || typeof S.checkins!=='object') S.checkins={};
  if(!Array.isArray(S.energyTags)) S.energyTags=[];
  if(!S.dayNotes || typeof S.dayNotes!=='object') S.dayNotes={};
  if(!Array.isArray(S.events)) S.events=[];
  if(!S.ganttNotes || typeof S.ganttNotes!=='object') S.ganttNotes={};
  if(typeof gMigratePos==='function') gMigratePos();
  ['tasks','journal','dreams','cards',
   'fleeting','permanent','lit','ideas','drafts'].forEach(k => {
    if (!Array.isArray(S[k])) S[k] = [];
  });
  // Guarantee scalars
  if (!S.charName) S.charName = 'MMM';
  if (typeof S.level  !== 'number') S.level   = 1;
  if (typeof S.xp     !== 'number') S.xp      = 0;
  if (typeof S.nextId !== 'number') S.nextId  = 1;
  if (!S.theme || typeof S.theme !== 'object') S.theme = {};
}

// Load: try cloud first, fall back to localStorage
async function loadState() {
  // Show local data immediately so UI is not blank
  try {
    const local = localStorage.getItem('adhd-rpg-v2');
    if (local) { migrateState(JSON.parse(local)); }
  } catch(e) {}

  // Then try to fetch cloud data (may be newer)
  try {
    const res = await fetch(
      SB_URL + '/rest/v1/' + SB_TABLE + '?key=eq.' + SB_ROW_KEY + '&select=value',
      { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY } }
    );
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    if (rows && rows.length && rows[0].value) {
      const cloud = JSON.parse(rows[0].value);
      migrateState(cloud);
      // Update local cache with cloud data
      try { localStorage.setItem('adhd-rpg-v2', JSON.stringify(S)); } catch(e) {}
      setSyncStatus('saved');
      renderAll(); // re-render with cloud data
    } else {
      // No cloud data yet — push local data up
      setSyncStatus('offline');
      syncToCloud();
    }
  } catch(e) {
    setSyncStatus('offline');
  }
}

// ═══════════════════════════════════════
// XP / LEVEL
// ═══════════════════════════════════════
function xpNeeded(lv){ return Math.floor(100*Math.pow(1.45,lv-1)); }

function addXP(amt, label){
  S.xp+=amt; saveState(); updateXPUI();
  showToast('+'+amt+' XP  ('+label+')');
}

function updateXPUI(){
  const need=xpNeeded(S.level);
  const pct=Math.min(100,Math.floor(S.xp/need*100));
  document.getElementById('xpBar').style.width=pct+'%';
  document.getElementById('xpText').textContent=S.xp+'/'+need;
  document.getElementById('charLevel').textContent=S.level;
  document.getElementById('levelupBtn').style.display=S.xp>=need?'inline-block':'none';
}

function doLevelUp(){
  const need=xpNeeded(S.level);
  if(S.xp<need) return;
  S.xp-=need; S.level++;
  saveState(); updateXPUI();
  showToast('🎉 升级！现在是 LV'+S.level);
}

// ═══════════════════════════════════════
// TOAST / UNDO
// ═══════════════════════════════════════
function showToast(msg){
  const el=document.createElement('div');
  el.className='toast'; el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2800);
}

function showUndoBar(msg){
  document.getElementById('undoMsg').textContent=msg;
  document.getElementById('undoBar').classList.add('show');
  if(undoTimer) clearTimeout(undoTimer);
  undoTimer=setTimeout(()=>document.getElementById('undoBar').classList.remove('show'),6000);
}

function doUndo(){
  if(!undoStack.length) return;
  Object.assign(S, JSON.parse(undoStack.pop()));
  saveState(); updateXPUI(); renderAll();
  document.getElementById('undoBar').classList.remove('show');
}

// ═══════════════════════════════════════
// TABS
// ═══════════════════════════════════════
function showTab(tab, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('sec-'+tab).classList.add('active');
  if(tab==='tasks') renderTasks();
  if(tab==='journal') renderJournal();
  if(tab==='dreams') renderDreams();
  if(tab==='notes') renderCards();
  if(tab==='gantt') ganttRender();
  if(tab==='checkin') renderCheckin();
  if(tab==='eng') renderEngCards();
}

// ═══════════════════════════════════════
// MODALS
// ═══════════════════════════════════════
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

function openNewTask(type, projectId){
  document.getElementById('taskType').value = type;
  document.getElementById('editTaskId').value = '';
  document.getElementById('taskName').value = '';
  document.getElementById('taskNote').value = '';
  const isProject = type === 'project';
  const isNonTask = type === 'nontask';
  document.getElementById('taskModalTitle').textContent = isProject ? '新建项目' : isNonTask ? '新建非任务' : '新建小任务';
  document.getElementById('taskNoteRow').style.display = 'block';
  document.getElementById('taskProjectRow').style.display = (isProject||isNonTask) ? 'none' : 'block';
  renderEnergyPicker(null);
  const sel = document.getElementById('taskProject');
  const projects = S.tasks.filter(t => t.type === 'project' && !t.done);
  sel.innerHTML = '<option value="">无（独立任务）</option>' +
    projects.map(p => '<option value="' + p.id + '"' + (p.id == projectId ? ' selected' : '') + '>' + p.name + '</option>').join('');
  openModal('taskModal');
  setTimeout(() => document.getElementById('taskName').focus(), 100);
}

function addChildTask(projectId){ openNewTask('todo', projectId); }

function openEditTask(id){
  const t = S.tasks.find(x => x.id == id); if(!t) return;
  const isProject = t.type === 'project';
  const isNonTask = t.type === 'nontask';
  document.getElementById('taskType').value = t.type || 'todo';
  document.getElementById('editTaskId').value = id;
  document.getElementById('taskName').value = t.name || '';
  document.getElementById('taskNote').value = t.note || '';
  document.getElementById('taskModalTitle').textContent = isProject ? '编辑项目' : isNonTask ? '编辑非任务' : '编辑任务';
  document.getElementById('taskNoteRow').style.display = 'block';
  document.getElementById('taskProjectRow').style.display = (isProject||isNonTask) ? 'none' : 'block';
  renderEnergyPicker(t.energyTag||null);
  const sel = document.getElementById('taskProject');
  const projects = S.tasks.filter(x => x.type === 'project' && !x.done && x.id != id);
  sel.innerHTML = '<option value="">无（独立任务）</option>' +
    projects.map(p => '<option value="' + p.id + '"' + (p.id == t.projectId ? ' selected' : '') + '>' + p.name + '</option>').join('');
  openModal('taskModal');
}

function openTaskModal(id){ if(id) openEditTask(id); else openNewTask('todo'); }

function saveTask(){
  const name = document.getElementById('taskName').value.trim();
  if(!name) return;
  const type = document.getElementById('taskType').value || 'todo';
  const desc = ''; const tags = [];
  const projectId = (type === 'todo') ? (parseInt(document.getElementById('taskProject').value)||null) : null;
  const _etEl = document.getElementById('taskEnergySelected');
  const energyTag = (_etEl && _etEl.dataset.val && _etEl.dataset.val.trim()) ? _etEl.dataset.val.trim() : null;
  const editId = document.getElementById('editTaskId').value;
  undoStack.push(JSON.stringify(S));
  const note = document.getElementById('taskNote').value.trim();
  if(editId){
    const t = S.tasks.find(x => x.id == editId);
    if(t){ Object.assign(t, {name, type, desc, tags, projectId, note, energyTag}); }
  } else {
    S.tasks.unshift({
      id: S.nextId++, name, type, desc, tags, projectId, note, energyTag,
      done: false, createdAt: new Date().toISOString(), pomoRecords:[]
    });
  }
  saveState(); closeModal('taskModal'); renderTasks();
}

function deleteTask(id){
  undoStack.push(JSON.stringify(S));
  // also remove association from child tasks
  S.tasks.forEach(t=>{ if(t.projectId==id) t.projectId=null; });
  S.tasks = S.tasks.filter(t => t.id != id);
  saveState(); renderTasks(); showUndoBar('已删除');
}

function toggleTask(id){
  const t = S.tasks.find(x => x.id == id); if(!t) return;
  undoStack.push(JSON.stringify(S));
  t.done = !t.done;
  if(t.done){
    t.doneAt = new Date().toISOString();
    addXP(10, '完成任务');
    if(pomoTimer && pomoTaskId == id){
      const elapsed = pomoMin*60 - Math.max(0, Math.round((pomoEndWall-Date.now())/1000));
      const m = Math.floor(elapsed/60), s = elapsed%60;
      if(!t.pomoRecords) t.pomoRecords = [];
      t.pomoRecords.push(m+'m'+p2(s)+'s @ '+fmtDT(new Date().toISOString())+'（完成时快照）');
    }
  }
  saveState(); renderTasks();
  // sync gantt if visible
  const _gs=document.getElementById('sec-gantt');
  if(_gs&&_gs.classList.contains('active')) ganttRender();
}

function bindPomo(id){
  const t = S.tasks.find(x => x.id == id); if(!t) return;
  pomoTaskId = id;
  document.getElementById('pomoTaskName').textContent = t.name;
  showToast('🍅 已绑定: '+t.name);
}


function fmtDT(iso){
  if(!iso) return '';
  const d = new Date(iso);
  return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate())+' '+p2(d.getHours())+':'+p2(d.getMinutes());
}
function p2(n){ return String(n).padStart(2,'0'); }

function renderTasks(){
  const search = (document.getElementById('taskSearch')||{value:''}).value.toLowerCase();
  const filter = document.getElementById('taskFilter').value;

  // month archive
  const doneItems = S.tasks.filter(t=>t.done && t.doneAt);
  const monthMap = {};
  doneItems.forEach(t=>{ const ym=(t.doneAt||t.createdAt||'').slice(0,7); if(ym) monthMap[ym]=(monthMap[ym]||0)+1; });
  renderArchive('archiveT', doneItems.map(t=>({createdAt:t.doneAt})), _taskMonthFilter, m=>{ _taskMonthFilter=m; renderTasks(); });

  const sortedTasks=[...(S.tasks||[])];
  let tasks = sortedTasks.filter(t=>{
    if(search && !(t.name||'').toLowerCase().includes(search)) return false;
    if(filter==='done' && !t.done) return false;
    if(filter==='todo' && t.done) return false;
    if(filter==='projects' && t.type!=='project') return false;
    if(filter==='standalone' && (t.type==='project' || t.projectId || t.type==='nontask')) return false;
    if(filter==='nontask' && t.type!=='nontask') return false;
    if(_taskMonthFilter && t.done){
      const ym=(t.doneAt||'').slice(0,7);
      if(ym!==_taskMonthFilter) return false;
    }
    if(_taskMonthFilter && !t.done && filter!=='todo') return false;
    return true;
  });

  const list = document.getElementById('taskList');
  if(!tasks.length){
    list.innerHTML='<div class="empty-state"><div class="empty-icon">📜</div>没有任务</div>';
    return;
  }

  const projects = tasks.filter(t=>t.type==='project');
  const allTodos  = tasks.filter(t=>t.type!=='project');

  let html = '';

  projects.forEach(p=>{
    const allChildren = S.tasks.filter(t=>t.projectId==p.id);
    const visChildren = allChildren.filter(t=>{
      if(filter==='done' && !t.done) return false;
      if(filter==='todo' && t.done) return false;
      return true;
    });
    const doneCount = allChildren.filter(t=>t.done).length;
    const pct = allChildren.length ? Math.round(doneCount/allChildren.length*100) : 0;
    const collapsed = _projCollapsed[p.id];

    html += '<div class="task-card" style="border-left-color:#000080;">';
    html += '<div class="task-top">';
    html += '<div class="task-check '+(p.done?'checked':'')+'" onclick="toggleTask('+p.id+')">'+( p.done?'✓':'')+'</div>';
    html += '<div class="task-title-wrap">';
    html += '<div style="font-size:10px;font-weight:bold;color:#000080;margin-bottom:2px;letter-spacing:1px;">PROJECT</div>';
    html += '<div class="task-title '+(p.done?'done-text':'')+'">'+p.name+(p.energyTag?'<span style="font-size:11px;padding:1px 7px;border-radius:10px;border:1px solid var(--purple);color:#800080;margin-left:6px;vertical-align:middle;">'+p.energyTag+'</span>':'')+'</div>';
    html += '<div class="task-meta">'+fmtDT(p.createdAt)+'</div>';
    html += '</div>';
    html += '<div class="task-actions">';
    html += '<button class="icon-btn" onclick="toggleProjCollapse('+p.id+')" style="font-size:11px;color:#808080;">'+(collapsed?'▸':'▾')+'</button>';
    html += '<button class="icon-btn" onclick="addChildTask('+p.id+')" style="color:#000080;" title="添加子任务">+</button>';
    html += '<button class="icon-btn" onclick="bindPomo('+p.id+')" title="绑定番茄钟">🍅</button>';
    html += '<button class="icon-btn" onclick="openEditTask('+p.id+')">[EDIT]</button>';
    html += '<button class="icon-btn" onclick="deleteTask('+p.id+')" style="color:#cc0000;">✕</button>';
    html += '</div></div>';

    if(allChildren.length){
      html += '<div class="prog-row" style="margin-top:8px;">';
      html += '<div class="prog-wrap"><div class="prog-bar" style="width:'+pct+'%;background:var(--gold);"></div></div>';
      html += '<span style="font-size:13px;color:#808080;margin-left:8px;">'+doneCount+'/'+allChildren.length+'</span>';
      html += '</div>';
    }

    if(!collapsed && visChildren.length){
      html += '<div style="margin-top:8px;padding-left:12px;border-left:2px solid rgba(255,255,255,0.07);">';
      visChildren.forEach(t=>{
        html += '<div class="task-card" style="border-left-color:#000080;margin-bottom:6px;">';
        html += '<div class="task-top">';
        html += '<div class="task-check '+(t.done?'checked':'')+'" onclick="toggleTask('+t.id+')">'+( t.done?'✓':'')+'</div>';
        html += '<div class="task-title-wrap">';
        html += '<div class="task-title '+(t.done?'done-text':'')+'">'+t.name+(t.energyTag?'<span style="font-size:11px;padding:1px 7px;border-radius:10px;border:1px solid var(--purple);color:#800080;margin-left:6px;vertical-align:middle;">'+t.energyTag+'</span>':'')+'</div>';
        if(t.doneAt) html += '<div class="task-meta">完成: '+fmtDT(t.doneAt)+'</div>';
        html += '</div>';
        html += '<div class="task-actions">';
        html += '<button class="icon-btn" onclick="bindPomo('+t.id+')" title="绑定番茄钟">🍅</button>';
        html += '<button class="icon-btn" onclick="openEditTask('+t.id+')">[EDIT]</button>';
        html += '<button class="icon-btn" onclick="deleteTask('+t.id+')" style="color:#cc0000;">✕</button>';
        html += '</div></div>';
        if(t.note){
          html += '<div style="margin-top:6px;font-size:14px;color:#808080;line-height:1.6;white-space:pre-wrap;border-left:2px solid var(--border);padding-left:8px;">'+ t.note+'</div>';
        }
        if((t.pomoRecords||[]).length) html += '<div class="pomo-record">🍅 '+t.pomoRecords.join(' · ')+'</div>';
        html += '</div>';
      });
      html += '</div>';
    }

    html += '</div>';
  });

  // standalone todos
  const standalone = allTodos.filter(t=>!t.projectId);
  standalone.forEach(t=>{
    html += '<div class="task-card '+(t.done?'done':'')+'" style="border-left-color:#000080;">';
    html += '<div class="task-top">';
    html += '<div class="task-check '+(t.done?'checked':'')+'" onclick="toggleTask('+t.id+')">'+( t.done?'✓':'')+'</div>';
    html += '<div class="task-title-wrap">';
    html += '<div class="task-title '+(t.done?'done-text':'')+'">'+t.name+(t.energyTag?'<span style="font-size:11px;padding:1px 7px;border-radius:10px;border:1px solid var(--purple);color:#800080;margin-left:6px;vertical-align:middle;">'+t.energyTag+'</span>':'')+'</div>';
    if(t.doneAt) html += '<div class="task-meta">完成: '+fmtDT(t.doneAt)+'</div>';
    else html += '<div class="task-meta">'+fmtDT(t.createdAt)+'</div>';
    html += '</div>';
    html += '<div class="task-actions">';
    html += '<button class="icon-btn" onclick="bindPomo('+t.id+')" title="绑定番茄钟">🍅</button>';
    html += '<button class="icon-btn" onclick="openEditTask('+t.id+')">[EDIT]</button>';
    html += '<button class="icon-btn" onclick="deleteTask('+t.id+')" style="color:#cc0000;">✕</button>';
    html += '</div></div>';
    if(t.note){
      html += '<div style="margin-top:6px;font-size:14px;color:#808080;line-height:1.6;white-space:pre-wrap;border-left:2px solid var(--border);padding-left:8px;">'+ t.note+'</div>';
    }
    if((t.pomoRecords||[]).length) html += '<div class="pomo-record">🍅 '+t.pomoRecords.join(' · ')+'</div>';
    html += '</div>';
  });

  // non-task items
  const nontasks = tasks.filter(t=>t.type==='nontask');
  nontasks.forEach(t=>{
    html += '<div class="task-card" style="border-left-color:#800080;opacity:'+(t.done?.5:1)+'">';
    html += '<div class="task-top">';
    html += '<div style="width:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;">◈</div>';
    html += '<div class="task-title-wrap">';
    html += '<div style="font-size:10px;font-weight:bold;color:#800080;margin-bottom:2px;letter-spacing:1px;">NON-TASK</div>';
    html += '<div class="task-title">'+t.name+(t.energyTag?'<span style="font-size:10px;padding:1px 6px;border-radius:10px;border:1px solid var(--purple);color:#800080;margin-left:6px;">'+t.energyTag+'</span>':'')+'</div>';
    if(t.note) html += '<div class="task-meta" style="margin-top:2px;">'+t.note+'</div>';
    html += '<div class="task-meta">'+fmtDT(t.createdAt)+'</div>';
    html += '</div>';
    html += '<div class="task-actions">';
    html += '<button class="icon-btn" onclick="openEditTask('+t.id+')">[EDIT]</button>';
    html += '<button class="icon-btn" onclick="deleteTask('+t.id+')" style="color:#cc0000;">✕</button>';
    html += '</div></div></div>';
  });

  list.innerHTML = html;
}

function toggleProjCollapse(id){
  _projCollapsed[id] = !_projCollapsed[id];
  renderTasks();
}


function exportTasks(){
  let txt = '=== 任务导出 ===\n\n';
  const projects = S.tasks.filter(t=>t.type==='project');
  const standalone = S.tasks.filter(t=>t.type!=='project' && !t.projectId);
  projects.forEach(p=>{
    txt += '[' + (p.done?'✓':'○') + '] [PROJECT] ' + p.name + '\n';
    if(p.desc) txt += '  ' + p.desc + '\n';
    txt += '  创建: ' + fmtDT(p.createdAt) + '\n';
    S.tasks.filter(t=>t.projectId==p.id).forEach(t=>{
      txt += '  [' + (t.done?'✓':'○') + '] ' + t.name + (t.note?' — '+t.note:'') + '\n';
    });
    txt += '\n';
  });
  if(standalone.length){
    txt += '--- 独立任务 ---\n';
    standalone.forEach(t=>{
      txt += '[' + (t.done?'✓':'○') + '] ' + t.name + '\n';
      txt += '  创建: ' + fmtDT(t.createdAt) + '\n';
    });
  }
  dl('tasks.txt', txt);
}

function saveJournal(){
  const text=document.getElementById('journalText').value.trim();
  if(!text) return;
  const tags=document.getElementById('journalTags').value.split(',').map(s=>s.trim()).filter(Boolean);
  S.journal.unshift({id:S.nextId++,text,tags,createdAt:new Date().toISOString()});
  addXP(5,'日记'); saveState(); closeModal('journalModal');
  document.getElementById('journalText').value='';
  document.getElementById('journalTags').value='';
  renderJournal();
}

function deleteJournal(id){
  undoStack.push(JSON.stringify(S));
  S.journal=S.journal.filter(j=>j.id!=id);
  saveState(); renderJournal(); showUndoBar('日记已删除');
}

function editJournal(id){
  document.getElementById('j-view-'+id).style.display='none';
  document.getElementById('j-edit-'+id).style.display='block';
  setTimeout(()=>{ const ta=document.getElementById('j-textarea-'+id); if(ta){ta.focus();ta.selectionStart=ta.value.length;} },50);
}

function cancelJournalEdit(id){
  document.getElementById('j-view-'+id).style.display='block';
  document.getElementById('j-edit-'+id).style.display='none';
}

function saveJournalEdit(id){
  const j=S.journal.find(x=>x.id==id); if(!j) return;
  const text=document.getElementById('j-textarea-'+id).value.trim();
  const tags=document.getElementById('j-tags-'+id).value.split(',').map(s=>s.trim()).filter(Boolean);
  if(!text) return;
  j.text=text; j.tags=tags; j.editedAt=new Date().toISOString();
  saveState(); renderJournal();
}

function renderJournal(){
  const search=(document.getElementById('journalSearch').value||'').toLowerCase();
  const entries=S.journal.filter(j=>{
    if(search && !j.text.toLowerCase().includes(search) && !j.tags.join(' ').toLowerCase().includes(search)) return false;
    if(jMonthFilter && (j.createdAt||'').slice(0,7)!==jMonthFilter) return false;
    return true;
  });
  renderArchive('archiveJ',S.journal,jMonthFilter,m=>{jMonthFilter=m;renderJournal();});
  const list=document.getElementById('journalList');
  if(!entries.length){list.innerHTML='<div class="empty-state"><div class="empty-icon">📔</div>写下今天的想法吧</div>';return;}
  list.innerHTML=entries.map(j=>`
    <div class="entry-card">
      <div class="entry-header">
        <span class="entry-ts">${fmtDT(j.createdAt)}</span>
        <div style="display:flex;gap:4px;">
          <button class="icon-btn" onclick="editJournal(${j.id})" title="编辑">[EDIT]</button>
          <button class="icon-btn" onclick="deleteJournal(${j.id})" style="color:#cc0000" title="删除">✕</button>
        </div>
      </div>
      <div id="j-view-${j.id}">
        <div class="entry-body">${j.text}</div>
        ${j.tags.length?`<div class="tags">${j.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`:''}
        ${(j.links&&j.links.length)?`<div style="margin-top:6px;font-size:12px;color:#800080;">🔗 ${j.links.length} 个关联条目</div>`:''}
        ${(j.replies&&j.replies.length)?`<div style="margin-top:3px;font-size:12px;color:#000080;">💬 ${j.replies.length} 条补充</div>`:''}
      </div>
      <div id="j-edit-${j.id}" style="display:none;">
        <textarea id="j-textarea-${j.id}" rows="5" style="width:100%;background:#fff;border:2px inset #808080;color:#000;padding:7px 10px;font-size:13px;outline:none;resize:vertical;margin-top:6px;">${j.text}</textarea>
        <input id="j-tags-${j.id}" value="${j.tags.join(', ')}" placeholder="标签（逗号分隔）" style="width:100%;background:#fff;border:2px inset #808080;color:#000;padding:5px 10px;font-size:13px;outline:none;margin-top:6px;"/>
        <div style="display:flex;gap:6px;margin-top:8px;">
          <button class="pxl-btn primary" onclick="saveJournalEdit(${j.id})">保存</button>
          <button class="pxl-btn" onclick="cancelJournalEdit(${j.id})">取消</button>
        </div>
      </div>
    </div>`).join('');
}
