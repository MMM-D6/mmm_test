function previewDreamImg(input){
  const f=input.files[0]; if(!f) return;
  document.getElementById('dreamImgName').textContent=f.name;
  const r=new FileReader();
  r.onload=e=>{
    dreamImgData=e.target.result;
    const prev=document.getElementById('dreamImgPreview');
    prev.src=e.target.result; prev.style.display='block';
    document.getElementById('dreamImgClearBtn').style.display='block';
  };
  r.readAsDataURL(f);
}

function clearDreamImg(){
  dreamImgData=null;
  const prev=document.getElementById('dreamImgPreview');
  prev.src=''; prev.style.display='none';
  document.getElementById('dreamImgClearBtn').style.display='none';
  document.getElementById('dreamImgName').textContent='未选择';
  document.getElementById('dreamImgInput').value='';
}

function openDreamModal(editId){
  const d = editId ? (S.dreams||[]).find(x=>x.id==editId) : null;
  document.getElementById('editDreamId').value = editId||'';
  document.getElementById('dreamModalTitle').textContent = d ? '编辑梦想' : '添加梦想/愿景';
  document.getElementById('dreamTitle').value = d?d.title:'';
  document.getElementById('dreamText').value = d?d.text:'';
  document.getElementById('dreamTags').value = d?(d.tags||[]).join(', '):'';
  // image
  dreamImgData = d&&d.img ? d.img : null;
  const prev=document.getElementById('dreamImgPreview');
  const clearBtn=document.getElementById('dreamImgClearBtn');
  if(d&&d.img){ prev.src=d.img; prev.style.display='block'; clearBtn.style.display='block'; }
  else { prev.style.display='none'; clearBtn.style.display='none'; }
  document.getElementById('dreamImgName').textContent='未选择';
  document.getElementById('dreamImgInput').value='';
  // group selector
  const sel=document.getElementById('dreamGroupSel');
  sel.innerHTML='<option value="">无（不归入集合）</option>'+
    (S.dreamGroups||[]).map(g=>'<option value="'+g.id+'"'+(d&&d.groupId==g.id?' selected':'')+'>'+g.name+'</option>').join('');
  openModal('dreamModal');
  setTimeout(()=>document.getElementById('dreamTitle').focus(),80);
}

function saveDream(){
  const title=document.getElementById('dreamTitle').value.trim();
  const text=document.getElementById('dreamText').value.trim();
  if(!title&&!text) return;
  const tags=document.getElementById('dreamTags').value.split(',').map(s=>s.trim()).filter(Boolean);
  const groupId=parseInt(document.getElementById('dreamGroupSel').value)||null;
  const editId=document.getElementById('editDreamId').value;
  const imgToSave = dreamImgData; // null means no image (or cleared)
  if(editId){
    const d=(S.dreams||[]).find(x=>x.id==editId); if(!d) return;
    d.title=title; d.text=text; d.tags=tags; d.groupId=groupId;
    if(imgToSave!==undefined) d.img=imgToSave;
    d.editedAt=new Date().toISOString();
  } else {
    S.dreams.unshift({id:S.nextId++,title,text,tags,groupId,img:imgToSave,createdAt:new Date().toISOString()});
    addXP(5,'梦想');
  }
  dreamImgData=null;
  saveState(); closeModal('dreamModal'); renderDreams();
}

function deleteDream(id){
  undoStack.push(JSON.stringify(S));
  S.dreams=S.dreams.filter(d=>d.id!=id);
  saveState(); renderDreams(); showUndoBar('梦想条目已删除');
}

// Dream Groups
function openDreamGroupModal(editId){

function saveDreamGroup(){
  const name=document.getElementById('dreamGroupName').value.trim(); if(!name) return;
  const editId=document.getElementById('editDreamGroupId').value;
  if(!S.dreamGroups) S.dreamGroups=[];
  if(editId){
    const g=S.dreamGroups.find(x=>x.id==editId); if(g) g.name=name;
  } else {
    S.dreamGroups.push({id:S.nextId++,name,createdAt:new Date().toISOString()});
  }
  saveState(); closeModal('dreamGroupModal'); renderDreams();
}

function deleteDreamGroup(id){
  if(!confirm('删除集合？其中的梦想条目将变为未归类。')) return;
  S.dreamGroups=(S.dreamGroups||[]).filter(g=>g.id!=id);
  (S.dreams||[]).forEach(d=>{ if(d.groupId==id) d.groupId=null; });
  saveState(); renderDreams();
}

function toggleDreamGroup(id){
  _dreamGroupCollapsed[id]=!_dreamGroupCollapsed[id];
  renderDreams();
}

function renderDreams(){
  const search=(document.getElementById('dreamSearch').value||'').toLowerCase();
  const allDreams=S.dreams||[];
  const entries=allDreams.filter(d=>{
    if(search && !((d.title||'').toLowerCase().includes(search)||(d.text||'').toLowerCase().includes(search)||(d.tags||[]).join(' ').toLowerCase().includes(search))) return false;
    if(dMonthFilter && (d.createdAt||'').slice(0,7)!==dMonthFilter) return false;
    return true;
  });
  renderArchive('archiveD',allDreams,dMonthFilter,m=>{dMonthFilter=m;renderDreams();});
  const list=document.getElementById('dreamList');
  list.innerHTML='';
  if(!entries.length&&!(S.dreamGroups||[]).length){
    list.innerHTML='<div class="empty-state"><div class="empty-icon">*</div>记录你的梦想和愿景</div>';return;
  }

  // groups
  (S.dreamGroups||[]).forEach(g=>{
    const gDreams=entries.filter(d=>d.groupId==g.id);
    const collapsed=_dreamGroupCollapsed[g.id];
    const gc=document.createElement('div'); gc.className='dream-group-card';
    // header
    const gh=document.createElement('div'); gh.className='dream-group-hdr';
    const tog=document.createElement('span'); tog.className='dream-group-tog';
    tog.textContent=collapsed?'▸':'▾'; tog.onclick=()=>toggleDreamGroup(g.id);
    const nm=document.createElement('span'); nm.style.cssText='flex:1;font-weight:bold;font-size:12px;color:#fff;';
    nm.textContent=g.name;
    const cnt=document.createElement('span'); cnt.style.cssText='font-size:11px;color:#ccc;margin-right:5px;';
    cnt.textContent='('+gDreams.length+')';
    const eb=document.createElement('button'); eb.className='icon-btn'; eb.textContent='[EDIT]';
    eb.style.cssText='color:#fff;'; eb.onclick=()=>openDreamGroupModal(g.id);
    const db=document.createElement('button'); db.className='icon-btn'; db.textContent='🗑️';
    db.style.cssText='color:#ffaaaa;'; db.onclick=()=>deleteDreamGroup(g.id);
    const ab=document.createElement('button'); ab.className='icon-btn'; ab.textContent='+';
    ab.style.cssText='color:#fff;font-weight:bold;'; ab.onclick=()=>openDreamInGroup(g.id);
    gh.appendChild(tog); gh.appendChild(nm); gh.appendChild(cnt); gh.appendChild(eb); gh.appendChild(db); gh.appendChild(ab);
    gc.appendChild(gh);
    if(!collapsed){
      if(gDreams.length){
        const body=document.createElement('div'); body.className='dream-group-body';
        gDreams.forEach(d=>body.appendChild(mkDreamCard(d)));
        gc.appendChild(body);
      } else {
        const empty=document.createElement('div'); empty.style.cssText='padding:8px 12px;font-size:12px;color:#808080;';
        empty.textContent='暂无内容，点击 [+] 添加';
        gc.appendChild(empty);
      }
    }
    list.appendChild(gc);
  });

  // ungrouped
  entries.filter(d=>!d.groupId).forEach(d=>list.appendChild(mkDreamCard(d)));
}

function mkDreamCard(d){
  const wrap=document.createElement('div'); wrap.className='entry-card'; wrap.id='dc-'+d.id;
  // header
  const hdr=document.createElement('div'); hdr.className='entry-header';
  const ts=document.createElement('span'); ts.className='entry-ts'; ts.textContent=fmtDT(d.createdAt);
  const acts=document.createElement('div'); acts.style.cssText='display:flex;gap:3px;';
  const eb=document.createElement('button'); eb.className='icon-btn'; eb.textContent='[EDIT]'; eb.title='编辑'; eb.onclick=()=>openDreamModal(d.id);
  const db=document.createElement('button'); db.className='icon-btn'; db.textContent='✕'; db.title='删除'; db.style.color='#cc0000'; db.onclick=()=>deleteDream(d.id);
  acts.appendChild(eb); acts.appendChild(db);
  hdr.appendChild(ts); hdr.appendChild(acts); wrap.appendChild(hdr);
  if(d.title){const t=document.createElement('div');t.style.cssText='font-size:13px;color:#000;margin-bottom:4px;';t.textContent=d.title;wrap.appendChild(t);}
  if(d.text){const t=document.createElement('div');t.className='entry-body';t.textContent=d.text;wrap.appendChild(t);}
  if(d.img){const img=document.createElement('img');img.src=d.img;img.alt='';img.className='entry-img';wrap.appendChild(img);}
  if((d.tags||[]).length){const tg=document.createElement('div');tg.className='tags';d.tags.forEach(tx=>{const s=document.createElement('span');s.className='tag dream-tag';s.textContent=tx;tg.appendChild(s);});wrap.appendChild(tg);}
  return wrap;
}

// ARCHIVE MONTHS
// ═══════════════════════════════════════
function renderArchive(containerId, items, current, onSelect){
  const months={};
  items.forEach(item=>{ const ym=(item.createdAt||'').slice(0,7); if(ym) months[ym]=(months[ym]||0)+1; });
  const sorted=Object.keys(months).sort().reverse();
  if(!sorted.length){document.getElementById(containerId).innerHTML='';return;}
  document.getElementById(containerId).innerHTML=
    `<button class="arch-btn ${!current?'selected':''}" onclick="(${onSelect.toString()})(null)">全部 (${items.length})</button>`+
    sorted.map(ym=>`<button class="arch-btn ${current===ym?'selected':''}" onclick="(${onSelect.toString()})('${ym}')">${ym} (${months[ym]})</button>`).join('');
}

// ── selection popup ──
function engOnSelect(e, cardId){
  const sel=window.getSelection();
  if(!sel||sel.isCollapsed){ engHidePopup(); return; }
  const selText=sel.toString().trim(); if(!selText){ engHidePopup(); return; }
  const range=sel.getRangeAt(0);
  const el=e.currentTarget;
  const preRange=document.createRange();
  preRange.setStart(el,0); preRange.setEnd(range.startContainer,range.startOffset);
  const start=preRange.toString().length, end=start+selText.length;
  _engSelTarget={cardId,start,end,text:selText};
  const rect=range.getBoundingClientRect();
  showEngPopup(rect.left+(rect.width/2), rect.top, selText);
}

function showEngPopup(cx, cy, selText){
  engHidePopup(false);
  _engPopupOpen=true;
  const pop=document.createElement('div');
  pop.id='eng-popup';
  pop.style.cssText='position:fixed;z-index:800;background:var(--surface);border:2px solid;border-color:var(--border-lt) var(--border-dk) var(--border-dk) var(--border-lt);padding:4px 5px;display:flex;gap:3px;align-items:center;box-shadow:2px 2px 0 rgba(0,0,0,.3);';
  const mkSwatch=(color,bg)=>{
    const s=document.createElement('div');
    s.style.cssText='width:16px;height:16px;cursor:pointer;background:'+bg+';border:2px solid;border-color:#fff #808080 #808080 #fff;flex-shrink:0;';
    s.onmousedown=ev=>{ ev.preventDefault(); ev.stopPropagation(); applyEngHl(color); };
    return s;
  };
  pop.appendChild(mkSwatch('yellow','#fff176'));
  pop.appendChild(mkSwatch('green','#b9f6ca'));
  pop.appendChild(mkSwatch('pink','#fce4ec'));
  pop.appendChild(mkSwatch('blue','#bbdefb'));
  const sep=document.createElement('div'); sep.style.cssText='width:1px;height:14px;background:#aaa;margin:0 2px;';
  pop.appendChild(sep);
  const maskBtn=document.createElement('div');
  maskBtn.style.cssText='font-family:var(--font-vt);font-size:13px;color:#555;cursor:pointer;padding:0 3px;white-space:nowrap;';
  maskBtn.textContent='▓遮蔽';
  maskBtn.onmousedown=ev=>{ ev.preventDefault(); ev.stopPropagation(); applyEngMask(); };
  pop.appendChild(maskBtn);
  const sep2=document.createElement('div'); sep2.style.cssText='width:1px;height:14px;background:#aaa;margin:0 2px;'; pop.appendChild(sep2);
  const vocBtn=document.createElement('div');
  vocBtn.style.cssText='font-family:var(--font-vt);font-size:13px;color:#336699;cursor:pointer;padding:0 3px;white-space:nowrap;';
  vocBtn.textContent='📖生词';
  vocBtn.onmousedown=ev=>{ ev.preventDefault(); ev.stopPropagation(); openEngVocabModal(selText); };
  pop.appendChild(vocBtn);
  const sep3=document.createElement('div'); sep3.style.cssText='width:1px;height:14px;background:#aaa;margin:0 2px;'; pop.appendChild(sep3);
  const clearBtn=document.createElement('div');
  clearBtn.style.cssText='font-family:var(--font-vt);font-size:13px;color:#c0392b;cursor:pointer;padding:0 3px;';
  clearBtn.textContent='✕清除';
  clearBtn.onmousedown=ev=>{ ev.preventDefault(); ev.stopPropagation(); clearEngMark(); };
  pop.appendChild(clearBtn);
  const x=Math.max(4,Math.min(cx-80, window.innerWidth-220));
  const y=Math.max(4,cy-44);
  pop.style.left=x+'px'; pop.style.top=y+'px';
  document.body.appendChild(pop);
  _engPopup=pop;
}
function engHidePopup(clearSel){
  _engPopupOpen=false;
  if(_engPopup){ _engPopup.remove(); _engPopup=null; }
  if(clearSel!==false) window.getSelection().removeAllRanges();
}
document.addEventListener('mousedown',ev=>{ if(_engPopup&&!_engPopup.contains(ev.target)) engHidePopup(); });

function applyEngHl(color){
  if(!_engSelTarget) return;
  const{cardId,start,end}=_engSelTarget;
  const c=(S.engCards||[]).find(x=>x.id==cardId); if(!c) return;
  if(!c.highlights) c.highlights=[];
  c.highlights=c.highlights.filter(h=>h.end<=start||h.start>=end);
  c.highlights.push({start,end,color});
  engHidePopup(); saveState(); renderEngCards();
}
function applyEngMask(){
  if(!_engSelTarget) return;
  const{cardId,start,end}=_engSelTarget;
  const c=(S.engCards||[]).find(x=>x.id==cardId); if(!c) return;
  if(!c.masks) c.masks=[];
  const existing=c.masks.find(m=>m.start<=start&&m.end>=end);
  if(existing){ c.masks=c.masks.filter(m=>m!==existing); }
  else { c.masks=c.masks.filter(m=>m.end<=start||m.start>=end); c.masks.push({start,end}); }
  engHidePopup(); saveState(); renderEngCards();
}
function clearEngMark(){
  if(!_engSelTarget) return;
  const{cardId,start,end}=_engSelTarget;
  const c=(S.engCards||[]).find(x=>x.id==cardId); if(!c) return;
  c.highlights=(c.highlights||[]).filter(h=>!(h.start<end&&h.end>start));
  c.masks=(c.masks||[]).filter(m=>!(m.start<end&&m.end>start));
  engHidePopup(); saveState(); renderEngCards();
}
function toggleEngMask(cardId,mIdx){
  const c=(S.engCards||[]).find(x=>x.id==cardId); if(!c||!c.masks) return;
  if(!c._maskHidden) c._maskHidden={};
  c._maskHidden[mIdx]=!c._maskHidden[mIdx];
  renderEngCards();
}

let _vocabEditId=null;
function openEngVocabModal(word){
  document.getElementById('vocabWord').value=word||(_engSelTarget?_engSelTarget.text:'');
  document.getElementById('vocabWord').removeAttribute('readonly');
  document.getElementById('vocabDef').value='';
  document.getElementById('vocabPron').value='';
  _vocabEditId=null;
  engHidePopup();
  openModal('engVocabModal');
  setTimeout(()=>document.getElementById('vocabDef').focus(),80);
}
function saveVocab(){
  const word=document.getElementById('vocabWord').value.trim(); if(!word) return;
  const def=document.getElementById('vocabDef').value.trim();
  const pron=document.getElementById('vocabPron').value.trim();
  if(!S.vocab) S.vocab=[];
  if(_vocabEditId){
    const v=S.vocab.find(x=>x.id==_vocabEditId);
    if(v){ v.word=word; v.def=def; v.pron=pron; }
    _vocabEditId=null;
  } else {
    const existing=S.vocab.find(v=>v.word.toLowerCase()===word.toLowerCase());
    if(existing){ existing.def=def||existing.def; existing.pron=pron||existing.pron; }
    else S.vocab.push({id:S.nextId++,word,def,pron,createdAt:new Date().toISOString()});
  }

function engApplyAnnotations(text,highlights,masks,maskHidden,cardId){
  const events=[];
  (highlights||[]).forEach((h,i)=>{ events.push({pos:h.start,type:'hl_open',color:h.color,i},{pos:h.end,type:'hl_close',i}); });
  (masks||[]).forEach((m,i)=>{ events.push({pos:m.start,type:'mask_open',i},{pos:m.end,type:'mask_close',i}); });
  events.sort((a,b)=>a.pos-b.pos||(a.type.includes('close')?1:-1));
  let html='',pos=0; const hlStack=[],maskStack=[];
  const txt=text;
  const advance=to=>{
    if(to<=pos) return;
    const chunk=escHtml(txt.slice(pos,to));
    if(maskStack.length>0){
      const mIdx=maskStack[maskStack.length-1];
      const hidden=!(maskHidden&&maskHidden[mIdx]);
      if(hidden){ html+='<span class="eng-mask" onclick="toggleEngMask('+cardId+','+mIdx+')" title="点击显示">'+chunk.replace(/\S/g,'█')+'</span>'; }
      else { html+='<span class="eng-mask eng-mask-revealed" onclick="toggleEngMask('+cardId+','+mIdx+')" title="点击隐藏">'+chunk+'</span>'; }
    } else if(hlStack.length>0){
      html+='<mark class="hl-'+hlStack[hlStack.length-1]+'">'+chunk+'</mark>';
    } else { html+=chunk; }
    pos=to;
  };
  events.forEach(ev=>{
    advance(ev.pos);
    if(ev.type==='hl_open') hlStack.push(ev.color);
    else if(ev.type==='hl_close') hlStack.pop();
    else if(ev.type==='mask_open') maskStack.push(ev.i);
    else if(ev.type==='mask_close') maskStack.pop();
  });
  advance(txt.length);
  return html;
}

// ═══════════════════════════════════════
function startPomo(min){
  stopPomo();
  pomoMin=min; pomoSec=min*60;
  pomoStartWall=Date.now();
  pomoEndWall=pomoStartWall+min*60*1000;
  document.querySelectorAll('.pomo-btn[data-min]').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.min)===min));
  document.getElementById('pomoDisplay').classList.add('running');
  pomoTimer=setInterval(tickPomo,500);
  updatePomoDisplay();
}

function stopPomo(){
  if(pomoTimer){clearInterval(pomoTimer);pomoTimer=null;}
  document.getElementById('pomoDisplay').textContent='--:--';
  document.getElementById('pomoDisplay').classList.remove('running');
  document.querySelectorAll('.pomo-btn[data-min]').forEach(b=>b.classList.remove('active'));
}

function tickPomo(){
  const remaining=Math.max(0,Math.round((pomoEndWall-Date.now())/1000));
  if(remaining<=0){
    stopPomo();
    const now=fmtDT(new Date().toISOString());
    if(pomoTaskId){
      const t=S.tasks.find(t=>t.id==pomoTaskId);
      if(t){if(!t.pomoRecords)t.pomoRecords=[];t.pomoRecords.push(pomoMin+'min @ '+now);saveState();renderTasks();}
    }
    addXP(pomoMin,'番茄钟');
    showToast('🍅 '+pomoMin+'分钟完成！');
    sendNotification('番茄钟完成！','休息一下 ☕');
    return;
  }
  pomoSec=remaining;
  updatePomoDisplay();
}

function updatePomoDisplay(){
  const m=p2(Math.floor(pomoSec/60)),s=p2(pomoSec%60);
  document.getElementById('pomoDisplay').textContent=m+':'+s;
}

document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible' && pomoTimer){
    const remaining=Math.max(0,Math.round((pomoEndWall-Date.now())/1000));
    if(remaining<=0){ tickPomo(); }
    else { pomoSec=remaining; updatePomoDisplay(); }
  }
});

function applyTheme(){
  const map={'--accent':'c-accent','--gold':'c-gold','--blue':'c-blue','--green':'c-green','--purple':'c-purple','--bg':'c-bg','--surface':'c-surface'};
  const root=document.documentElement;
  const theme={};
  Object.entries(map).forEach(([k,id])=>{const v=document.getElementById(id).value;root.style.setProperty(k,v);theme[k]=v;});
  root.style.setProperty('--surface2',adjustBrightness(document.getElementById('c-surface').value,15));
  S.theme=theme; saveState();
}

function adjustBrightness(hex,amt){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);
  return '#'+[r,g,b].map(x=>p2(x.toString(16))).join('');
}

function loadTheme(){
  if(!S.theme||!Object.keys(S.theme).length) return;
  const root=document.documentElement;
  const map={'--accent':'c-accent','--gold':'c-gold','--blue':'c-blue','--green':'c-green','--purple':'c-purple','--bg':'c-bg','--surface':'c-surface'};
  Object.entries(map).forEach(([k,id])=>{if(S.theme[k]){root.style.setProperty(k,S.theme[k]);const el=document.getElementById(id);if(el)el.value=S.theme[k];}});
  if(S.theme['--surface']) root.style.setProperty('--surface2',adjustBrightness(S.theme['--surface'],15));
}

function resetTheme(){
  S.theme={}; document.documentElement.removeAttribute('style'); saveState();
}

function renderLinkResults(id,kw){
  const c=S.cards.find(x=>x.id==id); if(!c) return;
  const el=document.getElementById('cl-results-'+id); if(!el) return;
  const q=(kw||'').toLowerCase();
  const filtered=S.cards.filter(x=>{
    if(x.id==id) return false;
    if((c.links||[]).includes(x.id)) return false;
    if(!q) return true;
    const txt=((x.quote||'')+(x.body||'')+(x.tags||[]).join(' ')).toLowerCase();
    return txt.includes(q);
  });
  if(!filtered.length){el.innerHTML='<div style="font-size:12px;color:#808080;padding:4px 0;">没有符合条件的卡片</div>';return;}

function addCardLink(id){

  const sel=document.getElementById('cl-sel-'+id);

function removeCardLink(id,lid){
  const c=S.cards.find(x=>x.id==id); if(!c) return;
  c.links=(c.links||[]).filter(x=>x!=lid);
  const lk=S.cards.find(x=>x.id==lid);
  if(lk) lk.links=(lk.links||[]).filter(x=>x!=id);
  saveState(); renderLinked(id); renderLinkResults(id,document.getElementById('cl-kw-'+id).value);
  const btn=document.getElementById('cl-btn-'+id);

function applyHlToText(text, hls){
  // hls: [{start,end,color}]
  if(!hls||!hls.length) return escHtml(text);
  // sort by start
  const sorted=[...hls].sort((a,b)=>a.start-b.start);
  let result=''; let pos=0;
  sorted.forEach(h=>{
    if(h.start>pos) result+=escHtml(text.slice(pos,h.start));
    result+='<mark class="hl-'+h.color+'">'+escHtml(text.slice(h.start,h.end))+'</mark>';
    pos=h.end;
  });
  if(pos<text.length) result+=escHtml(text.slice(pos));
  return result;
}
function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderCards(){

    list.innerHTML='<div class="empty-state" style="color:#999;background:#fff;padding:40px 20px;text-align:center;"><div style="font-size:40px;margin-bottom:12px;">🗃</div>一卡一想法，从这里开始</div>';
    return;
  }
  list.innerHTML='';
  items.forEach(function(c){

    }
    if((c.tags||[]).length){
      const tEl=document.createElement('div');
      tEl.className='card-tags';
      tEl.innerHTML=c.tags.map(function(t){ return '<span class="card-tag">'+t+'</span>'; }).join('');
      wrap.appendChild(tEl);

function exportCards(){
  const cards=S.cards||[];
  // build index map: card.id -> export number
  const idxMap={};
  cards.forEach((c,i)=>{ idxMap[c.id]=i+1; });
  let txt='=== 卡片笔记 ===\n';
  txt+='导出时间: '+fmtDT(new Date().toISOString())+'\n\n';
  cards.forEach((c,i)=>{
    txt+='['+(i+1)+'] '+(c.type==='quote'?'QUOTE':'IDEA')+' · '+fmtDT(c.createdAt)+'\n';
    if(c.quote) txt+='"'+c.quote+'"\n';
    if(c.body) txt+=c.body+'\n';
    if((c.tags||[]).length) txt+='标签: '+c.tags.join(', ')+'\n';
    if((c.links||[]).length){
      const linkNums=c.links.map(lid=>{ const n=idxMap[lid]; return n?'['+n+']':'[?]'; });
      txt+='链接: '+linkNums.join(' ')+'\n';
    }
    txt+='\n---\n\n';
  });
  // append link map at end
  const hasLinks=cards.some(c=>(c.links||[]).length>0);
  if(hasLinks){
    txt+='\n=== 链接关系 ===\n';
    cards.forEach((c,i)=>{
      if(!(c.links||[]).length) return;
      const linkNums=c.links.map(lid=>{ const n=idxMap[lid]; return n?'['+n+']':'[?]'; });
      txt+='['+( i+1)+'] → '+linkNums.join(', ')+'\n';
    });
  }
  dl('cards.txt',txt);
}

// gDayIdx: 用本地年月日差计算，避免毫秒差+Math.round在午夜前后出现±1天偏差
function gDayIdx(d){
  const a=new Date(d); a.setHours(12,0,0,0); // 用正午做基准，避免DST边界
  const b=new Date(G_T0); b.setHours(12,0,0,0);
  return Math.round((a-b)/86400000);
}

function ganttRenderSidebar(){
  const list=document.getElementById('g-idea-list'); if(!list) return;
  list.innerHTML='';
  const f=gSBfilter;
  const showDone = f==='all';
  const showTodo = f!=='all';

  let allTasks = (S.tasks||[]);
  if(f==='todo')       allTasks = allTasks.filter(t=>!t.done);
  else if(f==='all')   allTasks = allTasks;
  else if(f==='projects')   allTasks = allTasks.filter(t=>t.type==='project');
  else if(f==='standalone') allTasks = allTasks.filter(t=>t.type!=='project'&&!t.projectId&&t.type!=='nontask');
  else if(f==='nontask')    allTasks = allTasks.filter(t=>t.type==='nontask');

  const projects  = allTasks.filter(t=>t.type==='project');
  const todos     = allTasks.filter(t=>t.type==='todo'&&!t.projectId);
  const nontasks  = allTasks.filter(t=>t.type==='nontask');

  projects.forEach(proj=>{
    const children = (S.tasks||[]).filter(t=>t.type!=='project'&&t.projectId==proj.id&&(f!=='todo'||!t.done));
    const collapsed = gSBcollapsed[proj.id];
    const group = document.createElement('div'); group.className='g-proj-group';
    const hdr = document.createElement('div');
    hdr.className = 'g-proj-hdr' + (proj.done?' g-done-item':'');
    hdr.draggable = true;
    hdr.ondragstart = e=>{ e.dataTransfer.setData('gTaskId',String(proj.id)); e.dataTransfer.effectAllowed='copy'; };
    if(children.length){
      const tog=document.createElement('button'); tog.className='g-proj-tog';
      tog.textContent=collapsed?'▸':'▾';
      tog.onclick=e=>{ e.stopPropagation(); gSBcollapsed[proj.id]=!collapsed; ganttRenderSidebar(); };
      hdr.appendChild(tog);
    }
    const nm=document.createElement('span'); nm.className='g-proj-name'+(proj.done?' g-done-item':''); nm.textContent=proj.name;
    hdr.appendChild(nm); group.appendChild(hdr);
    if(!collapsed&&children.length){
      const cw=document.createElement('div'); cw.className='g-children';
      children.forEach(ch=>{
        const c=document.createElement('div'); c.className='g-card'+(ch.done?' g-done-item':'');
        c.draggable=true;
        c.ondragstart=e=>{ e.dataTransfer.setData('gTaskId',String(ch.id)); e.dataTransfer.effectAllowed='copy'; };
        const n=document.createElement('span'); n.className='g-card-name'; n.textContent=ch.name;
        c.appendChild(n); cw.appendChild(c);
      });
      group.appendChild(cw);
    }
    list.appendChild(group);
  });

  todos.forEach(t=>{
    const c=document.createElement('div'); c.className='g-card'+(t.done?' g-done-item':'');
    c.draggable=true;
    c.ondragstart=e=>{ e.dataTransfer.setData('gTaskId',String(t.id)); e.dataTransfer.effectAllowed='copy'; };
    const n=document.createElement('span'); n.className='g-card-name'; n.textContent=t.name;
    c.appendChild(n); list.appendChild(c);
  });

  if(nontasks.length){
    const sep=document.createElement('div');
    sep.style.cssText='font-family:var(--font-pixel);font-size:5px;color:var(--purple);padding:4px 2px 2px;border-top:1px solid #b89cd860;margin-top:4px;';
    sep.textContent='NON-TASK';
    list.appendChild(sep);
    nontasks.forEach(t=>{
      const c=document.createElement('div'); c.className='g-card'+(t.done?' g-done-item':'');
      c.style.background='#7b3dac'; c.draggable=true;
      c.ondragstart=e=>{ e.dataTransfer.setData('gTaskId',String(t.id)); e.dataTransfer.effectAllowed='copy'; };
      const n=document.createElement('span'); n.className='g-card-name'; n.textContent=t.name;
      c.appendChild(n); list.appendChild(c);
    });
  }
}

const GD_GRAINS=[5,10,30,60];

function gDayNow(){
  gdDayOff=gDayIdx(new Date()); // 真正的今天
  gdRender();

  setTimeout(()=>{

function gdSwapRows(rowA, rowB){
  (S.tasks||[]).forEach(t=>{
    const p=gDayPos(t.id); if(!p||p.dayOff!==gdDayOff) return;
    if(p.row===rowA) gSetDayPos(t.id,{...p,row:rowB});
    else if(p.row===rowB) gSetDayPos(t.id,{...p,row:rowA});
  });
  saveState(); gdRender();
}

function gdBarGeom(pos){
  if(!pos) return null;
  const g=gdGrain(), cw=gdColW(), cols=Math.floor(1440/g);
  const s=pos.startMin/g, e=pos.endMin/g;
  if(e<=0||s>=cols) return null;
  const cs=Math.max(0,s), ce=Math.min(cols,e);
  return {x:cs*cw, w:Math.max(cw*1,(ce-cs)*cw)-2};
}

// smooth drag — update only bar position, no full re-render
function gdStartDrag(e,taskId,type,barEl,lhEl,lblEl,rhEl){
  e.preventDefault(); e.stopPropagation();
  const pos=gDayPos(taskId); if(!pos) return;
  gdDrag={taskId,type,x0:e.clientX,sm0:pos.startMin,em0:pos.endMin,barEl,lhEl,lblEl,rhEl};
  window.addEventListener('mousemove',gdOnDrag,{passive:true});
  window.addEventListener('mouseup',gdStopDrag);
}

function gdOnDrag(e){
  if(!gdDrag) return;
  if(gdRaf) cancelAnimationFrame(gdRaf);
  gdRaf=requestAnimationFrame(()=>{
    const{taskId,type,x0,sm0,em0,barEl}=gdDrag;
    const g=gdGrain(), cw=gdColW(), cols=Math.floor(1440/g);
    const dc=Math.round((e.clientX-x0)/cw);
    const dm=dc*g;
    let sm=sm0, em=em0;
    if(type==='move'){ const dur=em0-sm0; sm=Math.max(0,Math.min(1440-dur,sm0+dm)); em=sm+dur; }
    else if(type==='right'){ em=Math.max(sm0+g,Math.min(1440,em0+dm)); }
    const geo=gdBarGeom({startMin:sm,endMin:em});
    if(geo&&barEl){
      barEl.style.left=geo.x+'px';
      barEl.style.width=geo.w+'px';
    }
    gdDrag._sm=sm; gdDrag._em=em;
  });
}

function gdStopDrag(){
  if(gdRaf){ cancelAnimationFrame(gdRaf); gdRaf=null; }
  if(gdDrag){
    const{taskId}=gdDrag;
    const pos=gDayPos(taskId)||{};
    const sm=gdDrag._sm!==undefined?gdDrag._sm:pos.startMin;
    const em=gdDrag._em!==undefined?gdDrag._em:pos.endMin;
    gSetDayPos(taskId,{...pos,startMin:sm,endMin:em,dayOff:gdDayOff});
    gdRender(); // full re-render only on drop
  }
  gdDrag=null; _gcDragging=false;
  window.removeEventListener('mousemove',gdOnDrag);
  window.removeEventListener('mouseup',gdStopDrag);
}

function gdMkBar(task,pos){
  const geo=gdBarGeom(pos); if(!geo) return null;
  const color=gTaskColor(task), bd=gDarker(color,50);
  const bar=document.createElement('div');
  bar.className='gd-bar'+(task.done?' gd-done':'');
  bar.style.cssText='left:'+geo.x+'px;width:'+geo.w+'px;background:'+color+';border-color:'+bd;

  const lh=document.createElement('div'); lh.className='gd-bar-h'; lh.innerHTML='<span></span><span></span>';
  const lbl=document.createElement('div'); lbl.className='gd-bar-lbl'; lbl.textContent=task.name;
  const rh=document.createElement('div'); rh.className='gd-bar-h'; rh.style.cursor='ew-resize'; rh.innerHTML='<span></span><span></span>';
  const xb=document.createElement('div'); xb.className='gd-bar-x'; xb.textContent='✕';
  xb.onclick=ev=>{ ev.stopPropagation(); gDayRemove(task.id); };

  const chk=document.createElement('div');
  chk.style.cssText='width:14px;height:14px;flex-shrink:0;border:2px solid #1a1a2e80;border-radius:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;background:'+(task.done?'#4ecb71':'transparent')+';color:#fff;margin:0 3px;';
  chk.textContent=task.done?'✓':'';
  chk.addEventListener('mousedown',e=>{ e.stopPropagation(); });
  chk.addEventListener('click',e=>{ e.stopPropagation(); toggleTask(task.id); ganttRender(); });
  bar.appendChild(chk); bar.appendChild(lh); bar.appendChild(lbl); bar.appendChild(rh); bar.appendChild(xb);
  lh.addEventListener('mouseenter',()=>gcHideTip());
  rh.addEventListener('mouseenter',()=>gcHideTip());
  lh.addEventListener('mousedown',e=>{ e.stopPropagation(); gcHideTip(); gdStartDrag(e,task.id,'move',bar,lh,lbl,rh); });
  rh.addEventListener('mousedown',e=>{ e.stopPropagation(); gcHideTip(); gdStartDrag(e,task.id,'right',bar,lh,lbl,rh); });
  bar.addEventListener('mousedown',e=>{ gcHideTip(); if(chk.contains(e.target)||lh.contains(e.target)||rh.contains(e.target)||xb.contains(e.target)) return; gdStartDrag(e,task.id,'move',bar,lh,lbl,rh); });
  bar.addEventListener('mouseenter',e=>{ if(!_gcDragging&&!lh.matches(':hover')&&!rh.matches(':hover')) gcShowTip(e,task); });
  bar.addEventListener('mousemove',e=>{ if(!_gcDragging&&!lh.matches(':hover')&&!rh.matches(':hover')) gcMoveTip(e); });
  bar.addEventListener('mouseleave',()=>gcScheduleHideTip());
  return bar;
}

function gdRender(){
  const grid=document.getElementById('g-day-grid'); if(!grid) return;
  const g=gdGrain(), cw=gdColW(), cols=Math.floor(1440/g);
  const totalW=cols*cw;
  const m2t=m=>String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');
  const nowMin=new Date().getHours()*60+new Date().getMinutes();
  const thisDay=gDayIdx(new Date());

  const d=gAddDays(gdDayOff);
  const lbl=document.getElementById('g-day-lbl');
  if(lbl) lbl.textContent=(d.getMonth()+1)+'/'+d.getDate()+' '+G_DAY_NAMES[d.getDay()];

  grid.innerHTML='';
  grid.style.width=totalW+'px';

  // header
  const hdr=document.createElement('div'); hdr.className='gd-hdr'; hdr.style.width=totalW+'px';
  for(let i=0;i<cols;i++){
    const m=i*g;
    const isHour=m%60===0;
    const isNow=gdDayOff===thisDay&&m<=nowMin&&nowMin<m+g;
    const c=document.createElement('div');
    c.className='gd-hcell'+(isNow?' gd-now':isHour?' gd-hour':'');
    c.style.width=cw+'px';
    c.textContent=isHour?m2t(m):(m%10===0?m2t(m):'');
    c.style.justifyContent='flex-start';
    c.style.paddingLeft='2px';
    hdr.appendChild(c);
  }
  grid.appendChild(hdr);

  function mkCells(onDrop){
    const cells=document.createElement('div'); cells.className='gd-cells'; cells.style.width=totalW+'px';
    for(let i=0;i<cols;i++){
      const m=i*g;
      const isHour=m%60===0, isNow=gdDayOff===thisDay&&m<=nowMin&&nowMin<m+g;
      const c=document.createElement('div');
      c.className='gd-cell'+(isNow?' gd-now':isHour?' gd-hour':'');
      c.style.width=cw+'px';
      cells.appendChild(c);
    }
    cells.addEventListener('dragover',ev=>ev.preventDefault());
    cells.addEventListener('drop',ev=>{
      ev.preventDefault();
      const tid=parseInt(ev.dataTransfer.getData('gTaskId')); if(!tid) return;
      const x=ev.clientX-cells.getBoundingClientRect().left;
      const col=Math.max(0,Math.min(cols-1,Math.floor(x/cw)));
      onDrop(tid, col*g);
    });
    return cells;
  }

  // placed task rows — sorted by row index
  // row-reorder via mouse drag on empty area of the row
  const placed=(S.tasks||[])
    .filter(t=>{ const p=gDayPos(t.id); return p&&p.dayOff===gdDayOff; })
    .map(t=>({ task:t, pos:gDayPos(t.id) }));
  // 先排序，再确保 row 值唯一连续（避免重复导致交换失效）
  placed.sort((a,b)=>(a.pos.row??999)-(b.pos.row??999));
  placed.forEach((item,i)=>{
    if(item.pos.row==null||item.pos.row!==i){
      // 只在 row 缺失时赋值，不强制重排已有顺序
      if(item.pos.row==null) gSetDayPos(item.task.id,{...item.pos,row:i});
    }
  });
  // 修复重复 row 值
  const usedRows=new Set();
  let nextRow=placed.length;
  placed.forEach(item=>{
    const p=gDayPos(item.task.id);
    if(usedRows.has(p.row)){ gSetDayPos(item.task.id,{...p,row:nextRow++}); }
    else usedRows.add(p.row);
  });
  // 重新读取 pos（已更新）
  placed.forEach(item=>{ item.pos=gDayPos(item.task.id); });
  placed.sort((a,b)=>(a.pos.row||0)-(b.pos.row||0));
  placed.sort((a,b)=>(a.pos.row||0)-(b.pos.row||0));

  placed.forEach(({task,pos},rowIdx)=>{
    const rowEl=document.createElement('div');
    rowEl.className='gd-row'; rowEl.style.position='relative';

    // ▲▼ 按钮，跟日历栏完全一样的方式
    const sortBtns=document.createElement('div'); sortBtns.className='gc-sort-btns';
    if(rowIdx>0){
      const upBtn=document.createElement('button'); upBtn.className='gc-row-btn'; upBtn.textContent='▲';
      upBtn.title='上移';
      upBtn.onclick=e=>{ e.stopPropagation(); gdSwapRows(pos.row, placed[rowIdx-1].pos.row); };
      sortBtns.appendChild(upBtn);
    }
    if(rowIdx<placed.length-1){
      const dnBtn=document.createElement('button'); dnBtn.className='gc-row-btn'; dnBtn.textContent='▼';
      dnBtn.title='下移';
      dnBtn.onclick=e=>{ e.stopPropagation(); gdSwapRows(pos.row, placed[rowIdx+1].pos.row); };
      sortBtns.appendChild(dnBtn);
    }
    rowEl.appendChild(sortBtns);

    const cells=mkCells((tid,sm)=>{
      gSetDayPos(tid,{startMin:sm,endMin:Math.min(1440,sm+g*4),dayOff:gdDayOff,row:pos.row!=null?pos.row:rowIdx});
      gdRender();
    });
    const bar=gdMkBar(task,pos);
    if(bar) cells.appendChild(bar);
    rowEl.appendChild(cells);
    grid.appendChild(rowEl);
  });



  // empty drop row
  const emRow=document.createElement('div'); emRow.className='gd-row';
  emRow.style.cssText='border:1px dashed #1a1a2e30;background:rgba(180,220,200,.15);';
  const emCells=mkCells((tid,sm)=>{
    gSetDayPos(tid,{startMin:sm,endMin:Math.min(1440,sm+g*4),dayOff:gdDayOff});
    gdRender();
  });
  emCells.style.position='relative';
  const emLbl=document.createElement('div');
  emLbl.style.cssText='position:absolute;left:50%;transform:translateX(-50%);top:8px;font-size:6px;color:#1a1a2e40;font-family:var(--font-pixel);pointer-events:none;';
  emLbl.textContent='drag task here';
  emCells.appendChild(emLbl);
  emRow.appendChild(emCells); grid.appendChild(emRow);
}

// CALENDAR VIEW
// ════════════════════════════════════════
const GC_COL_W=52;
const GC_COLS=28;
let gcOff=0;
let gcDrag=null;
let gcRaf=null;

function gCalNav(d){ gcOff+=d*(GC_COLS/2|0); gcRender(); }
function gCalToday(){ gcOff=0; gcRender(); }
function gCalRemove(taskId){ if(!S.ganttPos)S.ganttPos={}; if(S.ganttPos[taskId]) delete S.ganttPos[taskId].calPos; saveState(); gcRender(); }

function gcBarGeom(pos){
  if(!pos||pos.day==null) return null;
  const sc=pos.day-gcOff, span=Math.max(1,pos.days||1);
  if(sc>=GC_COLS||sc+span<=0) return null;
  const s=Math.max(0,sc), e=Math.min(GC_COLS,sc+span);
  return {x:s*GC_COL_W, w:(e-s)*GC_COL_W-2};
}

// next available row for calendar

function gcGetRows(){
  const rowMap={};
  (S.tasks||[]).forEach(t=>{ const p=gCalPos(t.id); if(!p) return; const r=p.row||0; if(!rowMap[r]) rowMap[r]=[]; rowMap[r].push(t); });
  return Object.keys(rowMap).map(r=>+r).sort((a,b)=>a-b).map(r=>({row:r,tasks:rowMap[r]}));
}
function gcNextRow(){
  const used=new Set();
  (S.tasks||[]).forEach(t=>{ const p=gCalPos(t.id); if(p&&p.row!=null) used.add(p.row); });
  let r=0; while(used.has(r)) r++; return r;
}

function gcSwapRows(rowA, rowB){
  // swap the row numbers of all tasks in rowA and rowB
  (S.tasks||[]).forEach(t=>{
    const p=gCalPos(t.id); if(!p) return;
    if(p.row===rowA) p.row=rowB;
    else if(p.row===rowB) p.row=rowA;
  });
  saveState(); gcRender();
}


function gcStartDrag(e,taskId,type,barEl){
  e.preventDefault(); e.stopPropagation();
  const pos=gCalPos(taskId); if(!pos) return;
  gcDrag={taskId,type,x0:e.clientX,day0:pos.day,days0:pos.days||1,barEl};
  window.addEventListener('mousemove',gcOnDrag,{passive:true});
  window.addEventListener('mouseup',gcStopDrag);
}
function gcOnDrag(e){
  if(!gcDrag) return;
  if(gcRaf) cancelAnimationFrame(gcRaf);
  gcRaf=requestAnimationFrame(()=>{
    const{type,x0,day0,days0,barEl}=gcDrag;
    const dc=Math.round((e.clientX-x0)/GC_COL_W);
    let day=day0, days=days0;
    if(type==='move') day=day0+dc;
    else if(type==='right') days=Math.max(1,days0+dc);
    const geo=gcBarGeom({day,days,row:0});
    if(geo&&barEl){ barEl.style.left=geo.x+'px'; barEl.style.width=geo.w+'px'; }
    gcDrag._day=day; gcDrag._days=days;
  });
}
function gcStopDrag(){
  if(gcRaf){ cancelAnimationFrame(gcRaf); gcRaf=null; }
  if(gcDrag){
    if(gcDrag.isEv){
      const evId=gcDrag.evId, pos=gEvCalPos(evId)||{};
      gSetEvCalPos(evId,{...pos,day:gcDrag._day!==undefined?gcDrag._day:pos.day,days:gcDrag._days!==undefined?gcDrag._days:pos.days||1});
    } else {
      const{taskId}=gcDrag, pos=gCalPos(taskId)||{};
      gSetCalPos(taskId,{...pos,day:gcDrag._day!==undefined?gcDrag._day:pos.day,days:gcDrag._days!==undefined?gcDrag._days:pos.days||1});
    }
    gcRender();
  }
  gcDrag=null; _gcDragging=false;
  window.removeEventListener('mousemove',gcOnDrag);
  window.removeEventListener('mouseup',gcStopDrag);
}

function gcMkBar(task,pos){
  const geo=gcBarGeom(pos); if(!geo) return null;
  const color=gTaskColor(task), bd=gDarker(color,50);
  const bar=document.createElement('div');
  bar.className='gc-bar'+(task.done?' gc-done':'');
  bar.style.cssText='left:'+geo.x+'px;width:'+geo.w+'px;background:'+color+';border-color:'+bd;
  const lh=document.createElement('div'); lh.className='gc-bar-h'; lh.innerHTML='<span></span><span></span>';
  const lbl=document.createElement('div'); lbl.className='gc-bar-lbl'; lbl.textContent=task.name;
  const rh=document.createElement('div'); rh.className='gc-bar-h'; rh.style.cursor='ew-resize'; rh.innerHTML='<span></span><span></span>';
  const xb=document.createElement('div'); xb.className='gc-bar-x'; xb.textContent='✕';
  xb.onclick=ev=>{ ev.stopPropagation(); gCalRemove(task.id); };
  const chk=document.createElement('div');
  chk.style.cssText='width:12px;height:12px;flex-shrink:0;border:2px solid #1a1a2e80;border-radius:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:8px;background:'+(task.done?'#4ecb71':'transparent')+';color:#fff;margin:0 3px;';
  chk.textContent=task.done?'✓':'';
  chk.addEventListener('mousedown',e=>{ e.stopPropagation(); });
  chk.addEventListener('click',e=>{ e.stopPropagation(); toggleTask(task.id); gcRender(); });
  bar.appendChild(chk); bar.appendChild(lh); bar.appendChild(lbl); bar.appendChild(rh); bar.appendChild(xb);
  lh.addEventListener('mousedown',e=>gcStartDrag(e,task.id,'move',bar));
  rh.addEventListener('mousedown',e=>gcStartDrag(e,task.id,'right',bar));
  bar.addEventListener('mousedown',e=>{ if(chk.contains(e.target)||lh.contains(e.target)||rh.contains(e.target)||xb.contains(e.target)) return; gcStartDrag(e,task.id,'move',bar); });
  lh.addEventListener('mouseenter',()=>gcHideTip());
  rh.addEventListener('mouseenter',()=>gcHideTip());
  bar.addEventListener('mouseenter',e=>{ if(!_gcDragging&&!lh.matches(':hover')&&!rh.matches(':hover')) gcShowTip(e,task); });
  bar.addEventListener('mousemove',e=>{ if(!_gcDragging&&!lh.matches(':hover')&&!rh.matches(':hover')) gcMoveTip(e); });
  bar.addEventListener('mouseleave',()=>gcScheduleHideTip());
  return bar;
}

function gcRender(){
  const grid=document.getElementById('g-cal-grid'); if(!grid) return;
  const totalW=GC_COLS*GC_COL_W;
  const today=gDayIdx(new Date());

  const startDate=gAddDays(gcOff), endDate=gAddDays(gcOff+GC_COLS-1);
  const lbl=document.getElementById('g-cal-lbl');
  if(lbl){ const f=d=>(d.getMonth()+1)+'/'+d.getDate(); lbl.textContent=f(startDate)+' ~ '+f(endDate); }

  grid.innerHTML='';
  grid.style.width=totalW+'px';

  // header
  const hdr=document.createElement('div'); hdr.className='gc-hdr';
  for(let i=0;i<GC_COLS;i++){
    const d=gAddDays(gcOff+i);
    const isToday=(gcOff+i)===today, isWE=d.getDay()===0||d.getDay()===6;
    const c=document.createElement('div');
    c.className='gc-hcell'+(isToday?' gc-today':isWE?' gc-weekend':'');
    c.style.width=GC_COL_W+'px';
    const d1=document.createElement('span'); d1.className='gc-hdate'; d1.textContent=(d.getMonth()+1)+'/'+(d.getDate());
    const d2=document.createElement('span'); d2.className='gc-hday'; d2.textContent=G_DAY_NAMES[d.getDay()];
    c.appendChild(d1); c.appendChild(d2); hdr.appendChild(c);
  }
  grid.appendChild(hdr);

  // task rows ordered by row number
  const rows=gcGetRows();
  rows.forEach(({row,tasks},rowIdx)=>{
    const rowEl=document.createElement('div'); rowEl.className='gc-row';
    rowEl.style.position='relative';
    const sortBtns=document.createElement('div'); sortBtns.className='gc-sort-btns';
    if(rowIdx>0){
      const upBtn=document.createElement('button'); upBtn.className='gc-row-btn'; upBtn.textContent='▲';
      upBtn.title='上移'; upBtn.onclick=e=>{ e.stopPropagation(); gcSwapRows(row,rows[rowIdx-1].row); };
      sortBtns.appendChild(upBtn);
    }
    if(rowIdx<rows.length-1){
      const dnBtn=document.createElement('button'); dnBtn.className='gc-row-btn'; dnBtn.textContent='▼';
      dnBtn.title='下移'; dnBtn.onclick=e=>{ e.stopPropagation(); gcSwapRows(row,rows[rowIdx+1].row); };
      sortBtns.appendChild(dnBtn);
    }
    rowEl.appendChild(sortBtns);
    const cells=document.createElement('div'); cells.className='gc-cells'; cells.style.minWidth=totalW+'px';
    for(let i=0;i<GC_COLS;i++){
      const d=gAddDays(gcOff+i);
      const isToday=(gcOff+i)===today, isWE=d.getDay()===0||d.getDay()===6;
      const c=document.createElement('div');
      c.className='gc-cell'+(isToday?' gc-today':isWE?' gc-weekend':'');
      c.style.width=GC_COL_W+'px'; cells.appendChild(c);
    }
    tasks.forEach(task=>{
      const bar=gcMkBar(task,gCalPos(task.id));
      if(bar) cells.appendChild(bar);
    });
    cells.addEventListener('dragover',ev=>ev.preventDefault());
    cells.addEventListener('drop',ev=>{
      ev.preventDefault();
      const tid=parseInt(ev.dataTransfer.getData('gTaskId')); if(!tid) return;
      const x=ev.clientX-cells.getBoundingClientRect().left;
      const col=Math.max(0,Math.min(GC_COLS-1,Math.floor(x/GC_COL_W)));
      const oldPos=gCalPos(tid)||{};
      gSetCalPos(tid,{day:gcOff+col,days:oldPos.days||1,row});
      gcRender();
    });
    rowEl.appendChild(cells); grid.appendChild(rowEl);
  });

  // empty drop row
  const emRow=document.createElement('div'); emRow.className='gc-row';
  emRow.style.cssText='border:1px dashed #1a1a2e30;background:rgba(180,220,200,.15);';
  const emCells=document.createElement('div'); emCells.className='gc-cells'; emCells.style.minWidth=totalW+'px';
  for(let i=0;i<GC_COLS;i++){
    const c=document.createElement('div'); c.className='gc-cell'; c.style.width=GC_COL_W+'px'; emCells.appendChild(c);
  }
  emCells.style.position='relative';
  const emLbl=document.createElement('div');
  emLbl.style.cssText='position:absolute;left:50%;transform:translateX(-50%);top:6px;font-size:6px;color:#1a1a2e40;font-family:var(--font-pixel);pointer-events:none;white-space:nowrap;';
  emLbl.textContent='drag task here → new row';
  emCells.appendChild(emLbl);
  emCells.addEventListener('dragover',ev=>ev.preventDefault());
  emCells.addEventListener('drop',ev=>{
    ev.preventDefault();
    const tid=parseInt(ev.dataTransfer.getData('gTaskId')); if(!tid) return;
    const x=ev.clientX-emCells.getBoundingClientRect().left;
    const col=Math.max(0,Math.min(GC_COLS-1,Math.floor(x/GC_COL_W)));
    gSetCalPos(tid,{day:gcOff+col,days:1,row:gcNextRow()});
    gcRender();
  });
  emRow.appendChild(emCells); grid.appendChild(emRow);
}

function ganttSwitchTab(tab){
  gCurrentTab=tab;
  document.getElementById('g-day-view').style.display=tab==='day'?'flex':'none';
  const calEl=document.getElementById('g-cal-view');
  if(calEl){ calEl.style.display=tab==='cal'?'flex':'none'; if(tab==='cal') gcRender(); }
  document.getElementById('g-tab-day').classList.toggle('g-stab-on',tab==='day');
  document.getElementById('g-tab-cal').classList.toggle('g-stab-on',tab==='cal');
  if(tab==='day') gdRender();
}

// migrate old ganttPos format (flat → nested)
function gMigratePos(){
  const gp=S.ganttPos; if(!gp) return;
  Object.keys(gp).forEach(k=>{
    const v=gp[k];
    // if it has day/days at root level (old calendar format) → wrap
    if(v&&(v.day!=null)&&!v.calPos&&!v.dayPos){
      gp[k]={calPos:{day:v.day,days:v.days||1,row:v.row||0}};
    }
    // if it has startMin/endMin at root level (old day format) → wrap
    if(v&&v.startMin!=null&&!v.dayPos&&!v.calPos){
      gp[k]={dayPos:{startMin:v.startMin,endMin:v.endMin,dayOff:v.dayOff||0}};
    }
  });
}

// checkin key: "YYYY-MM-DD_habitId"
function ciKey(dateStr, habitId){ return dateStr+'_'+habitId; }
function ciIsChecked(dateStr, habitId){ return !!(S.checkins||{})[ciKey(dateStr,habitId)]; }
function ciToggle(dateStr, habitId){
  if(!S.checkins) S.checkins={};

function renderCiCalendar(){
  const cal = document.getElementById('ci-calendar'); if(!cal) return;
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  const targetYear = y + Math.floor((m + ciMonthOff) / 12);
  const targetMonth = ((m + ciMonthOff) % 12 + 12) % 12;
  const firstDay = new Date(targetYear, targetMonth, 1);
  const lastDay  = new Date(targetYear, targetMonth+1, 0);
  const daysInMonth = lastDay.getDate();
  const startWd = firstDay.getDay(); // 0=Sun

  const monthNames=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('ci-month-lbl').textContent = targetYear+'年'+monthNames[targetMonth];

  const DAY_HDRS=['日','一','二','三','四','五','六'];
  const habits = S.habits||[];
  // cell height depends on habit count
  const cellH = Math.max(60, 30 + habits.length*22);

  let html='<div style="padding:10px 8px;overflow-x:auto;">';
  html+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;min-width:280px;">';
  // headers
  DAY_HDRS.forEach(d=>{ html+='<div style="text-align:center;font-family:var(--font-pixel);font-size:7px;color:#808080;padding:4px 0;">'+d+'</div>'; });
  // empty cells before first day
  for(let i=0;i<startWd;i++) html+='<div></div>';
  // day cells
  const todayStr = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  for(let d=1;d<=daysInMonth;d++){
    const ds=targetYear+'-'+String(targetMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isToday=ds===todayStr;
    const wd=new Date(targetYear,targetMonth,d).getDay();
    const isWE=wd===0||wd===6;
    const checkedHabits=habits.filter(h=>ciIsChecked(ds,h.id));
    html+='<div data-ds="'+ds+'" onclick="ciDayClickDs(this)" style="min-height:'+cellH+'px;border:1px solid '+(isToday?'var(--accent)':'var(--border)')+';border-radius:4px;padding:4px 3px;cursor:pointer;background:'+(isToday?'rgba(233,69,96,.08)':isWE?'rgba(255,255,255,.03)':'transparent')+';position:relative;">';
    html+='<div style="font-family:var(--font-pixel);font-size:7px;color:'+(isToday?'var(--accent)':isWE?'var(--gray)':'var(--light)')+';">'+d+'</div>';
    checkedHabits.forEach(h=>{ html+='<div style="font-size:16px;line-height:1.3;" title="'+h.name+'">'+h.emoji+'</div>'; });
    html+='</div>';
  }
  html+='</div></div>';
  cal.innerHTML=html;
}

document.addEventListener('mousedown',e=>{

});




function ganttAutoShift(){
  const today = gDayIdx(new Date());
  let changed = false;
  (S.tasks||[]).forEach(t=>{
    // ── 日程（DAY）逻辑 ──
    // 未完成且 dayOff < today → 顺移到今天同时段
    // 已完成 → 固定在完成时的 dayOff，不动
    const dp = gDayPos(t.id);
    if(dp && !t.done && dp.dayOff < today){
      if(!S.ganttPos) S.ganttPos={};
      if(!S.ganttPos[t.id]) S.ganttPos[t.id]={};
      S.ganttPos[t.id].dayPos = {...dp, dayOff: today};
      changed = true;
    }
    // ── 日历（CAL）逻辑 ──
    // 完全不动，拖到哪里是哪里，不做任何自动处理
  });
  if(changed){ saveState(); }
}

const PW_STORE_KEY = 'adhd-rpg-pw';

// Read current password (falls back to hardcoded default if never changed)
function getCurrentPw(){

function doChangePassword(){
  const oldVal  = document.getElementById('pw-old').value;
  const new1    = document.getElementById('pw-new1').value;
  const new2    = document.getElementById('pw-new2').value;
  const errEl   = document.getElementById('pw-change-err');

  if(oldVal !== getCurrentPw()){
    errEl.textContent = '当前密码错误'; return;

  }
  if(new1 !== new2){

  }
  if(new1.length < 4){
    errEl.textContent = '密码至少需要4位'; return;
  }

  localStorage.setItem(PW_STORE_KEY, new1);
  // Update session so user is not kicked out
  sessionStorage.setItem('rpg-auth', new1);
  closeModal('changePwModal');
  showToast('✓ 密码已修改');
}

<script>
// ═══════════════════════════════════════
// HIGHLIGHT
// ═══════════════════════════════════════
let _hlTarget = null; // {cid, field, start, end}

function onCardSelect(e, cid, field){
  const sel = window.getSelection();
  if(!sel || sel.isCollapsed){ hideHlToolbar(); return; }
  const range = sel.getRangeAt(0);
  if(!range || range.collapsed){ hideHlToolbar(); return; }
  // get text offset within the element
  const el = e.currentTarget;
  const fullText = el.textContent;
  const selText = sel.toString();
  if(!selText.trim()){ hideHlToolbar(); return; }
  // compute start offset
  const preRange = document.createRange();
  preRange.setStart(el, 0);
  preRange.setEnd(range.startContainer, range.startOffset);
  const start = preRange.toString().length;
  const end = start + selText.length;
  _hlTarget = {cid, field, start, end};
  // position toolbar near selection
  const rect = range.getBoundingClientRect();
  const tb = document.getElementById('hlToolbar');
  tb.style.left = Math.max(4, rect.left) + 'px';
  tb.style.top = (rect.top - 44 + window.scrollY) + 'px';
  tb.classList.add('show');
}

function hideHlToolbar(){
  document.getElementById('hlToolbar').classList.remove('show');
  _hlTarget = null;
}

document.addEventListener('mousedown', function(e){
  if(!e.target.closest('#hlToolbar')) hideHlToolbar();
});

function applyHighlight(color){
  if(!_hlTarget) return;
  const c = S.cards.find(x=>x.id==_hlTarget.cid); if(!c) return;
  const field = _hlTarget.field==='quote' ? 'quoteHl' : 'bodyHl';
  if(!c[field]) c[field]=[];
  // merge overlapping
  const {start,end} = _hlTarget;
  c[field] = c[field].filter(h=>h.end<=start||h.start>=end); // remove overlaps
  c[field].push({start,end,color});
  hideHlToolbar();
  window.getSelection().removeAllRanges();
  saveState(); renderCards();
}

function clearHighlight(){
  if(!_hlTarget) return;
  const c = S.cards.find(x=>x.id==_hlTarget.cid); if(!c) return;
  const field = _hlTarget.field==='quote' ? 'quoteHl' : 'bodyHl';
  const {start,end}=_hlTarget;
  if(c[field]) c[field]=c[field].filter(h=>!(h.start<end&&h.end>start));
  hideHlToolbar();
  window.getSelection().removeAllRanges();
  saveState(); renderCards();
}

// ── 扩展功能管理 ──
function extLoad(){
  return JSON.parse(localStorage.getItem('mmm_extensions')||'[]');
}
function extSave(list){
  localStorage.setItem('mmm_extensions', JSON.stringify(list));
}
function extAdd(){
  const name = document.getElementById('ext-name-input').value.trim();
  const url  = document.getElementById('ext-url-input').value.trim();
  const desc = document.getElementById('ext-desc-input').value.trim();
  if(!name||!url){ showToast('请填写名称和URL'); return; }
  const list = extLoad();
  list.push({ id: Date.now(), name, url, desc });
  extSave(list);
  document.getElementById('ext-name-input').value='';
  document.getElementById('ext-url-input').value='';
  document.getElementById('ext-desc-input').value='';
  renderExtensions();
  showToast('扩展已添加 ✓');
}
function extDelete(id){
  extSave(extLoad().filter(e=>e.id!==id));
  renderExtensions();
}
function renderExtensions(){
  // 确保内置扩展始终存在
  const builtin = [
    {id:'builtin-task-paint', name:'Task Paint', url:'https://mmm-d6.github.io/mmm_test/task-paint.html', desc:'任务可视化画板'}
  ];
  const list = extLoad();
  builtin.forEach(b=>{
    if(!list.find(e=>e.id===b.id)) list.unshift(b);
  });
  const el = document.getElementById('ext-list');
  if(!el) return;
  if(!list.length){
    el.innerHTML='<div style="font-size:13px;color:#808080;padding:16px;border:2px dashed #c0c0c0;text-align:center;">还没有扩展，在下方添加第一个吧</div>';
    return;
  }
  el.innerHTML = list.map(e=>`
    <div style="background:var(--surface2);border:2px solid var(--win-darker);padding:12px 14px;display:flex;align-items:center;gap:10px;">
      <div style="flex:1;min-width:0;">
        <div style="font-size:14px;font-weight:bold;color:#000080;margin-bottom:3px;">${e.name}</div>
        ${e.desc?'<div style="font-size:11px;color:#808080;margin-bottom:4px;">'+e.desc+'</div>':''}
        <div style="font-size:11px;color:#808080;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${e.url}</div>
      </div>
      <button class="pxl-btn primary" onclick="window.open('${e.url}','_blank')" style="flex-shrink:0;">打开</button>
      <button class="icon-btn" onclick="extDelete(${e.id})" style="color:#cc0000;flex-shrink:0;">✕</button>
    </div>
  `).join('');
}

</script>
