<!DOCTYPE html>
<html lang="zh">
<head>
<script>
(function(){
  var PASS = localStorage.getItem('adhd-rpg-pw') || 'x5uvwa9uyimiaodai1999';
  var KEY = 'rpg-auth';
  if(sessionStorage.getItem(KEY) === PASS) return;
  // SW + manifest still load (needed for PWA install prompt)
  // Only block the UI after DOM ready
  document.addEventListener('DOMContentLoaded', function(){
    // hide entire app
    document.getElementById('app').style.display = 'none';
    // show password screen
    var overlay = document.createElement('div');
    overlay.id = 'pw-overlay';
    overlay.style.cssText = 'position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0d0d1a;flex-direction:column;gap:16px;font-family:monospace;z-index:9999;';
    overlay.innerHTML = '<div style="color:#f5a623;font-size:13px;letter-spacing:2px;margin-bottom:8px;">MMM 日志</div>'
      + '<input id="pw-input" type="password" placeholder="输入密码..." autofocus style="background:#111128;border:1px solid #4a90d9;color:#e8e8f0;padding:10px 16px;font-size:16px;outline:none;width:220px;text-align:center;font-family:monospace;"/>'
      + '<div id="pw-err" style="color:#e94560;font-size:13px;min-height:18px;"></div>';
    document.body.appendChild(overlay);
    setTimeout(function(){ document.getElementById('pw-input').focus(); }, 100);
    document.getElementById('pw-input').addEventListener('keydown', function(e){
      if(e.key === 'Enter'){
        if(this.value === PASS){
          sessionStorage.setItem(KEY, PASS);
          overlay.remove();
          document.getElementById('app').style.display = 'flex';
        } else {
          document.getElementById('pw-err').textContent = '密码错误，请重试';
          this.value = '';
        }
      }
    });
  });
})();
</script>

<style>
:root {
  --px: #1a1a2e;
  --accent: #e94560;
  --accent2: #0f3460;
  --gold: #f5a623;
  --green: #4ecb71;
  --blue: #4a90d9;
  --purple: #9b59b6;
  --gray: #8892a4;
  --light: #e8e8f0;
  --bg: #0d0d1a;
  --surface: #111128;
  --surface2: #1a1a35;
  --border: rgba(255,255,255,0.12);
  --font-pixel: 'Press Start 2P', monospace;
  --font-vt: 'VT323', monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--light);font-family:var(--font-vt);font-size:18px;}
.app{display:flex;flex-direction:column;height:100vh;}

/* TOP BAR */
.topbar{display:grid;grid-template-columns:1fr auto;gap:10px;padding:10px 12px;background:var(--surface);border-bottom:2px solid var(--border);flex-shrink:0;}
.char-panel{display:flex;align-items:center;gap:10px;}
.avatar-frame{position:relative;width:68px;height:68px;border:2px solid var(--accent);cursor:pointer;flex-shrink:0;overflow:hidden;background:var(--surface2);image-rendering:pixelated;}
.avatar-frame img{width:100%;height:100%;object-fit:cover;image-rendering:pixelated;}
.avatar-default{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.char-info{flex:1;min-width:0;}
.char-name{font-family:var(--font-pixel);font-size:9px;color:var(--gold);background:none;border:none;outline:none;width:100%;max-width:180px;cursor:pointer;}
.char-name:focus{border-bottom:1px solid var(--gold);}
.level-row{display:flex;align-items:center;gap:6px;margin-top:5px;}
.lv-badge{font-family:var(--font-pixel);font-size:7px;background:var(--accent2);color:var(--blue);padding:2px 5px;border:1px solid var(--blue);flex-shrink:0;}
.xp-bar-wrap{flex:1;height:10px;background:var(--surface2);border:1px solid var(--border);overflow:hidden;}
.xp-bar{height:100%;background:linear-gradient(90deg,var(--purple),var(--blue));transition:width .6s ease;}
.xp-text{font-size:12px;color:var(--gray);white-space:nowrap;flex-shrink:0;}
.levelup-btn{font-family:var(--font-pixel);font-size:7px;background:var(--gold);color:#000;border:none;padding:3px 6px;cursor:pointer;display:none;animation:blink 1s infinite;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

/* POMODORO */
.pomo-panel{display:flex;flex-direction:column;align-items:center;gap:5px;padding:6px 10px;background:var(--surface2);border:1px solid var(--border);min-width:130px;}
.pomo-display{font-family:var(--font-pixel);font-size:16px;color:var(--accent);letter-spacing:3px;}
.pomo-display.running{color:var(--green);}
.pomo-task-name{font-size:12px;color:var(--gray);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pomo-btns{display:flex;gap:4px;}
.pomo-btn{font-family:var(--font-pixel);font-size:6px;padding:3px 5px;background:var(--surface);color:var(--light);border:1px solid var(--border);cursor:pointer;}
.pomo-btn:hover{background:var(--accent2);}
.pomo-btn.active{background:var(--green);color:#000;border-color:var(--green);}
.pomo-notify{font-size:11px;color:var(--gray);}

/* TABS */
.tabs{display:flex;background:var(--surface);border-bottom:2px solid var(--border);flex-shrink:0;overflow-x:auto;}
.tab{font-family:var(--font-pixel);font-size:7px;padding:9px 13px;cursor:pointer;color:var(--gray);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;flex-shrink:0;}
.tab:hover{color:var(--light);}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:12px;}
.section{display:none;}
.section.active{display:block;}

/* COMMON BUTTONS */
.pxl-btn{font-family:var(--font-pixel);font-size:7px;padding:6px 10px;background:var(--surface2);color:var(--light);border:1px solid var(--border);cursor:pointer;transition:all .1s;white-space:nowrap;}
.pxl-btn:hover{background:var(--accent2);border-color:var(--blue);}
.pxl-btn.primary{background:var(--accent2);border-color:var(--blue);color:var(--blue);}
.pxl-btn.danger{border-color:var(--accent);color:var(--accent);}

/* SEARCH */
.search-bar{background:var(--surface2);border:1px solid var(--border);color:var(--light);padding:6px 10px;font-family:var(--font-vt);font-size:16px;outline:none;flex:1;min-width:120px;}
.search-bar:focus{border-color:var(--blue);}
.search-bar::placeholder{color:var(--gray);}
.form-select{background:var(--surface2);border:1px solid var(--border);color:var(--light);padding:5px 8px;font-family:var(--font-vt);font-size:15px;outline:none;}
.form-select option{background:var(--surface);}

/* TOOLBAR */
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center;}

/* CALENDAR */
.cal-strip{background:var(--surface2);border:1px solid var(--border);padding:8px;margin-bottom:12px;}
.cal-header{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.cal-nav{font-family:var(--font-pixel);font-size:6px;background:none;border:1px solid var(--border);color:var(--gray);padding:3px 7px;cursor:pointer;}
.cal-nav:hover{color:var(--light);}
.cal-month-label{font-family:var(--font-pixel);font-size:8px;color:var(--gold);flex:1;text-align:center;}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-dh{font-family:var(--font-pixel);font-size:6px;color:var(--gray);text-align:center;padding:2px 0;}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;border:1px solid transparent;position:relative;transition:all .1s;}
.cal-day:hover{border-color:var(--border);}
.cal-day.today{color:var(--gold);border-color:var(--gold);}
.cal-day.selected{background:var(--accent2);border-color:var(--blue);}
.cal-day.has-dot::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--green);}
.cal-day.has-defer::after{background:var(--gold);}
.cal-day.empty{pointer-events:none;}

/* TASKS */
.task-list{display:flex;flex-direction:column;gap:8px;}
.task-card{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--blue);padding:10px 12px;}
.task-card.priority-high{border-left-color:var(--accent);}
.task-card.priority-med{border-left-color:var(--gold);}
.task-card.priority-low{border-left-color:var(--green);}
.task-card.deferred{opacity:.6;border-left-color:var(--gray);}
.task-card.done{opacity:.5;}
.task-top{display:flex;align-items:flex-start;gap:8px;}
.task-check{width:16px;height:16px;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px;font-size:10px;}
.task-check.checked{background:var(--green);border-color:var(--green);color:#000;}
.task-title-wrap{flex:1;min-width:0;}
.task-title{font-size:17px;color:var(--light);word-break:break-word;}
.task-title.done-text{text-decoration:line-through;color:var(--gray);}
.task-meta{font-size:12px;color:var(--gray);margin-top:2px;}
.task-actions{display:flex;gap:3px;flex-shrink:0;}
.icon-btn{background:none;border:1px solid transparent;color:var(--gray);cursor:pointer;font-size:14px;padding:2px 5px;}
.icon-btn:hover{color:var(--light);border-color:var(--border);}
.prog-row{display:flex;align-items:center;gap:8px;margin-top:8px;}
.prog-wrap{flex:1;height:8px;background:var(--surface);border:1px solid var(--border);overflow:hidden;}
.prog-bar{height:100%;background:var(--blue);transition:width .3s;}
.prog-ctrl{display:flex;align-items:center;gap:4px;font-size:13px;}
.prog-btn{background:var(--surface);border:1px solid var(--border);color:var(--light);cursor:pointer;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:12px;}
.prog-btn:hover{background:var(--accent2);}
.steps-list{margin-top:8px;border-top:1px solid var(--border);padding-top:8px;display:flex;flex-direction:column;gap:4px;}
.step-row{display:flex;align-items:center;gap:6px;font-size:15px;}
.step-check{width:12px;height:12px;border:1px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;}
.step-check.checked{background:var(--green);border-color:var(--green);}
.pomo-record{margin-top:6px;font-size:12px;color:var(--purple);}

/* ENTRIES */
.entry-card{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--purple);padding:10px 12px;margin-bottom:8px;}
.entry-card.dream-entry{border-left-color:var(--gold);}
.entry-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.entry-ts{font-family:var(--font-pixel);font-size:7px;color:var(--gray);}
.entry-body{font-size:17px;color:var(--light);line-height:1.55;white-space:pre-wrap;word-break:break-word;}
.entry-img{margin-top:8px;max-width:100%;max-height:220px;object-fit:contain;border:1px solid var(--border);}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.tag{font-size:12px;background:var(--accent2);color:var(--blue);padding:1px 8px;border:1px solid var(--blue);}
.tag.dream-tag{background:rgba(245,166,35,.12);color:var(--gold);border-color:var(--gold);}

/* ARCHIVE */
.archive-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.arch-btn{font-size:13px;padding:4px 10px;background:var(--surface2);border:1px solid var(--border);color:var(--gray);cursor:pointer;}
.arch-btn:hover{color:var(--light);}
.arch-btn.selected{background:var(--accent2);border-color:var(--blue);color:var(--light);}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:100;align-items:center;justify-content:center;padding:16px;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border:2px solid var(--border);padding:20px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;position:relative;}
.modal-title{font-family:var(--font-pixel);font-size:9px;color:var(--gold);margin-bottom:16px;}
.form-row{margin-bottom:12px;}
.form-label{font-size:13px;color:var(--gray);display:block;margin-bottom:4px;}
.form-input,.form-textarea,.modal .form-select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--light);padding:7px 10px;font-family:var(--font-vt);font-size:16px;outline:none;resize:vertical;}
.form-input:focus,.form-textarea:focus,.modal .form-select:focus{border-color:var(--blue);}
.modal .form-select option{background:var(--surface);}
.modal-btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}
.close-btn{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--gray);font-size:18px;cursor:pointer;}
.close-btn:hover{color:var(--accent);}
.upload-btn{display:block;width:100%;padding:8px;background:var(--surface);border:1px dashed var(--border);color:var(--gray);cursor:pointer;text-align:center;font-size:14px;margin-top:6px;}
.upload-btn:hover{border-color:var(--blue);color:var(--light);}

/* SETTINGS */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:500px){.settings-grid{grid-template-columns:1fr;}}
.setting-card{background:var(--surface2);border:1px solid var(--border);padding:12px;}
.setting-title{font-family:var(--font-pixel);font-size:7px;color:var(--gold);margin-bottom:10px;}
.color-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.color-label{font-size:14px;color:var(--gray);flex:1;}

/* TOAST */
.toast{position:fixed;top:80px;right:16px;background:var(--surface);border:2px solid var(--gold);padding:8px 14px;font-family:var(--font-pixel);font-size:8px;color:var(--gold);z-index:200;pointer-events:none;animation:toastIn .3s ease,toastOut .3s ease 2.2s forwards;}
@keyframes toastIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
@keyframes toastOut{to{opacity:0;transform:translateX(20px);}}

/* UNDO */
.undo-bar{display:none;position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--gold);padding:8px 16px;font-size:15px;z-index:200;gap:12px;align-items:center;white-space:nowrap;}
.undo-bar.show{display:flex;}

/* EMPTY */
.empty-state{text-align:center;padding:40px 20px;color:var(--gray);font-size:15px;}
.empty-icon{font-size:40px;margin-bottom:12px;}

/* PWA install banner */
.install-banner{display:none;background:var(--accent2);border-bottom:1px solid var(--blue);padding:8px 14px;font-size:14px;color:var(--light);align-items:center;gap:10px;flex-shrink:0;}
.install-banner.show{display:flex;}
.install-banner button{font-family:var(--font-pixel);font-size:7px;padding:4px 8px;background:var(--blue);color:#fff;border:none;cursor:pointer;}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- PWA install prompt -->
  <div class="install-banner" id="installBanner">
    <span>📲 安装到桌面，番茄钟后台照常运行！</span>

<script>
// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let S = {
  charName:'MMM', level:1, xp:0,
  tasks:[], journal:[], dreams:[], cards:[],
  theme:{}, progStep:10, nextId:1,
  avatar:null, bgImg:null
};

let undoStack=[], undoTimer=null;
let calDate=new Date(), calFilter=null;
let jMonthFilter=null, dMonthFilter=null;
let dreamImgData=null;

// ── Pomodoro ──
let pomoTimer=null, pomoSec=0, pomoTaskId=null, pomoMin=0;
let pomoStartWall=0; // wall-clock start time for drift correction
let pomoEndWall=0;

// ═══════════════════════════════════════
// STORAGE — localStorage + Supabase sync
// ═══════════════════════════════════════
const SB_URL = 'https://mtrxasnouojkgsedudhs.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10cnhhc25vdW9qa2dzZWR1ZGhzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNzI4NzYsImV4cCI6MjA5MTk0ODg3Nn0.qV783OBRfd8X03s_UnciFGJRW5WG9LpJzEcNcgG-Kgg';
const SB_TABLE = 'rpg_data';
const SB_ROW_KEY = 'state';
const SB_HEADERS = {
  'Content-Type': 'application/json',
  'apikey': SB_KEY,
  'Authorization': 'Bearer ' + SB_KEY,
  'Prefer': 'resolution=merge-duplicates'
};

let _saveTimer = null;
let _syncIndicator = null;

function setSyncStatus(status) {
  // status: 'saving' | 'saved' | 'offline' | 'error'
  let el = document.getElementById('sync-status');
  if (!el) {
    el = document.createElement('div');
    el.id = 'sync-status';
    el.style.cssText = 'position:fixed;bottom:10px;right:10px;font-family:monospace;font-size:11px;padding:4px 10px;border-radius:4px;z-index:999;transition:opacity 0.5s;pointer-events:none;';
    document.body.appendChild(el);
  }
  const styles = {
    saving:  'background:#1a1a35;color:#4a90d9;border:1px solid #4a90d9;opacity:1;',
    saved:   'background:#1a1a35;color:#4ecb71;border:1px solid #4ecb71;opacity:1;',
    offline: 'background:#1a1a35;color:#f5a623;border:1px solid #f5a623;opacity:1;',
    error:   'background:#1a1a35;color:#e94560;border:1px solid #e94560;opacity:1;',
  };
  const labels = { saving:'↑ 同步中...', saved:'✓ 已同步', offline:'⚡ 离线模式', error:'✕ 同步失败' };
  el.style.cssText += styles[status] || styles.offline;
  el.textContent = labels[status] || '';
  if (status === 'saved') {
    setTimeout(() => { el.style.opacity = '0'; }, 2000);
  }
}

// Save to localStorage immediately, debounce cloud sync by 1.5s
function saveState() {
  try { localStorage.setItem('adhd-rpg-v2', JSON.stringify(S)); } catch(e) {}
  if (_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(syncToCloud, 1500);
}

async function syncToCloud() {
  try {
    setSyncStatus('saving');
    const payload = JSON.stringify(S);
    const res = await fetch(SB_URL + '/rest/v1/' + SB_TABLE, {
      method: 'POST',
      headers: SB_HEADERS,
      body: JSON.stringify({ key: SB_ROW_KEY, value: payload })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    setSyncStatus('saved');
  } catch(e) {
    setSyncStatus(navigator.onLine ? 'error' : 'offline');
  }
}

// Migrate old data shapes → current shape (run after every Object.assign)
function migrateState() {
  // ensure all array fields always exist
  const arrays = ['tasks','journal','dreams','cards'];
  arrays.forEach(k => { if (!Array.isArray(S[k])) S[k] = []; });
  // ensure scalar fields exist
  if (!S.charName) S.charName = 'MMM';
  if (!S.level)    S.level    = 1;
  if (!S.xp)       S.xp       = 0;
  if (!S.nextId)   S.nextId   = 1;
  if (!S.progStep) S.progStep  = 10;
  if (!S.theme)    S.theme     = {};
  // migrate old note arrays (lit/ideas/drafts/fleeting/permanent) → discard
  // (user never used them meaningfully; data is in journal/tasks/dreams)
  delete S.lit; delete S.ideas; delete S.drafts;
  delete S.fleeting; delete S.permanent;
}

// Load: try cloud first, fall back to localStorage
async function loadState() {
  // Show local data immediately so UI is not blank
  try {
    const local = localStorage.getItem('adhd-rpg-v2');
    if (local) { Object.assign(S, JSON.parse(local)); migrateState(); }
  } catch(e) {}

  // Then try to fetch cloud data (may be newer)
  try {
    const res = await fetch(
      SB_URL + '/rest/v1/' + SB_TABLE + '?key=eq.' + SB_ROW_KEY + '&select=value',
      { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY } }
    );
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    if (rows && rows.length && rows[0].value) {
      const cloud = JSON.parse(rows[0].value);
      Object.assign(S, cloud);
      migrateState();
      // Update local cache with cloud data
      try { localStorage.setItem('adhd-rpg-v2', JSON.stringify(S)); } catch(e) {}
      setSyncStatus('saved');
      renderAll(); // re-render with cloud data
    } else {
      // No cloud data yet — push local data up
      setSyncStatus('offline');
      syncToCloud();
    }
  } catch(e) {
    setSyncStatus('offline');
  }
}

// ═══════════════════════════════════════
// XP / LEVEL
// ═══════════════════════════════════════
function xpNeeded(lv){ return Math.floor(100*Math.pow(1.45,lv-1)); }

function addXP(amt, label){
  S.xp+=amt; saveState(); updateXPUI();
  showToast('+'+amt+' XP  ('+label+')');
}

function updateXPUI(){
  const need=xpNeeded(S.level);
  const pct=Math.min(100,Math.floor(S.xp/need*100));
  document.getElementById('xpBar').style.width=pct+'%';
  document.getElementById('xpText').textContent=S.xp+'/'+need;
  document.getElementById('charLevel').textContent=S.level;
  document.getElementById('levelupBtn').style.display=S.xp>=need?'inline-block':'none';
}

function doLevelUp(){
  const need=xpNeeded(S.level);
  if(S.xp<need) return;
  S.xp-=need; S.level++;
  saveState(); updateXPUI();
  showToast('🎉 升级！现在是 LV'+S.level);
}

// ═══════════════════════════════════════
// TOAST / UNDO
// ═══════════════════════════════════════
function showToast(msg){
  const el=document.createElement('div');
  el.className='toast'; el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2800);
}

function showUndoBar(msg){
  document.getElementById('undoMsg').textContent=msg;
  document.getElementById('undoBar').classList.add('show');
  if(undoTimer) clearTimeout(undoTimer);
  undoTimer=setTimeout(()=>document.getElementById('undoBar').classList.remove('show'),6000);
}

function doUndo(){
  if(!undoStack.length) return;
  Object.assign(S, JSON.parse(undoStack.pop()));
  saveState(); updateXPUI(); renderAll();
  document.getElementById('undoBar').classList.remove('show');
}

// ═══════════════════════════════════════
// TABS
// ═══════════════════════════════════════
function showTab(tab, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('sec-'+tab).classList.add('active');
  if(tab==='tasks'){renderTasks();renderCal();}

// ═══════════════════════════════════════
// TASKS
// ═══════════════════════════════════════
function saveTask(){
  const name=document.getElementById('taskName').value.trim();
  if(!name) return;
  const editId=document.getElementById('editTaskId').value;
  const steps=document.getElementById('taskSteps').value.trim().split('\n').filter(s=>s.trim()).map(s=>({text:s.trim(),done:false}));
  const step=parseInt(document.getElementById('taskProgStep').value)||10;
  undoStack.push(JSON.stringify(S));
  if(editId){
    const idx=S.tasks.findIndex(t=>t.id==editId);
    if(idx>=0) Object.assign(S.tasks[idx],{name,priority:document.getElementById('taskPriority').value,due:document.getElementById('taskDue').value,defer:document.getElementById('taskDefer').value,steps,progStep:step});
  } else {
    S.tasks.unshift({id:S.nextId++,name,priority:document.getElementById('taskPriority').value,due:document.getElementById('taskDue').value,defer:document.getElementById('taskDefer').value,steps,progress:0,progStep:step,done:false,createdAt:new Date().toISOString(),pomoRecords:[]});
  }
  saveState(); closeModal('taskModal'); renderTasks();
}

function deleteTask(id){
  undoStack.push(JSON.stringify(S));
  S.tasks=S.tasks.filter(t=>t.id!=id);
  saveState(); renderTasks(); showUndoBar('任务已删除');
}

function toggleTask(id){
  const t=S.tasks.find(t=>t.id==id); if(!t) return;
  undoStack.push(JSON.stringify(S));
  t.done=!t.done;
  if(t.done){
    t.progress=100;
    addXP(10,'完成任务');
    if(pomoTimer && pomoTaskId==id){
      const elapsed=pomoMin*60-Math.max(0,Math.round((pomoEndWall-Date.now())/1000));
      const m=Math.floor(elapsed/60),s=elapsed%60;
      if(!t.pomoRecords) t.pomoRecords=[];
      t.pomoRecords.push(m+'m'+p2(s)+'s @ '+fmtDT(new Date().toISOString())+'（完成时快照）');
    }
  }
  saveState(); renderTasks();
}

function toggleStep(tid,si){
  const t=S.tasks.find(t=>t.id==tid); if(!t||!t.steps) return;
  t.steps[si].done=!t.steps[si].done;
  const done=t.steps.filter(s=>s.done).length;
  t.progress=Math.round(done/t.steps.length*100);
  saveState(); renderTasks();
}

function changeProgress(id,dir){
  const t=S.tasks.find(t=>t.id==id); if(!t) return;
  const step=t.progStep||S.progStep||10;
  t.progress=Math.max(0,Math.min(100,t.progress+dir*step));
  saveState(); renderTasks();
}

function deferTask(id){
  const t=S.tasks.find(t=>t.id==id); if(!t) return;
  const d=prompt('推迟到（YYYY-MM-DD）：',t.defer||'');
  if(d!==null){t.defer=d; saveState(); renderTasks();}
}

function bindPomo(id){
  const t=S.tasks.find(t=>t.id==id); if(!t) return;
  pomoTaskId=id;
  document.getElementById('pomoTaskName').textContent=t.name;
  showToast('🍅 已绑定: '+t.name);
}

function fmtDT(iso){
  if(!iso) return '';
  const d=new Date(iso);
  return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate())+' '+p2(d.getHours())+':'+p2(d.getMinutes());
}
function p2(n){return String(n).padStart(2,'0');}

function renderTasks(){
  const search=(document.getElementById('taskSearch').value||'').toLowerCase();
  const filter=document.getElementById('taskFilter').value;
  let tasks=S.tasks.filter(t=>{
    if(search && !t.name.toLowerCase().includes(search)) return false;
    if(filter==='done' && !t.done) return false;
    if(filter==='todo' && (t.done||t.defer)) return false;
    if(filter==='deferred' && !t.defer) return false;
    if(calFilter){
      if((t.createdAt||'').slice(0,10)!==calFilter && (t.defer||'')!==calFilter) return false;
    }
    return true;
  });
  const list=document.getElementById('taskList');
  if(!tasks.length){list.innerHTML='<div class="empty-state"><div class="empty-icon">📜</div>没有任务，去添加一个吧！</div>';return;}
  list.innerHTML=tasks.map(t=>{
    const pc=t.priority||'med';
    const stepsHtml=(t.steps||[]).length?`<div class="steps-list">${(t.steps||[]).map((s,i)=>`<div class="step-row"><div class="step-check ${s.done?'checked':''}" onclick="toggleStep(${t.id},${i})">${s.done?'✓':''}</div><span style="${s.done?'text-decoration:line-through;color:var(--gray)':''}">${s.text}</span></div>`).join('')}</div>`:'';
    const pomoHtml=(t.pomoRecords||[]).length?`<div class="pomo-record">🍅 ${t.pomoRecords.join(' · ')}</div>`:'';
    const deferLabel=t.defer?` · 推迟:${t.defer}`:'';
    const dueLabel=t.due?` · 截止:${t.due}`:'';
    return `<div class="task-card priority-${pc} ${t.defer&&!t.done?'deferred':''} ${t.done?'done':''}">
      <div class="task-top">
        <div class="task-check ${t.done?'checked':''}" onclick="toggleTask(${t.id})">${t.done?'✓':''}</div>
        <div class="task-title-wrap">
          <div class="task-title ${t.done?'done-text':''}">${t.name}</div>
          <div class="task-meta">${fmtDT(t.createdAt)}${dueLabel}${deferLabel}</div>
        </div>
        <div class="task-actions">
          <button class="icon-btn" onclick="bindPomo(${t.id})" title="绑定番茄钟">🍅</button>
          <button class="icon-btn" onclick="deferTask(${t.id})" title="推迟">📅</button>
          <button class="icon-btn" onclick="openTaskModal(${t.id})" title="编辑">✏️</button>
          <button class="icon-btn" onclick="deleteTask(${t.id})" style="color:var(--accent)">✕</button>
        </div>
      </div>
      <div class="prog-row">
        <div class="prog-wrap"><div class="prog-bar" style="width:${t.progress||0}%"></div></div>
        <div class="prog-ctrl">
          <button class="prog-btn" onclick="changeProgress(${t.id},-1)">−</button>
          <span>${t.progress||0}%</span>
          <button class="prog-btn" onclick="changeProgress(${t.id},1)">+</button>
        </div>
      </div>
      ${stepsHtml}${pomoHtml}
    </div>`;
  }).join('');
}

// CALENDAR
// ═══════════════════════════════════════
function toggleCal(){
  const el=document.getElementById('calWrap');
  el.style.display=el.style.display==='none'?'block':'none';
  if(el.style.display==='block') renderCal();
}
function calNav(d){ calDate.setMonth(calDate.getMonth()+d); renderCal(); }
function clearCalFilter(){ calFilter=null; renderTasks(); }
function calSelect(ds){ calFilter=calFilter===ds?null:ds; renderCal(); renderTasks(); }

function renderCal(){
  const y=calDate.getFullYear(),m=calDate.getMonth();
  const months=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  document.getElementById('calLabel').textContent=y+'年 '+months[m];
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const today=new Date();
  const todayStr=today.getFullYear()+'-'+p2(today.getMonth()+1)+'-'+p2(today.getDate());
  const taskDates=new Set(S.tasks.map(t=>(t.createdAt||'').slice(0,10)));
  const deferDates=new Set(S.tasks.filter(t=>t.defer).map(t=>t.defer));
  let html=['日','一','二','三','四','五','六'].map(d=>`<div class="cal-dh">${d}</div>`).join('');
  for(let i=0;i<first;i++) html+='<div class="cal-day empty"></div>';
  for(let d=1;d<=days;d++){
    const ds=y+'-'+p2(m+1)+'-'+p2(d);
    const dot=taskDates.has(ds)?'has-dot':'';
    const def=deferDates.has(ds)?'has-defer':'';
    html+=`<div class="cal-day ${ds===todayStr?'today':''} ${ds===calFilter?'selected':''} ${dot} ${def}" onclick="calSelect('${ds}')">${d}</div>`;
  }
  document.getElementById('calDays').innerHTML=html;
}

function saveJournal(){
  const text=document.getElementById('journalText').value.trim();
  if(!text) return;
  const tags=document.getElementById('journalTags').value.split(',').map(s=>s.trim()).filter(Boolean);
  S.journal.unshift({id:S.nextId++,text,tags,createdAt:new Date().toISOString()});
  addXP(5,'日记'); saveState(); closeModal('journalModal');
  document.getElementById('journalText').value='';
  document.getElementById('journalTags').value='';
  renderJournal();
}

function deleteJournal(id){
  undoStack.push(JSON.stringify(S));
  S.journal=S.journal.filter(j=>j.id!=id);
  saveState(); renderJournal(); showUndoBar('日记已删除');
}

function editJournal(id){
  document.getElementById('j-view-'+id).style.display='none';
  document.getElementById('j-edit-'+id).style.display='block';
  setTimeout(()=>{ const ta=document.getElementById('j-textarea-'+id); if(ta){ta.focus();ta.selectionStart=ta.value.length;} },50);
}

function cancelJournalEdit(id){
  document.getElementById('j-view-'+id).style.display='block';
  document.getElementById('j-edit-'+id).style.display='none';
}

function saveJournalEdit(id){
  const j=S.journal.find(x=>x.id==id); if(!j) return;
  const text=document.getElementById('j-textarea-'+id).value.trim();
  const tags=document.getElementById('j-tags-'+id).value.split(',').map(s=>s.trim()).filter(Boolean);
  if(!text) return;
  j.text=text; j.tags=tags; j.editedAt=new Date().toISOString();
  saveState(); renderJournal();
}

function renderJournal(){
  const search=(document.getElementById('journalSearch').value||'').toLowerCase();
  const entries=S.journal.filter(j=>{
    if(search && !j.text.toLowerCase().includes(search) && !j.tags.join(' ').toLowerCase().includes(search)) return false;
    if(jMonthFilter && (j.createdAt||'').slice(0,7)!==jMonthFilter) return false;
    return true;
  });
  renderArchive('archiveJ',S.journal,jMonthFilter,m=>{jMonthFilter=m;renderJournal();});
  const list=document.getElementById('journalList');
  if(!entries.length){list.innerHTML='<div class="empty-state"><div class="empty-icon">📔</div>写下今天的想法吧</div>';return;}
  list.innerHTML=entries.map(j=>`
    <div class="entry-card">
      <div class="entry-header">
        <span class="entry-ts">${fmtDT(j.createdAt)}</span>
        <div style="display:flex;gap:4px;">
          <button class="icon-btn" onclick="editJournal(${j.id})" title="编辑">✏️</button>
          <button class="icon-btn" onclick="deleteJournal(${j.id})" style="color:var(--accent)" title="删除">✕</button>
        </div>
      </div>
      <div id="j-view-${j.id}">
        <div class="entry-body">${j.text}</div>
        ${j.tags.length?`<div class="tags">${j.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`:''}
        ${(j.links&&j.links.length)?`<div style="margin-top:6px;font-size:12px;color:var(--purple);">🔗 ${j.links.length} 个关联条目</div>`:''}
        ${(j.replies&&j.replies.length)?`<div style="margin-top:3px;font-size:12px;color:var(--blue);">💬 ${j.replies.length} 条补充</div>`:''}
      </div>
      <div id="j-edit-${j.id}" style="display:none;">
        <textarea id="j-textarea-${j.id}" rows="5" style="width:100%;background:var(--surface);border:1px solid var(--border);color:var(--light);padding:7px 10px;font-family:var(--font-vt);font-size:16px;outline:none;resize:vertical;margin-top:6px;">${j.text}</textarea>
        <input id="j-tags-${j.id}" value="${j.tags.join(', ')}" placeholder="标签（逗号分隔）" style="width:100%;background:var(--surface);border:1px solid var(--border);color:var(--light);padding:5px 10px;font-family:var(--font-vt);font-size:15px;outline:none;margin-top:6px;"/>
        <div style="display:flex;gap:6px;margin-top:8px;">
          <button class="pxl-btn primary" onclick="saveJournalEdit(${j.id})">保存</button>
          <button class="pxl-btn" onclick="cancelJournalEdit(${j.id})">取消</button>
        </div>
      </div>
    </div>`).join('');
}

function rcRefresh(){
  const jid=_rcJid;
  const j=S.journal.find(x=>x.id==jid); if(!j) return;
  if(!j.replies) j.replies=[];
  if(!j.links)   j.links=[];

  const b=document.getElementById('rc-body');      if(b) b.textContent=j.text;
  const ts=document.getElementById('rc-ts');       if(ts) ts.textContent=fmtDT(j.createdAt);
  const tg=document.getElementById('rc-tags');
  if(tg) tg.innerHTML=j.tags&&j.tags.length
    ? '<div class="tags">'+j.tags.map(t=>'<span class="tag">'+t+'</span>').join('')+'</div>' : '';
  const rt=document.getElementById('rc-rtoggle');
  if(rt) rt.textContent='▸ 回复与补充 ('+j.replies.length+')';
  const lc=document.getElementById('rc-linkcount');
  if(lc) lc.textContent=j.links.length ? '🔗 '+j.links.length+' 个关联条目（点击管理）' : '';

  const rl=document.getElementById('rc-rlist');
  if(rl) rl.innerHTML=j.replies.length
    ? j.replies.map((r,i)=>'<div style="border-left:2px solid var(--blue);padding:6px 10px;margin-bottom:6px;position:relative;">'

        +'<div style="font-size:15px;color:var(--light);white-space:pre-wrap;">'+r.text+'</div>'
        +'<button class="icon-btn" onclick="rcDelReply('+i+')" style="position:absolute;top:4px;right:4px;color:var(--accent);font-size:11px;">✕</button>'
        +'</div>').join('')
    : '<div style="font-size:14px;color:var(--gray);margin-bottom:6px;">（还没有补充）</div>';

function rcAddReply(){
  const jid=_rcJid;
  const j=S.journal.find(x=>x.id==jid); if(!j) return;
  const inp=document.getElementById('rc-rinput');
  const text=(inp?inp.value:'').trim(); if(!text) return;
  if(!j.replies) j.replies=[];
  j.replies.push({text,at:fmtDT(new Date().toISOString())});
  if(inp) inp.value='';
  saveState(); rcRefresh();
}

function rcDelReply(idx){
  const j=S.journal.find(x=>x.id==_rcJid); if(!j||!j.replies) return;
  j.replies.splice(idx,1);
  saveState(); rcRefresh();
}

  });
  document.getElementById('lp-kw').addEventListener('input', lpRenderResults);
  document.getElementById('lp-mo').addEventListener('change', lpRenderResults);
  document.getElementById('lp-closebtn').onclick=function(){

function lpPopulateEntryDropdown(){
  const sel=document.getElementById('lp-entry-sel'); if(!sel) return;
  sel.innerHTML=S.journal.map(j=>
    '<option value="'+j.id+'"'+(j.id==_lpJid?' selected':'')+'>'+fmtDT(j.createdAt)+' — '+j.text.slice(0,40)+'…</option>'
  ).join('');

// Updates everything EXCEPT the kw input and mo select
function lpRefresh(){
  const jid=_lpJid;
  const j=S.journal.find(x=>x.id==jid); if(!j) return;
  if(!j.links) j.links=[];

  // preview
  const prev=document.getElementById('lp-entry-preview');
  if(prev) prev.textContent=j.text;

  // linked list
  const ll=document.getElementById('lp-linked-section');
  if(ll){
    if(j.links.length){
      ll.innerHTML='<div style="font-size:13px;color:var(--gray);margin-bottom:6px;">已关联 ('+j.links.length+')</div>'
        +j.links.map(lid=>{
          const lj=S.journal.find(x=>x.id==lid); if(!lj) return '';
          return '<div style="background:var(--surface);border-left:2px solid var(--purple);padding:6px 10px;margin-bottom:4px;display:flex;align-items:flex-start;gap:6px;">'
            +'<div style="flex:1;">'
            +'<span style="font-family:var(--font-pixel);font-size:6px;color:var(--purple);display:block;margin-bottom:2px;">'+fmtDT(lj.createdAt)+'</span>'
            +'<span style="font-size:14px;color:var(--light);">'+lj.text.slice(0,80)+(lj.text.length>80?'…':'')+'</span>'
            +'</div>'
            +'<button class="icon-btn" onclick="lpRemLink('+lid+')" style="color:var(--accent);font-size:11px;flex-shrink:0;">✕</button>'
            +'</div>';
        }).join('');
    } else {
      ll.innerHTML='<div style="font-size:13px;color:var(--gray);margin-bottom:8px;">（暂无关联条目）</div>';
    }
  }

  // rebuild month dropdown options without touching kw input
  lpRebuildMonths();
  lpRenderResults();
}

function lpRebuildMonths(){
  const jid=_lpJid;
  const j=S.journal.find(x=>x.id==jid); if(!j) return;
  const sel=document.getElementById('lp-mo'); if(!sel) return;
  const cur=sel.value||'';
  const ms={};
  S.journal.forEach(x=>{
    if(x.id==jid) return;
    if((j.links||[]).includes(x.id)) return;
    const ym=(x.createdAt||'').slice(0,7); if(ym) ms[ym]=true;
  });
  sel.innerHTML='<option value="">全部月份</option>'
    +Object.keys(ms).sort().reverse().map(m=>'<option value="'+m+'"'+(cur===m?' selected':'')+'>'+m+'</option>').join('');
  if(cur) sel.value=cur;
}

// Only rewrites the results list — never touches inputs
function lpRenderResults(){
  const jid=_lpJid;
  const j=S.journal.find(x=>x.id==jid); if(!j) return;
  const kwEl=document.getElementById('lp-kw');
  const moEl=document.getElementById('lp-mo');
  const kw=(kwEl?kwEl.value:'').toLowerCase();
  const mo=moEl?moEl.value:'';
  const mount=document.getElementById('lp-results'); if(!mount) return;

  const filtered=S.journal.filter(x=>{
    if(x.id==jid) return false;
    if((j.links||[]).includes(x.id)) return false;
    if(mo&&(x.createdAt||'').slice(0,7)!==mo) return false;
    if(kw&&!x.text.toLowerCase().includes(kw)&&!(x.tags||[]).join(' ').toLowerCase().includes(kw)) return false;
    return true;
  });

  if(!filtered.length){
    mount.innerHTML='<div style="font-size:13px;color:var(--gray);padding:4px 0;">没有符合条件的条目</div>';
    return;
  }

  // Build select + button as plain HTML — no inputs in here
  mount.innerHTML='<select id="lp-sel"'
    +' style="width:100%;background:var(--surface);border:1px solid var(--border);color:var(--light);padding:6px 10px;font-family:var(--font-vt);font-size:14px;outline:none;margin-bottom:6px;">'
    +'<option value="">选择要关联的条目 ('+filtered.length+'条)</option>'
    +filtered.map(x=>'<option value="'+x.id+'">'+fmtDT(x.createdAt)+' — '+x.text.slice(0,40)+'…</option>').join('')
    +'</select>'
    +'<button class="pxl-btn" onclick="lpAddLink()" style="border-color:var(--blue);color:var(--blue);">添加关联</button>';
}

function lpAddLink(){
  const jid=_lpJid;
  const j=S.journal.find(x=>x.id==jid); if(!j) return;
  const sel=document.getElementById('lp-sel');
  const lid=sel?parseInt(sel.value):0; if(!lid) return;
  if(!j.links) j.links=[];
  if(!j.links.includes(lid)) j.links.push(lid);
  const lj=S.journal.find(x=>x.id==lid);
  if(lj){if(!lj.links)lj.links=[];if(!lj.links.includes(jid))lj.links.push(jid);}
  saveState();
  lpRebuildMonths();
  lpRefresh();
  // also update random card link count if open
  if(_rcJid) rcRefresh();
}

function lpRemLink(lid){
  const jid=_lpJid;
  const j=S.journal.find(x=>x.id==jid); if(!j||!j.links) return;
  j.links=j.links.filter(x=>x!=lid);
  const lj=S.journal.find(x=>x.id==lid);
  if(lj&&lj.links) lj.links=lj.links.filter(x=>x!=jid);
  saveState();
  lpRebuildMonths();
  lpRefresh();
  if(_rcJid) rcRefresh();
}

function renderArchive(containerId, items, current, onSelect){
  const months={};
  items.forEach(item=>{ const ym=(item.createdAt||'').slice(0,7); if(ym) months[ym]=(months[ym]||0)+1; });
  const sorted=Object.keys(months).sort().reverse();
  if(!sorted.length){document.getElementById(containerId).innerHTML='';return;}
  document.getElementById(containerId).innerHTML=
    `<button class="arch-btn ${!current?'selected':''}" onclick="(${onSelect.toString()})(null)">全部 (${items.length})</button>`+
    sorted.map(ym=>`<button class="arch-btn ${current===ym?'selected':''}" onclick="(${onSelect.toString()})('${ym}')">${ym} (${months[ym]})</button>`).join('');
}

// ═══════════════════════════════════════
// POMODORO — wall-clock corrected
// ═══════════════════════════════════════
function startPomo(min){
  stopPomo();
  pomoMin=min; pomoSec=min*60;
  pomoStartWall=Date.now();
  pomoEndWall=pomoStartWall+min*60*1000;
  document.querySelectorAll('.pomo-btn[data-min]').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.min)===min));
  document.getElementById('pomoDisplay').classList.add('running');
  pomoTimer=setInterval(tickPomo,500);
  updatePomoDisplay();
}

function stopPomo(){
  if(pomoTimer){clearInterval(pomoTimer);pomoTimer=null;}
  document.getElementById('pomoDisplay').textContent='--:--';
  document.getElementById('pomoDisplay').classList.remove('running');
  document.querySelectorAll('.pomo-btn[data-min]').forEach(b=>b.classList.remove('active'));
}

function tickPomo(){
  const remaining=Math.max(0,Math.round((pomoEndWall-Date.now())/1000));
  if(remaining<=0){
    stopPomo();
    const now=fmtDT(new Date().toISOString());
    if(pomoTaskId){
      const t=S.tasks.find(t=>t.id==pomoTaskId);
      if(t){if(!t.pomoRecords)t.pomoRecords=[];t.pomoRecords.push(pomoMin+'min @ '+now);saveState();renderTasks();}
    }
    addXP(pomoMin,'番茄钟');
    showToast('🍅 '+pomoMin+'分钟完成！');
    sendNotification('番茄钟完成！','休息一下 ☕');
    return;
  }
  pomoSec=remaining;
  updatePomoDisplay();
}

function updatePomoDisplay(){
  const m=p2(Math.floor(pomoSec/60)), s=p2(pomoSec%60);
  document.getElementById('pomoDisplay').textContent=m+':'+s;
}

// Page Visibility — recalculate from wall clock when tab regains focus
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible' && pomoTimer){
    const remaining=Math.max(0,Math.round((pomoEndWall-Date.now())/1000));
    if(remaining<=0){ tickPomo(); }
    else { pomoSec=remaining; updatePomoDisplay(); }
  }
});

}

    new Notification(title,{body,icon:'icons/icon-192.png'});
  }
}

function applyTheme(){
  const map={'--accent':'c-accent','--gold':'c-gold','--blue':'c-blue','--green':'c-green','--purple':'c-purple','--bg':'c-bg','--surface':'c-surface'};
  const root=document.documentElement;
  const theme={};
  Object.entries(map).forEach(([k,id])=>{const v=document.getElementById(id).value;root.style.setProperty(k,v);theme[k]=v;});
  // derive surface2
  root.style.setProperty('--surface2', adjustBrightness(document.getElementById('c-surface').value,15));
  S.theme=theme; saveState();
}

function adjustBrightness(hex,amt){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);
  return '#'+[r,g,b].map(x=>p2(x.toString(16))).join('');
}

function loadTheme(){
  if(!S.theme||!Object.keys(S.theme).length) return;
  const root=document.documentElement;
  const map={'--accent':'c-accent','--gold':'c-gold','--blue':'c-blue','--green':'c-green','--purple':'c-purple','--bg':'c-bg','--surface':'c-surface'};
  Object.entries(map).forEach(([k,id])=>{ if(S.theme[k]){root.style.setProperty(k,S.theme[k]);document.getElementById(id).value=S.theme[k];}});
  if(S.theme['--surface']) root.style.setProperty('--surface2',adjustBrightness(S.theme['--surface'],15));
}

function resetTheme(){
  S.theme={}; document.documentElement.removeAttribute('style'); saveState();
}

    <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;">
      <input id="cl-kw-${id}" placeholder="搜索卡片..." autocomplete="off"
        style="flex:1;min-width:80px;background:var(--surface);border:1px solid var(--border);color:var(--light);padding:5px 8px;font-family:var(--font-vt);font-size:15px;outline:none;"/>
    </div>
    <div id="cl-results-${id}" style="margin-top:6px;"></div>
  </div>`;

  // persistent listener — never re-created
  document.getElementById('cl-kw-'+id).addEventListener('input',function(){
    renderLinkResults(id,this.value);
  });

  renderLinked(id);
  renderLinkResults(id,'');
}

function renderLinked(id){
  const c=S.cards.find(x=>x.id==id); if(!c) return;
  const el=document.getElementById('cl-linked-'+id); if(!el) return;
  if(!(c.links||[]).length){el.innerHTML='<div style="font-size:13px;color:var(--gray);margin-bottom:4px;">还没有链接</div>';return;}
  el.innerHTML=c.links.map(lid=>{
    const lk=S.cards.find(x=>x.id==lid); if(!lk) return '';
    const preview=(lk.type==='quote'?lk.quote:lk.body)||'';
    return `<div style="display:flex;align-items:flex-start;gap:6px;padding:4px 0;border-bottom:1px solid var(--border);">
      <span style="flex:1;font-size:13px;color:var(--light);">${preview.slice(0,60)}${preview.length>60?'…':''}</span>
      <button class="icon-btn" onclick="removeCardLink(${id},${lid})" style="color:var(--accent);font-size:10px;flex-shrink:0;">✕</button>
    </div>`;
  }).join('');
}

function renderLinkResults(id,kw){
  const c=S.cards.find(x=>x.id==id); if(!c) return;
  const el=document.getElementById('cl-results-'+id); if(!el) return;
  const q=(kw||'').toLowerCase();
  const filtered=S.cards.filter(x=>{
    if(x.id==id) return false;
    if((c.links||[]).includes(x.id)) return false;
    if(!q) return true;
    const txt=((x.quote||'')+(x.body||'')+(x.tags||[]).join(' ')).toLowerCase();
    return txt.includes(q);
  });
  if(!filtered.length){
    el.innerHTML='<div style="font-size:12px;color:var(--gray);padding:4px 0;">没有符合条件的卡片</div>';
    return;
  }
  // only update results, never touches the input
  el.innerHTML='<select id="cl-sel-'+id+'" style="width:100%;background:var(--surface);border:1px solid var(--border);color:var(--light);padding:5px 8px;font-family:var(--font-vt);font-size:14px;outline:none;margin-bottom:6px;">'
    +'<option value="">选择要链接的卡片 ('+filtered.length+')...</option>'
    +filtered.map(x=>{
      const preview=((x.type==='quote'?x.quote:x.body)||'').slice(0,50);
      return '<option value="'+x.id+'">'+(x.type==='quote'?'[Q] ':'[I] ')+preview+'…</option>';
    }).join('')
    +'</select>'
    +'<button class="pxl-btn" onclick="addCardLink('+id+')" style="border-color:var(--blue);color:var(--blue);">建立链接</button>';
}

function addCardLink(id){
  const c=S.cards.find(x=>x.id==id); if(!c) return;
  const sel=document.getElementById('cl-sel-'+id);
  const lid=sel?parseInt(sel.value):0; if(!lid) return;
  if(!c.links) c.links=[];
  if(!c.links.includes(lid)) c.links.push(lid);
  const lk=S.cards.find(x=>x.id==lid);
  if(lk){if(!lk.links)lk.links=[];if(!lk.links.includes(id))lk.links.push(id);}
  saveState(); renderLinked(id); renderLinkResults(id,document.getElementById('cl-kw-'+id).value);
  // refresh link count button
  const btn=document.getElementById('cl-btn-'+id);
  if(btn) btn.textContent='▾ 收起链接 ('+c.links.length+')';
}

function removeCardLink(id,lid){
  const c=S.cards.find(x=>x.id==id); if(!c) return;
  c.links=(c.links||[]).filter(x=>x!=lid);
  const lk=S.cards.find(x=>x.id==lid);
  if(lk) lk.links=(lk.links||[]).filter(x=>x!=id);
  saveState(); renderLinked(id); renderLinkResults(id,document.getElementById('cl-kw-'+id).value);
  const btn=document.getElementById('cl-btn-'+id);
  if(btn) btn.textContent='▸ 链接 ('+c.links.length+')';
}

function renderCards(){
  const kw=((document.getElementById('cardSearch')||{}).value||'').toLowerCase();
  const list=document.getElementById('cardList'); if(!list) return;
  const items=(S.cards||[]).filter(c=>{
    if(!kw) return true;
    return ((c.quote||'')+(c.body||'')+(c.tags||[]).join(' ')).toLowerCase().includes(kw);
  });
  if(!items.length){
    list.innerHTML='<div class="empty-state"><div class="empty-icon">🗃</div>一卡一想法，从这里开始</div>';
    return;
  }
  list.innerHTML=items.map(c=>`
    <div class="entry-card" style="border-left-color:${c.type==='quote'?'var(--blue)':'var(--gold)'};">
      <div class="entry-header">
        <span style="font-family:var(--font-pixel);font-size:6px;color:${c.type==='quote'?'var(--blue)':'var(--gold)'};">${c.type==='quote'?'QUOTE':'IDEA'}</span>
        <div style="display:flex;gap:4px;align-items:center;">
          <span class="entry-ts">${fmtDT(c.createdAt)}</span>
          <button class="icon-btn" onclick="editCard(${c.id})">✏️</button>
          <button class="icon-btn" onclick="deleteCard(${c.id})" style="color:var(--accent);">✕</button>
        </div>
      </div>
      ${c.quote?`<div style="font-size:15px;color:var(--gray);font-style:italic;line-height:1.6;margin-bottom:8px;white-space:pre-wrap;border-left:2px solid var(--blue);padding-left:10px;">${c.quote}</div>`:''}
      ${c.body?`<div style="font-size:16px;color:var(--light);line-height:1.6;white-space:pre-wrap;">${c.body}</div>`:''}
      ${(c.tags||[]).length?`<div class="tags" style="margin-top:8px;">${c.tags.map(t=>'<span class="tag">'+t+'</span>').join('')}</div>`:''}
      <button id="cl-btn-${c.id}" class="pxl-btn" onclick="toggleCardLinks(${c.id})"
        style="margin-top:10px;font-size:6px;border-color:var(--purple);color:var(--purple);">▸ 链接 (${(c.links||[]).length})</button>
      <div id="cl-panel-${c.id}" style="display:none;"></div>
    </div>`).join('');
}

function exportCards(){
  let txt='=== 卡片笔记 ===

';
  (S.cards||[]).forEach((c,i)=>{
    txt+=`[${i+1}] ${c.type==='quote'?'QUOTE':'IDEA'} · ${fmtDT(c.createdAt)}
`;
    if(c.quote) txt+=`"${c.quote}"
`;
    if(c.body) txt+=`${c.body}
`;
    if((c.tags||[]).length) txt+=`标签: ${c.tags.join(', ')}
`;
    if((c.links||[]).length){
      const previews=c.links.map(lid=>{
        const lk=S.cards.find(x=>x.id==lid);
        return lk?('['+lid+'] '+((lk.quote||lk.body)||'').slice(0,30)):'?';
      });
      txt+=`链接: ${previews.join(' | ')}
`;
    }
    txt+='
---

';
  });
  dl('cards.txt',txt);
}


function clearAll(){
  if(!confirm('确定清除所有数据？不可撤销！')) return;
  S={charName:'MMM',level:1,xp:0,tasks:[],journal:[],dreams:[],theme:{},progStep:10,nextId:1,avatar:null,bgImg:null};
  saveState(); renderAll();
}

function renderAll(){
  document.getElementById('charName').value=S.charName;
  if(S.progStep) document.getElementById('progStep').value=S.progStep;
  updateXPUI(); applyAvatar(); loadTheme(); applyBg();
  renderTasks(); renderJournal(); renderDreams(); renderCal();
  renderCards();
}

// Char name save
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('charName').addEventListener('change',()=>{S.charName=document.getElementById('charName').value;saveState();});
  document.getElementById('progStep').addEventListener('change',()=>{S.progStep=parseInt(document.getElementById('progStep').value)||10;saveState();});
});

// Register Service Worker
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').then(reg=>{
      console.log('SW registered');
    }).catch(e=>console.log('SW failed:',e));
  });
}

// ═══════════════════════════════════════
// CHANGE PASSWORD
// ═══════════════════════════════════════
const PW_STORE_KEY = 'adhd-rpg-pw';

// Read current password (falls back to hardcoded default if never changed)
function getCurrentPw(){
  return localStorage.getItem(PW_STORE_KEY) || 'x5uvwa9uyimiaodai1999';
}

function openChangePwModal(){
  document.getElementById('pw-old').value = '';
  document.getElementById('pw-new1').value = '';
  document.getElementById('pw-new2').value = '';
  document.getElementById('pw-change-err').textContent = '';
  openModal('changePwModal');
}

function doChangePassword(){
  const oldVal  = document.getElementById('pw-old').value;
  const new1    = document.getElementById('pw-new1').value;
  const new2    = document.getElementById('pw-new2').value;
  const errEl   = document.getElementById('pw-change-err');

  if(oldVal !== getCurrentPw()){
    errEl.textContent = '当前密码错误'; return;
  }
  if(!new1){
    errEl.textContent = '新密码不能为空'; return;
  }
  if(new1 !== new2){
    errEl.textContent = '两次输入不一致'; return;
  }
  if(new1.length < 4){
    errEl.textContent = '密码至少需要4位'; return;
  }

  localStorage.setItem(PW_STORE_KEY, new1);
  // Update session so user is not kicked out
  sessionStorage.setItem('rpg-auth', new1);
  closeModal('changePwModal');
  showToast('✓ 密码已修改');
}

// Init: load local immediately, then sync from cloud
(async () => {
  try {
    const local = localStorage.getItem('adhd-rpg-v2');
    if (local) { Object.assign(S, JSON.parse(local)); migrateState(); }
  } catch(e) {}
  renderAll(); // instant paint from local
  await loadState(); // cloud sync (will re-render if cloud is newer)
})();
</script>
