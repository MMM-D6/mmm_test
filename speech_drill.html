<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>Speech Drill</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --f:"MS Sans Serif","SimSun","宋体",Tahoma,Arial,sans-serif;
  --gray:#c0c0c0;--light:#dfdfdf;--dk:#404040;--mid:#808080;
  --blue:#000080;--blue2:#1084d0;
}
html,body{height:100%;background:var(--gray);font-family:var(--f);font-size:13px;color:#000;overflow:hidden;}
.tb{background:linear-gradient(90deg,var(--blue),var(--blue2));color:#fff;font-size:12px;font-weight:bold;padding:3px 8px;display:flex;align-items:center;justify-content:space-between;user-select:none;flex-shrink:0;}
.btn{font-family:var(--f);font-size:12px;cursor:pointer;padding:3px 10px;background:var(--gray);color:#000;border:2px solid;border-color:#fff var(--dk) var(--dk) #fff;white-space:nowrap;}
.btn:hover:not(:disabled){background:var(--light);}
.btn:active:not(:disabled){border-color:var(--dk) #fff #fff var(--dk);transform:translate(1px,1px);}
.btn:disabled{color:var(--mid);cursor:default;}
.sbar{background:var(--gray);border-top:2px solid var(--dk);padding:2px 6px;font-size:11px;display:flex;gap:8px;flex-shrink:0;}
.sp{border:1px solid var(--dk);padding:1px 6px;}
body{display:flex;flex-direction:column;}
#setup{position:fixed;inset:0;background:var(--gray);z-index:100;display:flex;align-items:center;justify-content:center;}
#setupBox{width:420px;background:var(--gray);border:2px solid;border-color:#fff var(--dk) var(--dk) #fff;}
#dropzone{border:3px dashed var(--mid);background:#fff;padding:24px;text-align:center;cursor:pointer;color:var(--mid);transition:all .15s;margin:10px;}
#dropzone.over{border-color:var(--blue);background:#e8e8ff;color:var(--blue);}
#dropzone.ok{border-color:#006600;background:#e8ffe8;color:#006600;}
#app{display:none;flex-direction:column;flex:1;overflow:hidden;}
#main{display:flex;flex-direction:column;flex:1;overflow:hidden;}
#toolbar{padding:5px 8px;display:flex;gap:5px;align-items:center;flex-wrap:wrap;flex-shrink:0;border-bottom:2px solid var(--dk);background:var(--gray);}
.legend{display:flex;gap:8px;font-size:11px;align-items:center;}
.ldot{width:11px;height:11px;border-radius:2px;display:inline-block;vertical-align:middle;margin-right:2px;}
#splitWrap{display:flex;flex-direction:column;flex:1;overflow:hidden;}
#cardWrap{flex:1;overflow-y:auto;background:#fff;border-bottom:3px solid var(--dk);}
#cardArea{padding:14px 18px 8px;line-height:2.4;font-size:17px;font-family:Arial,sans-serif;white-space:pre-wrap;word-break:break-word;cursor:text;user-select:text;}
#noteArea{padding:4px 18px 8px;font-size:12px;color:var(--mid);border-top:1px dashed var(--mid);background:#fafafa;white-space:pre-wrap;display:none;}
#transWrap{flex-shrink:0;display:flex;flex-direction:column;background:var(--gray);}
#transHeader{display:flex;align-items:center;gap:8px;padding:5px 8px;border-top:2px solid;border-color:#fff var(--dk) var(--dk) #fff;}
#recBtn{width:48px;height:48px;border-radius:50%;border:3px solid;border-color:#fff var(--dk) var(--dk) #fff;background:var(--gray);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#recBtn:hover{background:var(--light);}
#recBtn.on{background:#cc0000;border-color:#fff #600 #600 #fff;}
#transInfo{display:flex;flex-direction:column;gap:3px;flex:1;}
#transLabel{font-size:11px;font-weight:bold;color:var(--blue);}
#scoreRow{display:flex;align-items:center;gap:8px;font-size:12px;}
#covBar{flex:1;height:10px;background:#fff;border:2px inset var(--dk);}
#covFill{height:100%;background:var(--blue);width:0%;transition:width .4s;}
#covPct{font-weight:bold;font-family:monospace;width:38px;text-align:right;color:var(--mid);}
#gradeBox{font-weight:bold;font-size:20px;width:24px;font-family:monospace;color:var(--mid);}
#histSpan{font-size:11px;color:var(--mid);}
#transcript{min-height:52px;max-height:110px;overflow-y:auto;padding:5px 10px;font-size:14px;font-family:Arial,sans-serif;background:#fff;border:2px solid;border-color:var(--dk) #fff #fff var(--dk);margin:0 8px 6px;color:#000;line-height:1.6;white-space:pre-wrap;word-break:break-word;}
#transcript.listening{border-color:#cc0000;}
.w{border-radius:2px;padding:0 2px;}
.w.said{background:#cce0ff;color:#003380;}
.w.missed{background:#e2e3e5;color:#383d41;text-decoration:line-through;}
.mk{background:#909090;color:transparent;cursor:pointer;border-radius:2px;padding:0 2px;}
.mk.vis{background:#c8c8ff;color:#000;}
#pop{position:fixed;display:none;flex-direction:column;gap:3px;background:var(--gray);border:2px solid;border-color:#fff var(--dk) var(--dk) #fff;padding:4px;z-index:200;}
</style>
</head>
<body>

<div id="setup">
  <div id="setupBox">
    <div class="tb">📂 Speech Drill</div>
    <div style="padding:10px;display:flex;flex-direction:column;gap:6px;">
      <div id="dropzone" onclick="document.getElementById('fi').click()">
        <div style="font-size:24px;margin-bottom:6px;">📄</div>
        <div>拖入 <code>.json</code> 卡片，或点击选择</div>
        <div style="font-size:11px;margin-top:3px;color:#808080;">支持主程序导出的 engCard JSON</div>
      </div>
      <input type="file" id="fi" accept=".json" style="display:none;" onchange="onFI(this)">
      <div id="impMsg" style="font-size:11px;color:#cc0000;min-height:14px;"></div>
    </div>
  </div>
</div>

<div id="app">
  <div class="tb" style="flex-shrink:0;">
    <span id="drillTitle">🎙 Speech Drill</span>
    <div style="display:flex;gap:4px;align-items:center;">
      <select id="cardSel" style="font-family:var(--f);font-size:11px;background:#fff;border:1px solid var(--dk);padding:1px 3px;display:none;" onchange="loadCard()"></select>
      <button class="btn" style="font-size:11px;padding:1px 7px;background:rgba(255,255,255,.2);color:#fff;border-color:rgba(255,255,255,.4) rgba(0,0,80,.4) rgba(0,0,80,.4) rgba(255,255,255,.4);" onclick="backToSetup()">◀ 换卡片</button>
    </div>
  </div>
  <div id="main">
    <div id="toolbar">
      <span style="font-size:11px;font-weight:bold;color:var(--blue);">划词遮蔽:</span>
      <button class="btn" id="maskBtn" onclick="applyMask()" disabled>▓ 遮蔽</button>
      <button class="btn" id="umBtn" onclick="clearMask()" disabled style="color:#cc0000;">✕ 取消</button>
      <button class="btn" onclick="resetView()">↺ 重置</button>
      <div id="legendRow" style="display:none;margin-left:6px;" class="legend">
        <span><span class="ldot" style="background:#cce0ff;border:1px solid #003380;"></span>说了</span>
        <span><span class="ldot" style="background:#e2e3e5;border:1px solid #383d41;"></span>漏读</span>
      </div>
    </div>
    <div id="splitWrap">
      <div id="cardWrap">
        <div id="cardArea" onmouseup="onSel()" ontouchend="onSel()">请先导入卡片</div>
        <div id="noteArea"></div>
      </div>
      <div id="transWrap">
        <div id="transHeader">
          <div id="recBtn" onclick="toggleRec()">🎙</div>
          <div id="transInfo">
            <div style="display:flex;align-items:center;gap:8px;">
              <span id="transLabel">点击麦克风开始</span>
              <span id="recStatus" style="font-size:11px;color:#cc0000;"></span>
            </div>
            <div id="scoreRow">
              <span style="font-size:11px;color:var(--mid);">覆盖</span>
              <div id="covBar"><div id="covFill"></div></div>
              <span id="covPct">--</span>
              <span id="gradeBox">--</span>
              <span id="histSpan"></span>
            </div>
          </div>
        </div>
        <div id="transcript"></div>
      </div>
    </div>
  </div>
  <div class="sbar">
    <div class="sp" id="sMask">遮蔽: 0</div>
    <div class="sp" id="sDrill">次数: 0</div>
    <div class="sp" id="sBest">最高: --</div>
  </div>
</div>

<div id="pop">
  <button class="btn" onclick="applyMask()">▓ 遮蔽</button>
  <button class="btn" onclick="clearMask()" style="color:#cc0000;">✕ 取消</button>
</div>

<script>
'use strict';
let cards=[],cur=null,origText='';
let selS=0,selE=0;
let drillN=0,bestScores={},lastScore=null;
let isRec=false,recog=null,fullTranscript='';

const dz=document.getElementById('dropzone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');if(e.dataTransfer.files[0])readFile(e.dataTransfer.files[0]);});
function onFI(inp){if(inp.files[0])readFile(inp.files[0]);}
function readFile(f){
  const r=new FileReader();
  r.onload=e=>{
    try{
      let p=JSON.parse(e.target.result);
      if(!Array.isArray(p))p=[p];
      p=p.filter(c=>c&&c.text);
      if(!p.length){document.getElementById('impMsg').textContent='未找到有效卡片';return;}
      p.forEach(c=>{if(!c.masks)c.masks=[];if(!c.id)c.id=Date.now()+Math.random();});
      cards=p;
      dz.classList.add('ok');
      dz.innerHTML='<div style="font-size:22px;margin-bottom:4px;">✓</div><div>已载入 '+p.length+' 张卡片</div>';
      document.getElementById('impMsg').textContent='';
      startDrill();
    }catch(err){document.getElementById('impMsg').textContent='JSON 解析失败: '+err.message;}
  };
  r.readAsText(f);
}

function startDrill(){
  const sel=document.getElementById('cardSel');
  if(cards.length>1){
    sel.innerHTML=cards.map((c,i)=>'<option value="'+i+'">'+(i+1)+'. '+c.text.slice(0,40)+'...</option>').join('');
    sel.style.display='';
  }else sel.style.display='none';
  document.getElementById('setup').style.display='none';
  document.getElementById('app').style.display='flex';
  loadCard();
}

function backToSetup(){
  stopRec();
  document.getElementById('app').style.display='none';
  document.getElementById('setup').style.display='flex';
}

function loadCard(){
  const idx=cards.length>1?parseInt(document.getElementById('cardSel').value)||0:0;
  cur=JSON.parse(JSON.stringify(cards[idx]));
  if(!cur)return;
  origText=cur.text;
  drillN=0;lastScore=null;
  document.getElementById('drillTitle').textContent='🎙 '+cur.text.slice(0,28)+'...';
  document.getElementById('sMask').textContent='遮蔽: '+(cur.masks||[]).length;
  document.getElementById('sDrill').textContent='次数: 0';
  document.getElementById('sBest').textContent='最高: --';
  document.getElementById('legendRow').style.display='none';
  const note=cur.note&&cur.note.trim();
  const na=document.getElementById('noteArea');
  if(note){na.textContent='📝 '+note;na.style.display='block';}else na.style.display='none';
  resetScore();renderPlain();
  document.getElementById('transcript').textContent='';
  document.getElementById('transcript').classList.remove('listening');
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderPlain(){
  if(!cur){document.getElementById('cardArea').innerHTML='请先导入卡片';return;}
  const text=origText,masks=cur.masks||[];
  if(!masks.length){document.getElementById('cardArea').innerHTML=esc(text).replace(/\n/g,'<br>');return;}
  const evs=[];
  masks.forEach((m,i)=>{evs.push({p:m.start,t:'o',i},{p:m.end,t:'c',i});});
  evs.sort((a,b)=>a.p-b.p||(a.t==='c'?-1:1));
  let html='',pos=0,inM=false,mi=-1;
  for(const ev of evs){
    const chunk=text.slice(pos,ev.p);
    if(chunk){
      if(inM)html+='<span class="mk" data-mi="'+mi+'" onclick="clickMk('+mi+')">'+chunk.replace(/\S/g,'█')+'</span>';
      else html+=esc(chunk).replace(/\n/g,'<br>');
    }
    pos=ev.p;
    if(ev.t==='o'){inM=true;mi=ev.i;}else{inM=false;mi=-1;}
  }
  if(pos<text.length)html+=esc(text.slice(pos)).replace(/\n/g,'<br>');
  document.getElementById('cardArea').innerHTML=html;
}

function renderScored(spokenSet){
  if(!cur)return;
  const text=origText;
  let html='',pos=0;
  while(pos<text.length){
    const ch=text[pos];
    if(ch==='\n'){html+='<br>';pos++;continue;}
    if(ch===' '){html+=' ';pos++;continue;}
    let end=pos;
    while(end<text.length&&text[end]!==' '&&text[end]!=='\n')end++;
    const token=text.slice(pos,end);
    const norm=token.toLowerCase().replace(/[^a-z']/g,'');
    const cls=(norm.length>0&&spokenSet.has(norm))?'said':'missed';
    html+='<span class="w '+cls+'">'+esc(token)+'</span>';
    pos=end;
  }
  document.getElementById('cardArea').innerHTML=html;
  document.getElementById('legendRow').style.display='flex';
}

function resetView(){
  renderPlain();
  document.getElementById('legendRow').style.display='none';
}

function clickMk(i){
  const el=document.getElementById('cardArea').querySelector('[data-mi="'+i+'"]');
  if(!el)return;
  const chunk=origText.slice(cur.masks[i].start,cur.masks[i].end);
  if(el.classList.contains('vis')){el.className='mk';el.innerHTML=chunk.replace(/\S/g,'█');}
  else{el.className='mk vis';el.textContent=chunk;}
}

function onSel(){
  if(!cur)return;
  setTimeout(()=>{
    const sel=window.getSelection();
    if(!sel||sel.rangeCount===0||sel.isCollapsed){hidePop();setMBtn(false);return;}
    const range=sel.getRangeAt(0);
    const ca=document.getElementById('cardArea');
    if(!ca.contains(range.commonAncestorContainer)){hidePop();setMBtn(false);return;}
    const pre=document.createRange();
    pre.setStart(ca,0);pre.setEnd(range.startContainer,range.startOffset);
    selS=pre.toString().length;selE=selS+range.toString().length;
    if(selE<=selS){hidePop();setMBtn(false);return;}
    setMBtn(true);
    const r=range.getBoundingClientRect();
    const pop=document.getElementById('pop');
    pop.style.display='flex';
    pop.style.left=(r.left+scrollX)+'px';
    pop.style.top=(r.bottom+scrollY+4)+'px';
  },10);
}
function setMBtn(on){document.getElementById('maskBtn').disabled=!on;document.getElementById('umBtn').disabled=!on;}
function hidePop(){document.getElementById('pop').style.display='none';}
function applyMask(){
  if(!cur||selE<=selS)return;
  const ex=cur.masks.find(m=>m.start<=selS&&m.end>=selE);
  if(ex)cur.masks=cur.masks.filter(m=>m!==ex);
  else{cur.masks=cur.masks.filter(m=>m.end<=selS||m.start>=selE);cur.masks.push({start:selS,end:selE});}
  hidePop();setMBtn(false);renderPlain();
  document.getElementById('sMask').textContent='遮蔽: '+cur.masks.length;
}
function clearMask(){
  if(!cur)return;
  cur.masks=cur.masks.filter(m=>!(m.start<selE&&m.end>selS));
  hidePop();setMBtn(false);renderPlain();
  document.getElementById('sMask').textContent='遮蔽: '+cur.masks.length;
}
document.addEventListener('click',e=>{
  const pop=document.getElementById('pop'),ca=document.getElementById('cardArea');
  if(pop.style.display==='flex'&&!pop.contains(e.target)&&!ca.contains(e.target))hidePop();
});

// ── Web Speech API ──
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;

function toggleRec(){if(isRec)stopRec();else startRec();}

function startRec(){
  if(!SR){alert('请使用 Chrome 或 Edge 浏览器（需支持 Web Speech API）');return;}
  if(isRec)return;
  isRec=true;fullTranscript='';
  document.getElementById('transcript').textContent='';
  document.getElementById('transcript').classList.add('listening');
  document.getElementById('recBtn').classList.add('on');
  document.getElementById('recBtn').innerHTML='⏹';
  document.getElementById('transLabel').textContent='录音中...';
  document.getElementById('recStatus').textContent='●';
  buildAndStart();
}

function buildAndStart(){
  if(!isRec)return;
  recog=new SR();
  recog.lang='en-GB';
  recog.continuous=true;
  recog.interimResults=true;
  recog.onresult=e=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)fullTranscript+=e.results[i][0].transcript+' ';
      else interim+=e.results[i][0].transcript;
    }
    const box=document.getElementById('transcript');
    box.textContent=fullTranscript+(interim?'['+interim+']':'');
    box.scrollTop=box.scrollHeight;
  };
  recog.onerror=e=>{
    if(e.error==='aborted'||e.error==='not-allowed')return;
    console.warn('SR error:',e.error);
  };
  recog.onend=()=>{
    // restart automatically unless user pressed stop
    if(isRec)buildAndStart();
  };
  recog.start();
}

function stopRec(){
  if(!isRec)return;
  isRec=false;
  if(recog){try{recog.abort();}catch(e){}recog=null;}
  document.getElementById('recBtn').classList.remove('on');
  document.getElementById('recBtn').innerHTML='🎙';
  document.getElementById('transLabel').textContent='点击麦克风开始';
  document.getElementById('recStatus').textContent='';
  document.getElementById('transcript').classList.remove('listening');
  const t=fullTranscript.trim();
  if(t)scoreAndRender(t);
}

function scoreAndRender(transcript){
  const spokenSet=new Set(
    transcript.toLowerCase().replace(/[^a-z'\s]/g,' ').split(/\s+/).filter(w=>w.length>0)
  );
  const refTokens=origText.replace(/\n/g,' ').trim().split(/\s+/).filter(w=>w.length>0);
  const refNorms=refTokens.map(t=>t.toLowerCase().replace(/[^a-z']/g,''));
  const total=refNorms.filter(n=>n.length>0).length||1;
  const matched=refNorms.filter(n=>n.length>0&&spokenSet.has(n)).length;
  const pct=Math.round(matched/total*100);
  const color=pct>=80?'#006600':pct>=50?'#884400':'#cc0000';
  document.getElementById('covFill').style.width=pct+'%';
  document.getElementById('covFill').style.background=color;
  document.getElementById('covPct').textContent=pct+'%';
  document.getElementById('covPct').style.color=color;
  const grade=pct>=90?'A':pct>=75?'B':pct>=60?'C':'D';
  const gc={A:'#006600',B:'#3a7a00',C:'#884400',D:'#cc0000'}[grade];
  document.getElementById('gradeBox').textContent=grade;
  document.getElementById('gradeBox').style.color=gc;
  drillN++;
  document.getElementById('sDrill').textContent='次数: '+drillN;
  const prev=bestScores[cur.id];
  if(prev==null||pct>prev){
    bestScores[cur.id]=pct;
    document.getElementById('sBest').textContent='最高: '+pct+'%';
    document.getElementById('histSpan').textContent=prev!=null?'🌟 新高！':'';
  }else{
    document.getElementById('histSpan').textContent=pct>=75?'💪':'加油！';
  }
  lastScore=pct;
  renderScored(spokenSet);
}

function resetScore(){
  document.getElementById('covFill').style.width='0%';
  document.getElementById('covPct').textContent='--';
  document.getElementById('covPct').style.color='var(--mid)';
  document.getElementById('gradeBox').textContent='--';
  document.getElementById('gradeBox').style.color='var(--mid)';
  document.getElementById('histSpan').textContent='';
}
</script>
</body>
</html>
